e**: t_s delay when turning off (remove excess charge)\n- Low power dissipation: P_D = V_CE(sat) × I_C ≈ 0.2V × I_C\n\n---\n\n## 7. Dual-Mode Operation\n\n### 7.1 Mode 1: Linear Amplification (Analog)\n\n**Operating region**: **Active**\n\n**Configuration example**: Common Emitter Amplifier\n\n```\n        V_CC (+5V)\n          │\n         R_C (1kΩ)\n          │\n          C (collector)\n          │\n    B ────┤ BJT (NPN)\n          │\n          E (emitter)\n          │\n         R_E (100Ω)\n          │\n         GND\n```\n\n**Operation**:\n- **Input**: AC signal on base (v_in)\n- **Output**: Amplified AC signal on collector (v_out)\n- **Gain**: A_v = -β × (R_C / R_E) ≈ -100 × (1000/100) = -1000\n\n**Applications**:\n\n1. **Audio Amplifiers**:\n   - **Pre-amplifier**: Microphone signal boosting\n   - **Power amplifier**: Drive speakers (push-pull config)\n\n2. **RF Amplifiers**:\n   - **Radio receivers**: Tuned amplifiers (LC tank circuits)\n   - **Transmitters**: Power amplification stages\n\n3. **Operational Amplifier Input Stages**:\n   - **Differential pair**: High input impedance, low offset\n\n4. **Sensor Signal Conditioning**:\n   - **Photodiode amplifier**: Convert photocurrent → voltage\n   - **Thermocouple amplifier**: Amplify mV-level signals\n\n**Amplification GenericConcept**:\n```json\n{\n  \"@type\": \"m2:Amplification\",\n  \"direction\": \"Amplifying\",\n  \"rationale\": \"Current gain β = 50-500, voltage gain A_v up to 1000, power gain >10,000\"\n}\n```\n\n### 7.2 Mode 2: Digital Switching (Binary)\n\n**Operating regions**: **Cutoff** ↔ **Saturation**\n\n**Configuration example**: Inverter (NOT gate)\n\n```\n        V_CC (+5V)\n          │\n         R_C (1kΩ)\n          │\n          C ───→ V_out\n          │\n    B ────┤ BJT\n    ↑     │\n  V_in    E\n          │\n         GND\n```\n\n**Truth table**:\n| V_in (Base) | State | V_out (Collector) |\n|-------------|-------|-------------------|\n| 0V (LOW)    | Cutoff | V_CC ≈ 5V (HIGH) |\n| 5V (HIGH)   | Saturation | V_CE(sat) ≈ 0.2V (LOW) |\n\n**Operation**:\n- **OFF (Cutoff)**: V_in < 0.6V → I_C ≈ 0 → V_out = V_CC (HIGH)\n- **ON (Saturation)**: V_in > 0.7V → I_C = max → V_out = V_CE(sat) (LOW)\n\n**Applications**:\n\n1. **Logic Gates**:\n   - **TTL** (Transistor-Transistor Logic): AND, OR, NOT, NAND, NOR\n   - **RTL** (Resistor-Transistor Logic): Early logic family\n\n2. **Inverters and Buffers**:\n   - Signal inversion\n   - Level shifting\n\n3. **Motor Drivers**:\n   - **H-bridge**: Bidirectional DC motor control\n   - **Relay driver**: Switch high-current loads\n\n4. **Power Switching**:\n   - **DC-DC converters**: Buck, boost, flyback\n   - **PWM control**: Motor speed, LED dimming\n\n**Threshold GenericConcept**:\n```json\n{\n  \"@type\": \"m2:Threshold\",\n  \"threshold_behavior\": \"Sharp\",\n  \"rationale\": \"Exponential I_C(V_BE) creates abrupt cutoff-to-saturation transition at V_BE ≈ 0.65-0.7 V\"\n}\n```\n\n**Threshold equation**:\n```\nI_C = I_S × exp(V_BE / V_T)\n```\nWhere V_T ≈ 26 mV → **10× change in I_C for 60 mV change in V_BE**\n\n### 7.3 Mode GenericConcept Validation\n\n**Mode instantiation**:\n```json\n{\n  \"@type\": \"m2:Mode\",\n  \"modes\": [\n    {\n      \"name\": \"Linear Amplification\",\n      \"region\": \"Active\",\n      \"operation\": \"Proportional I_C = β × I_B\"\n    },\n    {\n      \"name\": \"Digital Switching\",\n      \"regions\": [\"Cutoff\", \"Saturation\"],\n      \"operation\": \"Binary ON/OFF\"\n    }\n  ]\n}\n```\n\n**Key insight**: Same physical device, **different operating regimes** → dual modes.\n\n---\n\n## 8. Semiconductor Physics\n\n### 8.1 Carrier Dynamics\n\n**Minority Carrier Injection**:\n\nWhen BE junction is forward-biased:\n1. **Electrons** injected from emitter (N) → base (P)\n2. **Holes** injected from base (P) → emitter (N)\n\n**Emitter efficiency**:\n```\nγ = I_n(emitter→base) / (I_n + I_p)\n```\nWhere I_n = electron current, I_p = hole current\n\nDesign goal: γ → 1 (heavy emitter doping suppresses I_p)\n\n**Base transport factor**:\n```\nα_T = I_n(collector) / I_n(emitter)\n```\n\nElectrons lost to recombination in base:\n```\nα_T = 1 / (1 + W_B² / (2 × D_n × τ_n))\n```\nWhere:\n- W_B = base width (thin → high α_T!)\n- D_n = electron diffusion coefficient\n- τ_n = electron lifetime\n\n**Current gain**:\n```\nβ = γ × α_T / (1 - γ × α_T)\n```\n\nTypical: γ ≈ 0.995, α_T ≈ 0.99 → β ≈ 100\n\n### 8.2 Key Equations\n\n**Shockley Equation** (I_C vs V_BE):\n```\nI_C = I_S × exp(V_BE / V_T)\n```\nWhere:\n- I_S ≈ 10⁻¹⁴ A (saturation current, temperature-dependent)\n- V_T = k×T/q ≈ 26 mV at 300K (thermal voltage)\n\n**Early Effect** (output resistance):\n```\nI_C = I_S × exp(V_BE / V_T) × [1 + V_CE / V_A]\n```\nWhere V_A ≈ 50-100 V (Early voltage)\n\n**Output resistance**:\n```\nr_o = V_A / I_C\n```\nTypical: r_o ≈ 50 kΩ at I_C = 1 mA\n\n**Power Dissipation**:\n```\nP_D = V_CE × I_C + V_BE × I_B ≈ V_CE × I_C\n```\n(V_BE × I_B << V_CE × I_C)\n\n### 8.3 Temperature Dependence\n\n**V_BE temperature coefficient**:\n```\ndV_BE/dT ≈ -2 mV/°C\n```\nExample: V_BE(25°C) = 0.7V → V_BE(75°C) = 0.6V\n\n**β temperature coefficient**:\n```\ndβ/dT ≈ +0.5%/°C\n```\nExample: β(25°C) = 100 → β(75°C) ≈ 125\n\n**Thermal runaway**:\nPositive feedback loop:\n```\nT ↑ → I_C ↑ (due to ↓V_BE) → P_D ↑ → T ↑ → ...\n```\n**Mitigation**: Thermal stabilization (R_E degeneration, heat sinking)\n\n---\n\n## 9. Interoperability\n\n### 9.1 Interface 1: Digital Logic (TTL, CMOS)\n\n**Protocol**: Voltage levels (0V / 5V or 0V / 3.3V)\n\n**Compatibility**:\n- **Logic LOW**: V_CE(sat) ≈ 0.2 V (TTL accepts <0.8V as LOW)\n- **Logic HIGH**: Cutoff V_CE ≈ V_CC (TTL accepts >2.4V as HIGH)\n\n**Current sinking/sourcing**:\n- **Sinking** (NPN collector): Can sink ~10-50 mA\n- **Sourcing** (PNP emitter follower): Can source ~10-50 mA\n\n**Example**: 74xx TTL series uses BJT transistors for logic gates\n\n### 9.2 Interface 2: Power Supply\n\n**Protocol**: V_CC rail (typically +5V, +12V, +15V)\n\n**Collector tied to V_CC through load resistor**:\n```\nV_CC ───R_C───┬─── Collector\n              │\n```\n\n**Voltage drop budget**:\n```\nV_CC = V_RC + V_CE\n```\nWhere V_RC = I_C × R_C\n\n**Compliance**: V_CE must stay > V_CE(sat) for active region operation\n\n### 9.3 Interface 3: Analog Circuits\n\n**Protocol**: Impedance matching\n\n**Input impedance** (base):\n```\nZ_in = h_ie = β × r_e ≈ β × (V_T / I_E)\n```\nTypical: 1-10 kΩ (moderate)\n\n**Output impedance** (collector):\n```\nZ_out = r_o || R_C ≈ R_C  (if r_o >> R_C)\n```\nTypical: 1-10 kΩ\n\n**AC coupling**:\n- **Capacitor** (C_coupling): Blocks DC, passes AC\n- **Bias networks**: Set Q-point without loading signal source\n\n**Example**: Audio amplifier input stage with coupling capacitor\n\n### 9.4 Interface 4: Microcontroller GPIO\n\n**Protocol**: Current sinking/sourcing (typically 20-40 mA max per pin)\n\n**Connection**:\n```\nMCU GPIO ───R_B───→ Transistor Base\n                    (current-limited I_B)\n```\n\n**Base resistor sizing**:\n```\nR_B = (V_GPIO - V_BE) / I_B\n```\n\n**Example**: Arduino (5V GPIO) driving NPN to switch LED:\n```\nR_B = (5V - 0.7V) / (I_C/β) = 4.3V / (20mA/100) = 21.5 kΩ\n```\n\n### 9.5 Interoperability Score = 0.95\n\n**Why so high?**\n1. **Standardized pinouts** (JEDEC TO-92, SOT-23, TO-220)\n2. **Universal circuit symbols** (IEEE Std 315)\n3. **SPICE models** (all simulators support BJT)\n4. **Voltage level compatibility** (TTL/CMOS logic)\n5. **75+ years of industrial standardization**\n\n---\n\n## 10. Engineering Applications\n\n### 10.1 Amplifiers (4 configurations)\n\n#### 1. Common Emitter (CE)\n\n**Characteristics**:\n- **Voltage gain**: High (A_v ≈ -100 to -1000)\n- **Current gain**: High (A_i ≈ β)\n- **Input impedance**: Moderate (Z_in ≈ 1-10 kΩ)\n- **Output impedance**: Moderate (Z_out ≈ R_C)\n- **Phase shift**: 180° (inverting)\n\n**Applications**: General-purpose voltage amplification\n\n#### 2. Common Collector (CC) - Emitter Follower\n\n**Characteristics**:\n- **Voltage gain**: A_v ≈ 1 (unity, no voltage amplification)\n- **Current gain**: High (A_i ≈ β)\n- **Input impedance**: Very high (Z_in ≈ β × R_E)\n- **Output impedance**: Very low (Z_out ≈ r_e ≈ 26Ω)\n- **Phase shift**: 0° (non-inverting)\n\n**Applications**: Buffer, impedance matching, current amplification\n\n#### 3. Common Base (CB)\n\n**Characteristics**:\n- **Voltage gain**: High (A_v ≈ g_m × R_C)\n- **Current gain**: A_i ≈ 1 (no current amplification)\n- **Input impedance**: Very low (Z_in ≈ r_e ≈ 26Ω)\n- **Output impedance**: High (Z_out ≈ r_o)\n- **Phase shift**: 0° (non-inverting)\n\n**Applications**: High-frequency amplifiers, current-to-voltage conversion\n\n#### 4. Differential Pair\n\n**Characteristics**:\n- **Differential gain**: A_d ≈ g_m × R_C\n- **Common-mode rejection**: High CMRR (>60 dB)\n- **Input impedance**: High (2 × β × r_e)\n- **Symmetry**: Balanced inputs\n\n**Applications**: Operational amplifier input stage, comparators, ADCs\n\n### 10.2 Switches\n\n#### 1. Logic Inverter (NOT gate)\n\n**Function**: V_out = NOT(V_in)\n\n**Circuit**: See [Section 7.2](#72-mode-2-digital-switching-binary)\n\n#### 2. Transistor-Transistor Logic (TTL)\n\n**Function**: Multi-emitter input transistor → logic operations\n\n**Example**: 7400 NAND gate (4× 2-input NAND)\n\n#### 3. Motor Driver (H-Bridge)\n\n**Function**: Bidirectional DC motor control\n\n**Circuit**:\n```\n        V_CC\n         │\n    Q1 ──┴── Q2\n         │   │\n       Motor\n         │   │\n    Q3 ──┴── Q4\n         │\n        GND\n```\n\n**Control**:\n- Q1+Q4 ON → Forward\n- Q2+Q3 ON → Reverse\n- All OFF → Brake\n\n#### 4. Relay Driver\n\n**Function**: Switch high-current AC/DC loads\n\n**Circuit**:\n```\nMCU GPIO ───R_B───→ Base\n                    │\n              Collector ───→ Relay coil\n                    │\n                   GND\n```\n\n**Flyback diode**: Protects BJT from inductive kick\n\n### 10.3 Oscillators\n\n#### 1. Colpitts Oscillator (LC tank)\n\n**Frequency**:\n```\nf = 1 / (2π √(L × C_eq))\n```\nWhere C_eq = C1 || C2\n\n**Applications**: RF signal generation (MHz-GHz)\n\n#### 2. Phase-Shift Oscillator (RC network)\n\n**Frequency**:\n```\nf = 1 / (2π √6 × R × C)\n```\n\n**Applications**: Audio frequency generation (Hz-kHz)\n\n#### 3. Astable Multivibrator (Square wave)\n\n**Frequency**:\n```\nf ≈ 1 / (0.7 × (R1×C1 + R2×C2))\n```\n\n**Applications**: Clock generation, LED blinker\n\n### 10.4 Voltage Regulators\n\n#### Linear Regulator (Pass Transistor)\n\n**Circuit**:\n```\nV_in ───┬─── Collector\n        │        │\n       Zener    Load\n        │        │\n       GND      GND\n```\n\n**Operation**: Zener sets V_BE, transistor drops excess voltage\n\n**Efficiency**: Poor (~30-50%, dissipates P = (V_in - V_out) × I_out)\n\n#### Current Source/Sink\n\n**Circuit**: BJT with emitter resistor\n\n**I_out**:\n```\nI_out = (V_BE - V_E) / R_E ≈ V_E / R_E  (if V_BE is fixed)\n```\n\n**Applications**: Active load in amplifiers, LED driver\n\n---\n\n## 11. Transdisciplinary Validation\n\n### 11.1 Analogous Processors (3 domains)\n\n#### 1. Biology: Neuron (Biological Amplifier)\n\n**Domain**: Neuroscience\n\n**Inputs**:\n- **Synaptic currents** (I_syn): Excitatory/inhibitory postsynaptic currents\n- **Membrane potential** (V_m): Resting ≈ -70 mV\n\n**Output**:\n- **Action potential** (spike train): All-or-nothing voltage pulse\n\n**Processing mechanism**:\n- **Na⁺/K⁺ ion channels**: Voltage-gated (threshold behavior)\n- **Amplification**: Small I_syn → large Na⁺ influx (positive feedback)\n- **Threshold**: V_m ≈ -55 mV (spike initiation)\n\n**Similarity**:\n- Small input current triggers large output current\n- Threshold behavior (spike initiation ≈ transistor cutoff→active)\n- Amplification via positive feedback (Na⁺ channels ≈ carrier injection)\n\n#### 2. Hydraulics: Servo Valve Amplifier\n\n**Domain**: Hydraulic Engineering\n\n**Inputs**:\n- **Control current** (solenoid): mA-range electrical signal\n- **Supply pressure**: 1000-5000 psi hydraulic\n\n**Output**:\n- **Hydraulic flow**: High-pressure fluid to actuator (gallons/min)\n\n**Processing mechanism**:\n- **Pilot stage**: Small solenoid → spool valve displacement\n- **Main stage**: Spool position controls large hydraulic flow\n\n**Similarity**:\n- Small electrical signal controls large hydraulic power\n- Proportional amplification in linear region\n- Power gain >10,000 (similar to BJT)\n\n#### 3. Acoustics: Electret Microphone (with FET buffer)\n\n**Domain**: Audio Engineering\n\n**Inputs**:\n- **Sound pressure** (acoustic): Vibrates diaphragm\n- **Bias voltage**: +1.5 to +9V\n\n**Output**:\n- **Audio signal** (electrical): Voltage proportional to sound pressure\n\n**Processing mechanism**:\n- **Capacitance variation**: Diaphragm motion → C(t)\n- **Voltage change**: ΔV = Q / ΔC\n- **FET amplification**: Impedance buffering + gain\n\n**Similarity**:\n- Transduction + amplification (like BJT with sensor)\n- Signal conditioning (amplification + impedance transformation)\n- Low-noise processing\n\n### 11.2 Processor Pattern Validation\n\n**Universal Processor characteristics validated**:\n\n1. ✅ **Dual/Triple N-ary I/O**: Transistor (I_B, V_CE, V_E) → I_C\n2. ✅ **Transformation**: I_B → I_C conversion (β gain)\n3. ✅ **Resource management**: Electrical energy consumption (P_D = V_CE × I_C)\n4. ✅ **Flow control**: Electron/hole currents regulated by I_B\n5. ✅ **Interoperability**: Standardized interfaces (pinouts, SPICE, TTL/CMOS)\n\n**Transdisciplinary strength**: Pattern holds across Biology, Hydraulics, Acoustics, Electronics\n\n---\n\n## 12. Key Insights\n\n### 12.1 Processor GenericConcept Validation\n\n1. **First electronic Processor** ✅\n   - BJT validates Processor GenericConcept in electronics domain\n   - Triple inputs (I_B, V_CE, V_E) → single output (I_C)\n   - Ternary hybrid formulas necessary for complete representation\n\n2. **Dual-mode operation validated** ✅\n   - Linear (amplification) vs Digital (switching) demonstrates **Mode** GenericConcept\n   - Same device, different operating regimes\n   - Validates multi-mode processor concept\n\n3. **Amplification dimension critical** ✅\n   - Current gain β = 50-500\n   - Voltage gain A_v up to 1000\n   - **Power gain >10,000** (40 dB) demonstrates true amplification\n   - Justifies Amplification as distinct GenericConcept\n\n4. **Interoperability essential** ✅\n   - Standardized symbols (IEEE Std 315)\n   - Standardized pinouts (JEDEC TO-92, SOT-23, TO-220)\n   - Universal SPICE models\n   - **Interoperability score 0.95** (highest REVOI dimension)\n   - Standardization critical for transistor ubiquity (>10²¹ manufactured!)\n\n5. **Threshold sharpness enables digital** ✅\n   - Exponential I_C(V_BE) relationship creates sharp cutoff-to-active transition\n   - Enables digital logic despite continuous physics\n   - Validates threshold behavior as processor characteristic\n\n6. **Excellent REVOI score (0.86)** ✅\n   - Reflects mature semiconductor theory (75+ years)\n   - Extensive industrial standardization\n   - Complete mathematical models (Ebers-Moll, Gummel-Poon)\n\n7. **Minimal epistemic gap (0.01)** ✅\n   - With M0_Kidneys, best gap in framework\n   - Reflects perfect understanding of semiconductor physics\n   - Analytical models predict behavior with high accuracy\n\n### 12.2 Architectural Insights\n\n1. **Ternary hybrid formulas justified** ✅\n   - Territory needs Transformation+Flow+Resource (charge physics)\n   - Map needs Transformation+Representation+Interoperability (circuit model)\n   - Binary formulas insufficient for processors\n\n2. **Symmetric formulas** ✅\n   - Processor: Territory(3) + Map(3) = **symmetric**\n   - vs Cascade: Territory(3) + Map(2) = asymmetric\n   - Suggests balanced empirical/conceptual nature of processors\n\n3. **Sharp threshold despite continuous physics** ✅\n   - Exponential I_C(V_BE) enables digital operation\n   - Foundation of digital computing (billions of transistors/chip)\n   - Demonstrates threshold as emergent property\n\n### 12.3 Historical Impact\n\n1. **Invention** (1947-1948) 🏆\n   - Point-contact transistor (Bardeen, Brattain, Shockley - Bell Labs)\n   - Nobel Prize in Physics (1956)\n   - **Most significant invention of 20th century** (arguably)\n\n2. **Microelectronics Revolution** ⚡\n   - Enabled: Computers, telecommunications, consumer electronics\n   - **>10²¹ transistors manufactured** (most manufactured device in history!)\n   - Moore's Law: Transistor count doubles ~every 2 years (1965-2020+)\n\n3. **Evolution** 🔄\n   - BJT → JFET → **MOSFET** (dominant modern technology)\n   - BJT still used: High-frequency RF, high-power, precision analog\n\n### 12.4 Methodological Insights\n\n1. **Poclet as validation tool** ✅\n   - BJT validates framework extension to electronics\n   - Demonstrates framework generalization to new domains\n   - Provides template for future electronic processors (MOSFET, JFET, etc.)\n\n2. **Transdisciplinary pattern** ✅\n   - Processor pattern validated across 4 domains (Electronics, Biology, Hydraulics, Acoustics)\n   - Universal characteristics confirmed\n   - Justifies GenericConcept status (not domain-specific)\n\n3. **Minimal epistemic gap achievement** ✅\n   - Only 2 poclets with gap ≤0.01 (Transistor, Kidneys)\n   - Reflects mature scientific understanding\n   - Provides benchmark for other processors\n\n---\n\n## 13. Simulation (transistor_sim.py) — v2.0\n\nInteractive Pygame simulation with **device-selector tab** (BJT NPN / MOSFET NMOS). Both devices show their full operating mode table with live highlighting.\n\n### Device Selector\n\nA tab bar at the top of the centre panel switches between the two devices. All sliders, the I-V plane, the schematic, and the mode table update accordingly.\n\n---\n\n### BJT NPN — Four Operating Modes\n\n| # | Mode | Colour | B-E Junction | B-C Junction | State | Application |\n|---|------|--------|-------------|-------------|-------|-------------|\n| 1 | **Cutoff** | ⬜ Gray | Reverse | Reverse | **Open switch** | Digital LOW, relay OFF |\n| 2 | **Forward Active** | 🟦 Blue | Forward | Reverse | **Amplifier** | Audio amp, RF, op-amp |\n| 3 | **Saturation** | 🟧 Orange | Forward | Forward | **Closed switch** | Digital HIGH, LED ON |\n| 4 | **Reverse Active** | 🟪 Purple | Reverse | Forward | **Poor amplifier** | Legacy TTL (rare) |\n\n**Sliders**: I_B (0–100 μA) · V_CE (0–20 V) · β (50–500)\n\n**I-V plane**: Family of I_C vs V_CE curves for I_B ∈ {10, 20, 30, 40, 60, 80, 100 μA}. Q-point coloured by active mode.\n\n---\n\n### MOSFET NMOS — Three Operating Modes\n\n| # | Mode | Colour | Condition | State | Application |\n|---|------|--------|-----------|-------|-------------|\n| 1 | **Cutoff** | ⬜ Gray | V_GS < V_th | **Open switch** | CMOS logic OFF |\n| 2 | **Triode / Linear** | 🟩 Green | V_GS > V_th, V_DS < V_GS−V_th | **Voltage-ctrl. resistor** | Power switch ON |\n| 3 | **Saturation / Pinch-off** | 🟦 Blue | V_GS > V_th, V_DS ≥ V_GS−V_th | **Amplifier** | MOSFET amp, CMOS logic |\n\n**Sliders**: V_GS (0–5 V) · V_DS (0–10 V) · V_th (0.5–3 V)\n\n**I-V plane**: Family of I_D vs V_DS curves for V_GS above V_th. Triode/Saturation boundary parabola overlaid.\n\n---\n\n### ⚠ Naming Inversion Warning\n\n> **BJT \"Saturation\"** (switch fully ON) ≠ **MOSFET \"Saturation\"** (amplifier region)  \n> The simulation highlights this trap with a warning badge when both mode tables are compared.\n\n| Functional state | BJT name | MOSFET name |\n|-----------------|----------|-------------|\n| Switch fully ON | **Saturation** 🟧 | **Triode / Linear** 🟩 |\n| Amplifier | **Forward Active** 🟦 | **Saturation** 🟦 |\n| Switch OFF | **Cutoff** ⬜ | **Cutoff** ⬜ |\n\nThe shared blue colour for both amplifier modes visually reinforces the functional equivalence.\n\n---\n\n### TSCG Connections\n\n- **m2:Mode** — the tab selector is the direct realisation of the Mode GenericConcept: same physical device, different operating regime\n- **m2:Threshold** — the Cutoff→Active transition (BJT: V_BE ≈ 0.65 V; MOSFET: V_GS = V_th) is explicit in both I-V planes\n- **m2:Amplification** — peaks in the Active / MOSFET-Saturation region; ASFID-A bar drops outside it\n- **m2:Polarity** — the BJT Reverse Active mode demonstrates polarity inversion (B-E ↔ B-C roles swapped)\n\n### Requirements & Usage\n\n```bash\npip install pygame numpy\npython transistor_sim.py\npython transistor_sim.py path/to/M0_Transistor.jsonld\n```\n\n---\n\n## 14. References\n\n### 14.1 Semiconductor Physics\n\n1. **Streetman & Banerjee** - Solid State Electronic Devices (7th ed.)\n   - Chapters 5-6: Bipolar Junction Transistors\n\n2. **Sze & Ng** - Physics of Semiconductor Devices (3rd ed.)\n   - Chapter 3: Bipolar Transistors and Related Devices\n\n3. **Neamen** - Semiconductor Physics and Devices (4th ed.)\n   - Chapter 12: The Bipolar Transistor\n\n### 14.2 Circuit Design\n\n1. **Sedra & Smith** - Microelectronic Circuits (8th ed.)\n   - Chapters 5-7: BJT circuits, amplifiers, frequency response\n\n2. **Horowitz & Hill** - The Art of Electronics (3rd ed.)\n   - Chapter 2: Bipolar Transistors\n\n3. **Gray & Meyer** - Analysis and Design of Analog Integrated Circuits (5th ed.)\n   - Chapter 1: Models for Integrated-Circuit Active Devices\n\n### 14.3 Historical\n\n1. **Riordan & Hoddeson** - Crystal Fire: The Invention of the Transistor\n\n2. **Shockley** - Electrons and Holes in Semiconductors (1950)\n\n### 14.4 TSCG Framework\n\n1. **M2_GenericConcepts.jsonld** (v15.0.0)\n2. **Poclet_Analysis_Methodology.md**\n\n---\n\n**End of M0_Transistor README**\n\n*Echopraxium with the collaboration of Claude AI*  \n*Version 15.2.0 - 2026-02-24*\n"},{"id":"TrophicPyramid","label":"Trophic Pyramid System","domain":"Ecology / Biology","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/TrophicPyramid/static/M0_TrophicPyramid.html","hasReadme":true,"readme":"# M0_TrophicPyramid — TSCG Poclet\n\n**File:** `instances/poclets/TrophicPyramid/M0_TrophicPyramid.jsonld`\n**Version:** 2.1.0 · **Date:** 2026-04-02\n**Author:** Echopraxium with the collaboration of Claude AI\n**Domain:** Ecology / Biology — Trophodynamics, Community Ecology, Thermodynamics of Ecosystems, Anthropocene Ecology\n**Reference (trophic model):** Lindeman R.L. (1942) *The Trophic-Dynamic Aspect of Ecology*, Ecology 23(4):399–417\n**Reference (AP model):** Meadows D.H. et al. (1972) *The Limits to Growth*, Club of Rome / Universe Books, New York\n\n---\n\n## 1. System Overview\n\nA **Trophic Pyramid** is a hierarchical ecological structure in which each trophic level consumes biomass from the level below and dissipates approximately 90% of received energy as metabolic heat (respiration, faeces, uneaten biomass). This law-like thermodynamic constraint — **Lindeman's 10% efficiency rule** — creates an inescapable pyramidal shape: as rank increases, available energy budget decreases by one order of magnitude per level.\n\nThis poclet extends the classical model with two additions:\n\n1. **Level 6 — Humanity** as a supra-trophic super-predator that bypasses Lindeman's rule via fossil fuel energy, consuming simultaneously at all levels and exerting global meta-regulatory control.\n2. **Anthropic Pressure (AP)** — a normalised scalar ∈ [0, 1] quantifying the combined impact of fossil fuel exploitation and extractive mining on trophic biodiversity, grounded in Meadows et al. (1972) *The Limits to Growth* overshoot-and-collapse scenario.\n\nThe pyramid is simultaneously:\n- A **structural pattern** (ordered positional strata — `m2:Layer`)\n- A **thermodynamic funnel** (irreversible energy loss — `m2:Dissipation`)\n- An **epistemic object** (universally representable, verifiable and inter-operable across biomes — `m2:Context`)\n- An **anthropogenic target** (all levels under top-down pressure from humanity — `AnthropogenicDomination`)\n\n### TSCG Synergy Formulas\n\n```\nStratifiedDissipation   = Biology ⊙ (m2:Layer ⊗ m2:Dissipation)\nCompiled tensor:          S ⊗ I ⊗ A ⊗ R ⊗ F ⊗ D\n\nAnthropogenicDomination = Biology ⊙ (m2:Transducer ⊗ m2:Regulation ⊗ m2:Entropy)\nCompiled tensor:          F ⊗ I ⊗ A ⊗ S ⊗ D\n```\n\n---\n\n## 2. Architecture — 6 Trophic Poles\n\n| Pole | Trophic Level | Rank | Biomass (terrestrial) | Energy available |\n|------|--------------|------|-----------------------|-----------------|\n| `level_1_producers` | Primary Producers (Autotrophs) | 1 | ~99% | 10 000 kJ/m²/yr |\n| `level_2_herbivores` | Primary Consumers (Herbivores) | 2 | ~1% | 1 000 kJ/m²/yr |\n| `level_3_carnivores` | Secondary Consumers (Carnivores) | 3 | ~0.1% | 100 kJ/m²/yr |\n| `level_4_apex` | Apex Predators (Tertiary Consumers) | 4 | ~0.01% | 10 kJ/m²/yr |\n| `level_5_decomposers` | Decomposers (base — transversal) | ⟂ | variable | 40–60% of total flux |\n| `level_6_humanity` | Humanity (Supra-Trophic Super-Predator) | meta | ~0.01% biomass / ~35% NPP | ~21 000 kJ/m²/yr (fossil bypass) |\n\n### Visualisation Convention — Split Base\n\nDecomposers are represented as the **right compartment of the pyramid base**, bisected vertically from Level 1 Producers (left compartment). The total base width is fixed; each compartment rescales dynamically with AP:\n\n```\n        /\\\n       /L4\\\n      /----\\\n     /  L3  \\\n    /--------\\\n   /    L2    \\\n  /------------\\\n /      L1      \\\n/-------+--------\\\n│  L1   │  Deco  │\n│Producers│posers│\n└───────┴────────┘\n```\n\nThis preserves the pyramid as a unified geometric form while correctly representing the transversal nature of decomposers (`rank = \"base-level (transversal)\"`).\n\n### Structural Invariants\n\nThree constraints ensure natural pyramid integrity (AP = 0):\n\n1. **Lindeman Efficiency** — `η = E_(n+1)/E_n ≈ 0.10` (thermodynamic; violation → collapse)\n2. **Positional Ordering** — strict total order on trophic ranks; no cyclic predation at the same level\n3. **Autotrophic Base** — `Biomass(Producers) ≥ Σ Biomass(all other levels)`\n\nA fourth constraint governs the anthropogenic dimension:\n\n4. **Anthropic Pressure Threshold** — `AP_crit = 0.70` (above this, cascade is irreversible — m2:Entropy)\n\n---\n\n## 3. TSCG Bicephalous Analysis\n\n### 3.1 Eagle Eye (ASFID — Territory Space)\n\n| Dimension | Score | Interpretation |\n|-----------|-------|----------------|\n| **A** Attractor | **0.97** | Dual attractor: Lindeman's thermodynamic basin (universal) + anthropogenic meta-attractor (global ecosystem dominance by humanity). No ecosystem escapes either basin. |\n| **S** Structure | **0.92** | Discrete, ordered strata stable across biomes + humanity's meta-layer (agriculture, cities, fishing fleets) overlying all natural levels. |\n| **F** Flow | **0.97** | Bottom-up energy flow + top-down cascades + fossil-fuel bypass (~20 000 kJ/m²/yr exceeding natural primary production). |\n| **I** Information | **0.90** | Trophic position encodes metabolic role + biomagnification of toxins. Humanity adds unprecedented information processing (technology, global monitoring, conservation science). |\n| **D** Dynamics | **0.95** | Lotka-Volterra oscillations, trophic cascades + 6th mass extinction, climate change, habitat destruction. Anthropocene dynamics now dominate. |\n\n**ASFID mean = 0.94**\n\n### 3.2 Sphinx Eye (REVOI — Map Space)\n\n| Dimension | Score | Interpretation |\n|-----------|-------|----------------|\n| **R** Representability | **0.85** | Classic pyramid diagram iconic but strained by humanity as meta-level: a single species commanding all levels simultaneously challenges standard representational conventions. |\n| **E** Evolvability | **0.80** | Core thermodynamic structure constrained (Lindeman). Model gains evolvability: Anthropocene scenarios, rewilding, climate-driven trophic shifts, AP trajectory modelling. |\n| **V** Verifiability | **0.85** | Lindeman's law validated across hundreds of ecosystems. Human impact harder to quantify: HANPP estimated at 30–40% globally; AP calibration requires Earth System Science methods. |\n| **O** Observability | **0.90** | Species identifiable, populations countable. Human activities highly observable via satellite, fishery data, IUCN Red List, Living Planet Index. |\n| **I** Interoperability | **0.95** | Bridges thermodynamics, evolutionary biology, biogeochemistry, conservation biology, economics (ecosystem services), Earth System Science, *Limits to Growth* modelling. |\n\n**REVOI mean = 0.87**\n\n### 3.3 Epistemic Gap\n\n```\nδ = |ASFID_mean − REVOI_mean| = |0.94 − 0.87| = 0.07  →  OnCriticalLine [0.05, 0.15)\n```\n\nGap increased from 0.05 (v1.0.0, Coherent) to 0.07 (v2.x, OnCriticalLine) with the addition of humanity and AP. Main residual gaps on A/R, S/E and F/V axes (+0.12 each): the meta-trophic attractor and fossil-fuel bypass are empirically undeniable but harder to represent and verify than classical trophic levels.\n\n**Balance type:** Eagle Eye dominant — thermodynamic + anthropogenic empirical grounding.\n\n---\n\n## 4. GenericConcepts Mobilised\n\n### Primary\n\n| GenericConcept | Formula | Role in Trophic Pyramid |\n|----------------|---------|------------------------|\n| `m2:Layer` | S⊗I⊗A⊗R | **Structural backbone** — each trophic level IS a Layer. 5 ordered positional partitions. |\n| `m2:Dissipation` | F⊗D | **Core mechanism** — ~90% energy lost as heat at each trophic boundary. Lindeman's 10% rule. |\n| `m2:Context` | O⊗R⊗Im⊗E | **Epistemic frame** — the biome context (tropical, arctic, marine) determines which species fill each Layer. Same trophic structure, different species across contexts. |\n\n### Secondary\n\n| GenericConcept | Formula | Role |\n|----------------|---------|------|\n| `m2:Hierarchy` | A⊗S | Positional ordering base → apex |\n| `m2:Flow` | F | Energy/biomass transfer between levels |\n| `m2:Gradient` | ⊗₂F | Energy density gradient from base to apex |\n| `m2:Homeostasis` | A⊗S⊗F⊗I⊗D | Ecosystem equilibrium under perturbation |\n| `m2:Regulation` | A⊗S⊗F | Predator-prey feedback loops + anthropogenic meta-regulation |\n| `m2:Cascade` | ⊗⇒(Process,Step,Trajectory) | Natural trophic cascade + Anthropogenic super-cascade |\n| `m2:Threshold` | A⊗I⊗F | Minimum viable population; AP_crit = 0.70 (irreversible collapse) |\n| `m2:Network` | S⊗F⊗I | Food web underlying the pyramid |\n| `m2:Emergence` | — | Ecosystem services (pollination, carbon sequestration) |\n| `m2:Transducer` | F⊗I | Humanity converts geological energy into trophic control (fossil-fuel bypass) |\n| `m2:Entropy` | D⊗F | Accelerated irreversibility: mass extinction = absorbing state; AP ≥ 0.70 seals cascade |\n| `m2:Processor` | I | Humanity's technological information processing enabling supra-trophic strategy |\n\n**Total M2 GenericConcepts mobilised: 15**\n\n---\n\n## 5. KnowledgeFieldConceptCombos\n\n### 5.1 StratifiedDissipation\n\n**StratifiedDissipation** is the core `KnowledgeFieldConceptCombo` introduced by this poclet, defined in `M1_Biology.jsonld`:\n\n```\nStratifiedDissipation = Biology ⊙ (Layer ⊗ Dissipation)\nQualification operator:  ⊙ (disciplinary, not tensor product)\nCompiled tensor formula: S ⊗ I ⊗ A ⊗ R ⊗ F ⊗ D\nDominant dimensions:     S, I, A (Layer scaffold) + F, D (Dissipation engine)\n```\n\n**Semantics:** Energy dissipation *structured* by stable positional strata. `Layer` provides the spatial/positional scaffold; `Dissipation` provides the thermodynamic engine. Their combination produces the pyramidal biomass distribution as an emergent property. Empirical law: Lindeman's 10% rule — `η ≈ 0.1` at each trophic boundary.\n\n### 5.2 AnthropogenicDomination\n\n**AnthropogenicDomination** is the second `KnowledgeFieldConceptCombo`, capturing humanity's supra-trophic role:\n\n```\nAnthropogenicDomination = Biology ⊙ (Transducer ⊗ Regulation ⊗ Entropy)\nCompiled tensor formula:  F ⊗ I ⊗ A ⊗ S ⊗ D\nDominant dimensions:      F, I, A, D\n```\n\n**Semantics:** Humanity as a meta-transducer converting geological energy (fossil fuels) into ecosystem regulation, amplifying global entropy through mass extinction and climate forcing. Unlike StratifiedDissipation (thermodynamic law), AnthropogenicDomination is a contingent but now dominant meta-pattern of the Anthropocene.\n\n---\n\n## 6. Anthropic Pressure (AP) Model\n\nGrounded in Meadows et al. (1972) **\"The Limits to Growth\"** (Club of Rome), the AP model operationalises the overshoot-and-collapse scenario as a single trophic pressure parameter.\n\n### 6.1 Definition\n\n```\nAP ∈ [0.0, 1.0]\nAP = 0.0  →  pre-industrial natural pyramid (Lindeman baseline)\nAP = 0.46 →  current situation (2024 estimate)\nAP = 0.70 →  AP_crit — irreversible cascade threshold\nAP = 1.00 →  maximum exploitation — full pyramid collapse\n```\n\n**Drivers:** fossil fuel extraction (CO₂/CH₄ → acidification, warming, habitat loss) + extractive mining (direct habitat destruction, freshwater pollution).\n\n### 6.2 Biomass Impact Formulas\n\nTop-down cascade: Level 4 collapses first; decomposers exhibit non-monotonic irruption then collapse.\n\n| Level | Formula B_n(AP) | Collapses at |\n|-------|----------------|-------------|\n| L4 Apex | `max(0, 1.0 − 3.0 × AP)` | AP = 0.33 |\n| L3 Carnivores | `max(0, 1.0 − 2.0 × AP)` | AP = 0.50 |\n| L2 Herbivores | `(1 + 0.5×AP) × max(0, 1.0 − 1.8×AP)` | AP ≈ 0.55 (irruption peak ~AP=0.28) |\n| L1 Producers | `max(0, 1.0 − 1.0 × AP)` | AP = 1.00 |\n| Decomposers | `(1 + 0.8×AP) × max(0, 1.0 − 3.0 × max(0, AP−0.6))` | AP ≈ 0.93 (irruption peak ~AP=0.60) |\n\n### 6.3 Limits to Growth — Scenario Mapping\n\n| LtG Scenario | AP value | Outcome |\n|---|---|---|\n| Pre-industrial baseline | 0.00 | Natural Lindeman pyramid |\n| 1972 (publication year) | ~0.20 | Moderate stress, L4 declining |\n| 2024 (current) | ~0.46 | L4 severely reduced, L3 declining, L2 irruption |\n| BAU 2050 | ~0.85 | Past AP_crit — irreversible collapse underway |\n| Stabilised transition | ~0.50 | Aggressive decarbonisation + rewilding |\n| Recovery 2100 | ~0.35 | Full energy transition + ecosystem restoration |\n\nThe **\"standard run\"** of *Limits to Growth* maps directly onto crossing AP_crit = 0.70 between 2030 and 2050, triggering the `m2:Entropy` absorbing state.\n\n---\n\n## 7. Special Dynamics — Trophic Cascade\n\nThe **Trophic Cascade** is the most dramatic emergent behaviour of the pyramid system. When an apex predator is removed:\n\n```\nStep 1: Apex predators → removed / collapsed\nStep 2: Secondary consumers → released from predation → irruption\nStep 3: Herbivores → intensified predation → collapse\nStep 4: Producers → released from herbivory → vegetation restructuring\nStep 5: Geomorphic / hydrological cascades follow (rivers, soil composition)\n```\n\n**Empirical signature:** Yellowstone wolf reintroduction (1995) — rivers changed course as elk grazing patterns shifted, triggering geomorphic changes. This phenomenon (\"the wolves that changed rivers\") is the most famous trophic cascade in conservation biology.\n\nGenericConcepts mobilised by cascade: `m2:Cascade`, `m2:Threshold`, `m2:Regulation`, `m2:Homeostasis`, `m2:Bifurcation`.\n\n---\n\n## 8. m2:Context — Biome-Dependent Layer Filling\n\nThe `m2:Context` GenericConcept (O⊗R⊗Im⊗E) finds its clearest ecological instantiation in the biome-specific filling of trophic Layers:\n\n| Context (Biome) | Level 1 | Level 2 | Level 3 | Level 4 | Humanity (Level 6) |\n|-----------------|---------|---------|---------|---------|-------------------|\n| Tropical Rainforest | Canopy trees, epiphytes | Leaf-cutter ants, tapirs | Ocelots, harpy eagles | Jaguars, anacondas | Deforestation, agribusiness, bushmeat trade |\n| Arctic Tundra | Mosses, lichens, sedges | Lemmings, caribou | Arctic fox | Polar bear, wolf | Oil extraction, climate forcing, trophy hunting |\n| Open Ocean | Phytoplankton | Zooplankton, krill | Herring, anchovy | Tuna, sharks, orca | Industrial fishing, ocean acidification, plastic pollution |\n\nSame `m2:Layer` hierarchy; radically different species filling each stratum. The **Context** (`O⊗R⊗Im⊗E`) is the epistemic frame that conditions which species are observable, representable, interoperable across scientific communities, and evolvable over geological time.\n\n---\n\n## 9. TSCG Framework Contributions\n\n| Layer | Contribution | Type |\n|-------|-------------|------|\n| **M2** | `m2:Layer` (S⊗I⊗A⊗R) — validated by Trophic Pyramid + 6 other domains | GenericConcept |\n| **M2** | `m2:Context` (O⊗R⊗Im⊗E) — validated across biomes and disciplines | GenericConcept |\n| **M2** | `m2:Transducer`, `m2:Entropy`, `m2:Processor` — mobilised by humanity / AP model | GenericConcepts |\n| **M1_Biology** | `StratifiedDissipation` — KnowledgeFieldConceptCombo (Biology ⊙ Layer⊗Dissipation) | New M1 concept |\n| **M1_Biology** | `AnthropogenicDomination` — KnowledgeFieldConceptCombo (Biology ⊙ Transducer⊗Regulation⊗Entropy) | New M1 concept |\n| **M0** | `M0_TrophicPyramid.jsonld` — 6-pole poclet with AP model, trophic cascade, humanity as super-predator | Poclet |\n\n---\n\n## 10. Repository Location\n\n```\ninstances/\n  poclets/\n    TrophicPyramid/\n      M0_TrophicPyramid.jsonld      ← Ontology (v2.1.0)\n      M0_TrophicPyramid_README.md   ← This file\n      sim/\n        index.html                  ← Standalone HTML simulation (static)\n```\n\n---\n\n## 11. References\n\n- Lindeman R.L. (1942) — *The Trophic-Dynamic Aspect of Ecology*, Ecology 23(4):399–417\n- Meadows D.H., Meadows D.L., Randers J., Behrens W.W. (1972) — *The Limits to Growth*, Club of Rome / Universe Books, New York (**AP model basis**)\n- Elton C.S. (1927) — *Animal Ecology*, Sidgwick & Jackson, London (first food chain concept)\n- Hairston N.G., Smith F.E., Slobodkin L.B. (1960) — *Community structure, population control, and competition*, American Naturalist 94(879):421–425\n- Ripple W.J. et al. (2014) — *Status and Ecological Effects of the World's Largest Carnivores*, Science 343(6167)\n- Paine R.T. (1966) — *Food Web Complexity and Species Diversity* (keystone species concept)\n- Bar-On Y.M., Phillips R., Milo R. (2018) — *The biomass distribution on Earth*, PNAS 115(25):6506–6511 (humanity + livestock biomass data)\n- IPBES (2019) — *Global Assessment Report on Biodiversity and Ecosystem Services* (1 million threatened species)\n\n---\n\n*Generated by TSCG Framework v15.11.0 — Echopraxium with the collaboration of Claude AI — 2026-04-02*\n"},{"id":"Vco","label":"Voltage Controlled Oscillator","domain":"Music / Electronics","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/Vco/static/M0_VCO.html","hasReadme":true,"readme":"# M0_VCO — Voltage Controlled Oscillator\n\n**TSCG Poclet · Electronics / Modular Synthesis · v1.0.0**  \n*Author: Echopraxium with the collaboration of Claude AI*\n\n---\n\n## Overview\n\nA **VCO (Voltage Controlled Oscillator)** is the fundamental pitch-generation component of a modular synthesizer. It produces a periodic audio-frequency waveform whose frequency is controlled by an input voltage following the **V/Oct standard** (1 volt per octave).\n\nThis poclet is the **first M0 instantiation of `m2:Oscillator`** (introduced in M2 v15.8.0), validating the GenericConceptCombo in the Electronics / Music Technology domain.\n\n---\n\n## TSCG Positioning\n\n| Layer | Concept | Role |\n|---|---|---|\n| **M3** | ASFID (Eagle Eye) | Territory: S, A, F, I, D |\n| **M2** | `m2:Oscillator` | Primary — `⊗⇒(Component, Process, Trajectory\\|Circular)` |\n| **M2** | `m2:Amplification` | V/Oct exponential CV→frequency mapping |\n| **M2** | `m2:Transformation` | CV domain → audio frequency domain |\n| **M2** | `m2:Mode` | Waveform selector (N=4: Sine, Square, Triangle, Sawtooth) |\n| **M2** | `m2:Signal` | Audio output waveform |\n| **M0** | `m0:VCO` | This poclet |\n\n### Why `m2:Oscillator` and not just `m2:Process`?\n\nThe VCO is a **system component** — a bounded, identifiable, patchable module, not just an abstract process. Subclassing `m2:Component` adds **S** (Structure) and unlocks full ASFID 5D coverage: `S ⊗ A ⊗ I ⊗ D ⊗ F`.\n\n---\n\n## ASFID Analysis\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **A** | 0.90 | Target frequency `f = f₀ × 2^(CV)` — circular attractor |\n| **S** | 0.75 | Integrator core, V/Oct converter, waveform shaper, buffers |\n| **F** | 0.85 | Audio output ±5V, CV input, FM input |\n| **I** | 0.80 | Phase φ(t), waveform shape, pitch CV |\n| **D** | 0.90 | V/Oct law: `f(CV) = f₀ × 2^(CV/1V)` |\n| **Total** | **0.84** | Epistemic gap: **0.16** |\n\n---\n\n## REVOI Analysis\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **R** | 0.90 | Closed-form formula, analytic Fourier waveforms |\n| **E** | 0.85 | FM, hard sync, PWM, wavetable extend cleanly |\n| **V** | 0.95 | Frequency counter, oscilloscope, FFT |\n| **O** | 0.95 | All state variables directly measurable |\n| **I** | 0.95 | V/Oct universal Eurorack standard |\n| **Total** | **0.92** | Map-strong: highest REVOI in Combo family |\n\n---\n\n## The V/Oct Law\n\n```\nf(CV) = f₀ × 2^(CV / 1V)\n\nCV =  0V  →  440 Hz  (A4)\nCV = +1V  →  880 Hz  (A5,  +1 octave)\nCV = +2V  → 1760 Hz  (A6,  +2 octaves)\nCV = -1V  →  220 Hz  (A3,  -1 octave)\nCV = 1/12 V ≈ 83 mV  →  A#4  (+1 semitone)\n```\n\n---\n\n## Waveform Modes (`m2:Mode`, N=4)\n\n| Mode | Harmonics | Timbre |\n|---|---|---|\n| **Sine** | Fundamental only | Pure, flute-like |\n| **Square** | Odd (1/n) | Hollow, woodwind |\n| **Triangle** | Odd (1/n²) | Soft, mellow |\n| **Sawtooth** | All (1/n) | Bright, string/brass |\n\n---\n\n## Interfaces\n\n### Inputs\n| Jack | Signal | ASFID | Description |\n|---|---|---|---|\n| `PITCH` | CV V/Oct | A + D | Primary frequency control |\n| `FM` | ±5V | D + F | Frequency modulation |\n| `SYNC` | Gate | I + D | Hard sync — resets phase |\n\n### Outputs\n| Jack | Level | Description |\n|---|---|---|\n| `SIN` | ±5V | Sine |\n| `SQR` | ±5V | Square |\n| `TRI` | ±5V | Triangle |\n| `SAW` | ±5V | Sawtooth |\n\n---\n\n## Transdisciplinary Analogies\n\n| Domain | Analogue | CV equivalent |\n|---|---|---|\n| Biology | Cardiac pacemaker (SA no // ── Tag management ────────────────────────────────────────────────────────────

function populateTagSelect() {
  const allTags = new Set();
  POCLETS.forEach(p => {
    if (p.domain) {
      // Split domain by "/" to create individual tags
      p.domain.split('/').forEach(tag => {
        const trimmed = tag.trim();
        if (trimmed) allTags.add(trimmed);
      });
    }
  });
  const sorted = [...allTags].sort();
  const select = document.getElementById('tag-select');
  sorted.forEach(tag => {
    const opt = document.createElement('option');
    opt.value = tag;
    opt.textContent = tag;
    select.appendChild(opt);
  });
}

function getTagColor(tag) {
  let hash = 0;
  for (let i = 0; i < tag.length; i++) {
    hash = tag.charCodeAt(i) + ((hash << 5) - hash);
  }
  return Math.abs(hash) % 8;
}

function renderSelectedTags() {
  const container = document.getElementById('selected-tags');
  const clearBtn = document.getElementById('clear-tags-btn');
  
  if (selectedTags.size === 0) {
    container.innerHTML = '<div class="selected-tags-empty">No tags selected</div>';
    clearBtn.disabled = true;
    return;
  }
  
  clearBtn.disabled = false;
  
  let html = '';
  selectedTags.forEach(tag => {
    const colorClass = 'tag-color-' + getTagColor(tag);
    html += '<div class="tag-pill ' + colorClass + '" data-tag="' + esc(tag) + '">' +
      '<span>' + esc(tag) + '</span>' +
      '<span class="tag-remove">✕</span>' +
      '</div>';
  });
  
  container.innerHTML = html;
  
  container.querySelectorAll('.tag-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const tag = pill.dataset.tag;
      selectedTags.delete(tag);
      renderSelectedTags();
      filterPoclets();
    });
  });
}

function filterPoclets() {
  const items = document.querySelectorAll('.tree-item');
  let visibleCount = 0;
  let firstVisibleItem = null;
  
  items.forEach(item => {
    const poclet = POCLETS.find(p => p.id === item.dataset.id);
    if (!poclet) return;
    
    if (selectedTags.size === 0) {
      item.classList.remove('filtered');
      if (!firstVisibleItem) firstVisibleItem = item;
      visibleCount++;
      return;
    }
    
    const hasMatch = Array.from(selectedTags).some(selectedTag => 
      poclet.domain && (
        poclet.domain.toLowerCase().includes(selectedTag.toLowerCase()) ||
        selectedTag.toLowerCase().includes(poclet.domain.toLowerCase())
      )
    );
    
    if (hasMatch) {
      item.classList.remove('filtered');
      if (!firstVisibleItem) firstVisibleItem = item;
      visibleCount++;
    } else {
      item.classList.add('filtered');
    }
  });
  
  document.getElementById('visible-count').textContent = visibleCount;
  
  // Auto-select first visible item
  if (firstVisibleItem) {
    selectPocletElement(firstVisibleItem);
  } else {
    // No visible items - clear selection
    document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
    document.getElementById('launch-btn').classList.add('hidden');
    document.getElementById('footer-info').textContent = '';
  }
}

function selectPocletElement(item) {
  document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
  selectPoclet(item.dataset.id);
}

function initTagListeners() {
  document.getElementById('tag-select').addEventListener('change', e => {
    const tag = e.target.value;
    if (tag && !selectedTags.has(tag)) {
      selectedTags.add(tag);
      renderSelectedTags();
      filterPoclets();
    }
    e.target.value = '';
  });
  
  document.getElementById('clear-tags-btn').addEventListener('click', () => {
    selectedTags.clear();
    renderSelectedTags();
    filterPoclets();
  });
}

function parseMarkdown(md) {
  let h = escMd(md);
  h = h.replace(/```[\w]*\n([\s\S]*?)```/g,
    (_, c) => '<pre><code>' + c.trimEnd() + '</code></pre>');
  h = h.replace(/^#{4,}\s+(.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^###\s+(.+)$/gm,   '<h3>$1</h3>');
  h = h.replace(/^##\s+(.+)$/gm,    '<h2>$1</h2>');
  h = h.replace(/^#\s+(.+)$/gm,     '<h1>$1</h1>');
  h = h.replace(/^[-*_]{3,}\s*$/gm, '<hr>');
  h = h.replace(/^&gt;\s*(.+)$/gm,  '<blockquote>$1</blockquote>');
  h = h.replace(/((?:^\|.+\|\n?)+)/gm, m => {
    const rows = m.trim().split('\n');
    if (rows.length < 2) return m;
    let out = '<table>', inBody = false;
    rows.forEach(row => {
      if (/^\|[-| :]+\|$/.test(row.trim())) { out += '<tbody>'; inBody = true; return; }
      const cells = row.replace(/^\||\|$/g, '').split('|');
      const tag = inBody ? 'td' : 'th';
      out += '<tr>' + cells.map(c => '<' + tag + '>' + c.trim() + '</' + tag + '>').join('') + '</tr>';
    });
    return out + (inBody ? '</tbody>' : '') + '</table>';
  });
  h = h.replace(/^[-*+]\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*]+)\*/g,     '<em>$1</em>');
  h = h.replace(/`([^`]+)`/g,       '<code>$1</code>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return h.split(/\n{2,}/).map(b => {
    const t = b.trim();
    if (!t) return '';
    if (/^<(h[1-6]|ul|ol|pre|table|blockquote|hr)/.test(t)) return t;
    return '<p>' + t.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
}

function escMd(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    if (e.key === 'ArrowDown') {
      const next = Math.min(idx + 1, visiblePoclets.length - 1);
      if (visiblePoclets[next]) selectPoclet(visiblePoclets[next].id);
      e.preventDefault();
    }
    if (e.key === 'ArrowUp') {
      const prev = Math.max(idx - 1, 0);
      if (visiblePoclets[prev]) selectPoclet(visiblePoclets[prev].id);
      e.preventDefault();
    }
    if (e.key === 'Enter') {
      const p = POCLETS.find(x => x.id === selectedId);
      if (p) { const url = BASE_URL ? BASE_URL + '/' + p.htmlRelPath : p.htmlRelPath; window.open(url, '_blank'); }
    }
  });
}

function initSplitter() {
  const splitter = document.getElementById('splitter');
  const shell    = document.getElementById('shell');
  let dragging = false, startX = 0, startW = 0;
  splitter.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startW   = document.getElementById('tree-panel').getBoundingClientRect().width;
    splitter.classList.add('dragging');
    document.body.style.cssText = 'cursor:col-resize;user-select:none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.max(180, Math.min(640, startW + (e.clientX - startX)));
    shell.style.gridTemplateColumns = w + 'px var(--split-w) 1fr';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    splitter.classList.remove('dragging');
    document.body.style.cssText = '';
  });
}

</script>
