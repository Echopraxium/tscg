versal M2 pattern capturing both ordered sequencing and cyclic return — the two inseparable faces of any 4-phase cycle.\n\n## M1 Domain Contributions\n\nThis poclet identifies **8 thermodynamics-specific concepts** for `M1_extensions/thermodynamics/M1_Thermodynamics.jsonld`:\n\n1. **Stroke**: A phase in an engine cycle (Intake, Compression, Power, Exhaust)\n2. **Compression Ratio**: r = V_max / V_min (key performance parameter)\n3. **Otto Cycle**: Idealized thermodynamic cycle (basis for gasoline engines)\n4. **Valve Timing**: Precise synchronization of intake/exhaust valve opening/closing\n5. **Ignition Timing**: Spark timing for combustion initiation\n6. **Bore & Stroke**: Cylinder diameter and piston travel distance\n7. **Displacement**: Total cylinder volume (engine size metric)\n8. **Thermal Efficiency**: η = 1 − (1/r^(γ−1)) — domain-specific metric relocated from M2 (was `m2:Efficiency`, removed in v15)\n\n## Pedagogical Value\n\nThe Four-Stroke Engine is ideal for teaching:\n- **Systems Thinking**: How sequential processes create emergent behavior (rotation)\n- **Energy Conversion**: Chemical → Thermal → Mechanical transformation chain\n- **Cyclicity**: Periodic systems and state-space return\n- **Trade-offs**: Compression ratio vs. knock resistance\n- **Modularity**: Single-cylinder principles scale to multi-cylinder engines\n\n## Historical Context\n\n- **1876**: Nicolaus Otto patents the four-stroke engine\n- **1886**: Karl Benz builds first automobile with four-stroke engine\n- **1920s–present**: Becomes dominant design for gasoline engines\n- **Modern Era**: Electronic fuel injection, variable valve timing enhance efficiency\n\n## Engineering Significance\n\n**Why 4-stroke dominates over 2-stroke**:\n- ✅ Better fuel efficiency (no fresh charge loss)\n- ✅ Lower emissions (complete exhaust scavenging)\n- ✅ Quieter operation\n- ✅ Longer engine life (better lubrication)\n- ❌ More complex (requires valve train)\n- ❌ Lower power-to-weight ratio\n\n## Thermodynamic Efficiency\n\n**Ideal Otto Cycle Efficiency**:\n```\nη = 1 − (1 / r^(γ−1))\n```\nWhere:\n- η = thermal efficiency\n- r = compression ratio\n- γ = heat capacity ratio (≈1.4 for air)\n\n**Example**: r = 10:1 → η ≈ 60% (ideal)  \n**Reality**: Real engines achieve 25–30% due to friction, heat loss, incomplete combustion\n\n## Bicephalous Perspective\n\n### Eagle Eye (Territory — ASFID)\n- **Observable**: Piston motion, pressure waves, temperature profiles\n- **Measurable**: RPM, torque, power output, fuel consumption\n- **Physical**: Real metal components, combustion reactions, heat transfer\n\n### Sphinx Eye (Map — REVOI)\n- **Theoretical**: Idealized Otto cycle (reversible, adiabatic, constant volume)\n- **Pedagogical**: Simplified P-V diagram for education\n- **Epistemic Gap**: ΔΘ = 0.132 (small gap) → high-fidelity model\n\n**Synthesis**: The Four-Stroke model is an excellent map of the territory — it accurately predicts real engine behavior while remaining simple enough for educational and engineering purposes.\n\n## Conclusion\n\nThe **Four-Stroke Engine** is a validated TSCG poclet demonstrating:\n- ✅ **Minimality**: 4 strokes is the irreducible minimum\n- ✅ **Completeness**: All 5 ASFID dimensions present\n- ✅ **High Map Quality**: REVOI = (0.90, 0.85, 0.90, 0.90, 0.85)\n- ✅ **Small Epistemic Gap**: δ = 0.132 — SpectralClass `OnCriticalLine` (excellent Territory-Map alignment)\n- ✅ **Transdisciplinary**: 4-phase cycle pattern appears across domains\n- ✅ **Pedagogical**: Universally taught in engineering education\n- ✅ **Framework Validation**: Confirms TSCG applicability to thermodynamic systems\n- ✅ **M1 CoreConcepts reuse**: `m1core:Oscillator` (crankshaft), `m1core:Processor` (engine as transformer)\n\n**POCLET STATUS**: ✅ VALIDATED\n\n---\n\n## Changelog\n\n| Version | Date | Summary |\n|---------|------|---------|\n| **1.2.0** | 2026-03-18 | M2 v15.10.1 alignment: Cycle→FeedbackLoop+Process, Sequence→Workflow, Flow→Channel, Synchronization→Alignment; Efficiency→M1_Thermodynamics; `@base` added to jsonld; GenericConceptCoverage 38%→27% (20/75); 8th M1 concept ThermalEfficiency added |\n| 1.1.0 | 2026-02-24 | BREAKING: ORIVE → REVOI; R=Representability, E=Evolvability, V=Verifiability; ΔΘ recalculated to 0.132; poclet-loader fields added |\n| 1.0.1 | 2026-01-28 | Added transdisciplinary validation and M1 contributions |\n\n---\n\n## References\n\n- Otto, N. A. (1876). *Four-Stroke Internal Combustion Engine* (Patent)\n- Heywood, J. B. (1988). *Internal Combustion Engine Fundamentals*. McGraw-Hill.\n- Taylor, C. F. (1985). *The Internal Combustion Engine in Theory and Practice*. MIT Press.\n- SAE International. *Engine Technology Standards* (J1349, J1995).\n\n## Related Poclets\n\n- **Fire Triangle**: Similar 3-component synergistic system\n- **Carnot Cycle**: Idealized thermodynamic cycle (benchmark for efficiency)\n- **Krebs Cycle**: Biological metabolic cycle with sequential phases\n- **Predator-Prey**: Cyclical dynamics with phase coupling\n\n---\n\n**Document Version**: 1.2.0  \n**Date**: March 2026  \n**Framework**: TSCG (Transdisciplinary System Construction Game)  \n**Authors**: Echopraxium with the collaboration of Claude AI  \n**Ontology**: M0_FourStrokeEngine.jsonld  \n"},{"id":"KindlebergerMinsky","label":"Kindleberger-Minsky System","domain":"Finance / Economics","version":"","gap":0.09,"asfid":[0.92,0.85,0.92,0.9,0.95],"revoi":[0.85,0.78,0.75,0.82,0],"htmlRelPath":"instances/poclets/KindlebergerMinsky/static/M0_KindlebergerMinsky.html","hasReadme":true,"readme":"# Kindleberger-Minsky Financial Crisis Cycle — TSCG Simulation\n\n**File**: `kindleberger_minsky_sim.py`  \n**Version**: 1.11.0  \n**Date**: 2026-03-01  \n**Author**: Echopraxium with the collaboration of Claude AI  \n**Poclet**: `M0_KindlebergerMinsky.jsonld`  \n**M2 GenericConcepts**: v15.9.0  \n**Framework**: TSCG (Transdisciplinary System Construction Game)\n\n---\n\n## Table of Contents\n\n1. [Overview](#overview)\n2. [Theoretical Foundation](#theoretical-foundation)\n3. [The 5-Pole Kindleberger-Minsky Structure](#the-5-pole-kindleberger-minsky-structure)\n4. [7 Historical Instances](#7-historical-instances)\n5. [TSCG Mapping — M2 GenericConcepts](#tscg-mapping--m2-genericconcepts)\n6. [ASFID / REVOI Scores](#asfid--revoi-scores)\n7. [Interface Layout](#interface-layout)\n8. [Controls Reference](#controls-reference)\n9. [Visual Language](#visual-language)\n10. [Requirements & Installation](#requirements--installation)\n11. [Architecture Notes](#architecture-notes)\n\n---\n\n## Overview\n\nThis simulation is a **TSCG M0 Poclet visualization** of the Kindleberger-Minsky model of financial crises. It renders 7 historical speculative bubbles as interactive animated sequences, mapping each phase of the cycle onto the TSCG bicephalous ontology (ASFID Territory + REVOI Map).\n\nThe simulation demonstrates how a single abstract pattern — the five-phase speculative cycle — recurs with structural isomorphism across 3 centuries, 5 asset classes, and 4 continents.\n\n### Key Characteristics\n\n| Dimension | Value |\n|-----------|-------|\n| ASFID mean score | 0.91 |\n| REVOI mean score | 0.82 |\n| Epistemic gap δΘ | 0.09 |\n| Historical instances | 7 |\n| Phases per instance | 5 |\n| Primary M2 patterns | Propagation, Narration |\n| Date range covered | 1711 – 2022 |\n\n---\n\n## Theoretical Foundation\n\n### Kindleberger-Minsky Model\n\nThe model originates in Hyman Minsky's financial instability hypothesis (1970s) and was systematized by Charles Kindleberger in *Manias, Panics and Crashes* (1978). The core insight: speculative bubbles follow a deterministic five-phase sequence driven by the interaction of credit expansion, narrative propagation, and leverage unwinding.\n\n### TSCG Mapping\n\nIn TSCG terms, the Kindleberger-Minsky cycle is a **temporal Attractor** (A) whose basin of attraction is defined by the intersection of:\n\n- **Information dynamics** (I ⊗ D) — displacement event and narrative formation\n- **Flow amplification** (F ⊗ D ⊗ A) — credit expansion and leverage cascade\n- **Structural crystallization** (A ⊗ S) — peak consensus, zero dissent\n- **Bifurcation** (I ⊗ D → threshold crossing) — Minsky Moment, R₀ > 1\n- **Cascade dissipation** (F ⊗ D) — debt deflation, institutional collapse\n\nThe M3 bicephalous perspective reveals an important asymmetry: Territory (ASFID) scores are consistently high (measurable physical flows of capital), while Map (REVOI) scores degrade at peak Euphoria — the moment when the narrative most completely displaces empirical reality.\n\n---\n\n## The 5-Pole Kindleberger-Minsky Structure\n\n| # | Phase | TSCG Formula | Primary M2 | Dominant Force |\n|---|-------|-------------|------------|----------------|\n| 1 | **DISPLACEMENT** | `I ⊗ D` | m2:Event | Exogenous shock creates new profit opportunity |\n| 2 | **BOOM** | `F ⊗ D ⊗ A` | m2:Amplification | Credit expansion + leverage cascade |\n| 3 | **EUPHORIA** | `A ⊗ S` | m2:Narration | Peak consensus, \"this time is different\" narrative |\n| 4 | **DISTRESS** | `I ⊗ D` (threshold) | m2:Bifurcation | Minsky Moment — R₀ > 1, insider selling |\n| 5 | **REVULSION** | `F ⊗ D` | m2:Propagation | Debt deflation, contagion, institutional collapse |\n\n### Phase Colour Code\n\n| Phase | Colour | Hex |\n|-------|--------|-----|\n| DISPLACEMENT | Blue | `#4A90E2` |\n| BOOM | Green | `#22C97A` |\n| EUPHORIA | Amber | `#F5A623` |\n| DISTRESS | Red | `#E64141` |\n| REVULSION | Purple | `#A855F7` |\n\n---\n\n## 7 Historical Instances\n\nListed in chronological order (as displayed in the interface):\n\n| # | Label | Asset | Period | Peak | Drawdown | Multiplier |\n|---|-------|-------|--------|------|----------|------------|\n| 1 | S.SEA 1720 | South Sea Company stock | ~10 yrs (1711–1720) | £1,050/share | −90.5% | ×10.5 |\n| 2 | RUBBER 1912 | Pará rubber (Hevea brasiliensis) | ~20 yrs (1895–1915) | £12/long ton | −96.3% | ×26.7 |\n| 3 | NYSE 1929 | Dow Jones Industrial Average | ~11 yrs (1922–1932) | 381.2 pts | −89.2% | ×4.0 |\n| 4 | NIKKEI 1989 | Nikkei 225 Index | ~8 yrs (1984–1992) | 38,915 pts | −63.2% | ×3.8 |\n| 5 | NASDAQ 2000 | NASDAQ Composite | ~9 yrs (1993–2002) | 5,132.5 pts | −78.3% | ×7.3 |\n| 6 | GFC 2008 | S&P 500 Index | ~9 yrs (2001–2009) | 1,565.0 pts | −57.4% | ×1.8 |\n| 7 | BTC 2021 | Bitcoin (BTC) | ~4 yrs (2019–2022) | $69,044 | −77.5% | ×19.7 |\n\n### Key Observations\n\n**Amplitude paradox**: The most extreme multipliers (Rubber ×26.7, South Sea ×10.5) occurred in pre-industrial economies with limited information infrastructure, suggesting that narrative propagation velocity — not credit volume — is the dominant amplifier.\n\n**Drawdown floor**: Five of seven instances show drawdowns exceeding 75%, consistent with Minsky's prediction that leverage-driven cycles overshoot on the downside.\n\n**Duration compression**: Cycle length has shortened from ~20 years (Rubber) to ~4 years (Crypto), reflecting accelerating information propagation (R₀ narrative).\n\n---\n\n## TSCG Mapping — M2 GenericConcepts\n\n### Primary Patterns\n\n| M2 Concept | Phase | Role |\n|------------|-------|------|\n| `m2:Event` | DISPLACEMENT | Exogenous shock that opens the profit opportunity |\n| `m2:Amplification` | BOOM | Credit-driven positive feedback loop |\n| `m2:Narration` | EUPHORIA | Self-reinforcing belief system, R₀ >> 1 |\n| `m2:Bifurcation` | DISTRESS | Phase transition — system crosses instability threshold |\n| `m2:Propagation` | REVULSION | Contagion cascade across institutions and geographies |\n\n### Secondary Patterns (selected)\n\n`m2:Cascade` · `m2:Network` · `m2:LeverageCycle` · `m2:Threshold` · `m2:Trigger` · `m2:Oscillator` · `m2:Emergence` · `m2:Memory` · `m2:Identity` · `m2:Dissipation` · `m2:Regulation` · `m2:DebtDeflation` · `m2:FinancialContagion`\n\n### R₀ Propagation Regime by Phase\n\n| Phase | R₀ (panic) | R₀ (narrative) | Regime |\n|-------|-----------|----------------|--------|\n| DISPLACEMENT | 0.05–0.1 | 0.5–0.8 | SubThreshold |\n| BOOM | 0.08–0.1 | 1.7–2.5 | Supercritical (narrative) |\n| EUPHORIA | 0.1 | 4.0–5.0 | Supercritical — peak |\n| DISTRESS | 3.0–5.0 | 0.1–0.2 | **MINSKY MOMENT** R₀ > 1 |\n| REVULSION | 0.2–0.3 | 0.05 | Saturated → SubThreshold |\n\n---\n\n## ASFID / REVOI Scores\n\nScores sourced from `M0_KindlebergerMinsky.jsonld` and `M1_Economics.jsonld`.\n\n### By Phase (mean across all instances)\n\n| Phase | A | S | F | I | D | ASFID mean |\n|-------|---|---|---|---|---|-----------|\n| DISPLACEMENT | 0.69 | 0.64 | 0.73 | 0.92 | 0.88 | 0.77 |\n| BOOM | 0.83 | 0.79 | 0.93 | 0.84 | 0.92 | 0.86 |\n| EUPHORIA | 0.97 | 0.91 | 0.84 | 0.87 | 0.84 | 0.89 |\n| DISTRESS | 0.94 | 0.84 | 0.87 | 0.94 | 0.97 | 0.91 |\n| REVULSION | 0.87 | 0.81 | 0.97 | 0.87 | 0.97 | 0.90 |\n\n**ASFID global mean**: 0.91 — high Territory measurability across all phases.  \n**REVOI global mean**: 0.82 — Map quality degrades at Euphoria peak (Verifiability V collapses).  \n**Epistemic gap δΘ**: 0.09 — indicates the framework captures the system well despite the qualitative nature of narrative dynamics.\n\n---\n\n## Interface Layout\n\n```\n┌────────────────────────────────────────────────────────────────────────────┐\n│  TSCG  KINDLEBERGER-MINSKY          [S.SEA][RUBBER][NYSE]…  ← bubble tabs │\n├──────────────────────────────────────┬─────────────────────────────────────┤\n│ PHASE  [DISPLACEMENT][BOOM][EUPH]…   │  TSCG  MAPPING          M2 v15.9.0 │\n├──────────────────────────────────────┤  ─ current phase formula            │\n│                                      │  ─ primary / secondary M2           │\n│   ASSET PRICE  (75% height)          │  ─ ASFID score bars                 │\n│   • dim white  = full history        │  ─ R₀ regime                        │\n│   • bright white = played            │  ─ narrative arc                    │\n│   • thick white  = current phase     ├─────────────────────────────────────┤\n│                                      │  EPISODE                            │\n├──────────────────────────────────────┤  ─ asset name & period              │\n│   TRANSACTION VOLUME  (25% height)   │  ─ context paragraph                │\n│   • dim pastels  = other phases      │  ─ driver                           │\n│   • bright pastels = current phase   │  ─ Wikipedia links [↗]             │\n├──────────────────────────────────────├─────────────────────────────────────┤\n│  [▶PLAY][RESET][1][2][3][4][5]  ×0.5 ×1 ×2 ×4  ████░░ progress           │  METRICS\n└────────────────────────────────────────────────────────────────────────────┘  ─ price start/peak/trough\n                                                                                 ─ drawdown, velocity\n                                                                                 ─ TSCG scores\n```\n\n### Left Panel — Charts (≈63% of window width)\n\n- **Header bar**: Title + 7 bubble selection tabs (chronological order)\n- **Phase bar**: Colour-coded phase segments — clickable to jump phases\n- **Price chart** (75% of chart height): Asset price curve, peak-scaled and normalised\n- **Volume chart** (25% of chart height): Transaction volume, normalised\n\n### Right Panel — Information (≈37% of window width)\n\nThree resizable panels separated by draggable splitters:\n\n- **TSCG MAPPING**: Phase formula, M2 primary/secondary concepts, ASFID score bars, R₀ regime label, narrative arc quote\n- **EPISODE**: Asset name, period, cycle duration, phase date, context description, driving force, Wikipedia reference links\n- **METRICS**: Asset price statistics (start/peak/trough/current), cycle statistics (drawdown, multiplier, total cycle), current phase dynamics (velocity, volume normalised, volatility, acceleration)\n\n---\n\n## Controls Reference\n\n### Navigation\n\n| Control | Action |\n|---------|--------|\n| Bubble tabs (header) | Select historical instance — cursor positions at end of DISPLACEMENT |\n| Phase bar segments | Click any phase segment → jump to that phase |\n| Buttons `[1]` `[2]` `[3]` `[4]` `[5]` | Jump to phase 1–5 |\n| `[RESET]` | Return to start of current bubble |\n| Click on chart | Immediately set time cursor to that position |\n| Click + drag on chart | Scrub timeline interactively |\n\n### Playback\n\n| Control | Action |\n|---------|--------|\n| `[▶ PLAY]` / `[⏸ PAUSE]` | Toggle animation |\n| `[×0.5]` `[×1]` `[×2]` `[×4]` | Animation speed multiplier |\n| `SPACE` | Toggle play/pause |\n\n### Other\n\n| Control | Action |\n|---------|--------|\n| Mouse hover on chart | Crosshair tooltip: price, phase, date, ahead/played status |\n| Drag splitters (right panel) | Resize TSCG Mapping / Episode / Metrics panels |\n| Click `[↗ link]` | Open Wikipedia article in browser |\n| Window resize / drag | Fully responsive layout — all panels recompute |\n| `ESC` or `Q` | Quit |\n\n---\n\n## Visual Language\n\n### Price Curve\n\n| Visual | Meaning |\n|--------|---------|\n| Very dim white (1px) | Future — not yet reached by playhead |\n| Dim white (2px) | Played — phases before the current active phase |\n| **Bright white (3px)** | **Current active phase** |\n| Coloured dot | Playhead position (dot colour = current phase colour) |\n| Yellow vertical tick + label | Historical event marker |\n\n### Volume Bars\n\n| Visual | Meaning |\n|--------|---------|\n| Very dim pastel (≈20%) | Future — beyond playhead |\n| Mid pastel (≈78%) | Played phases other than the current |\n| **Full bright pastel** | **Current active phase** |\n\nEach phase has a distinct pastel colour: sky blue (DISPLACEMENT) · mint green (BOOM) · gold (EUPHORIA) · coral (DISTRESS) · lavender (REVULSION).\n\n### Phase Bar\n\nThe phase bar sits between the header and the price chart. The active phase is rendered at full brightness; all others are dimmed. Hovering over a segment highlights it. Full phase names are shown when segment width allows; abbreviated names otherwise.\n\n---\n\n## Requirements & Installation\n\n```bash\n# Minimum requirement\npip install pygame\n\n# Run\npython kindleberger_minsky_sim.py\n```\n\n**Python**: 3.8+  \n**Pygame**: 2.0+  \n**Screen**: Recommended minimum 1280 × 760 (default window size). Fully resizable.  \n**OS**: Linux, macOS, Windows (any platform supporting pygame)\n\nNo other dependencies. All data is embedded in the script via the `BUBBLES` list.\n\n---\n\n## Architecture Notes\n\n### Data Architecture\n\nAll historical data lives in the `BUBBLES` list — a list of 7 dicts, one per historical instance. Each bubble contains:\n\n- Metadata: `id`, `name`, `short`, `color`, `asset`, `unit`, `peak`, `trough`, `drawdown_pct`, `multiplier`, `total_cycle`, `description`, `wiki`\n- `phases`: list of 5 dicts, one per Kindleberger-Minsky phase, each containing `date`, `months`, `v_pct` (velocity %/month), `vol_norm`, `volatility` (0–3), `formula`, `primary_m2`, `secondary_m2`, `narrative`, `asfid` (A/S/F/I/D scores), `r0_panic`, `r0_narr`, `r0_regime`, `force`, `events`\n\n### Curve Generation\n\nSynthetic price and volume curves are generated by `generate_curves(bubble)` using `STEPS_PER_MONTH = 8` points per month. Price evolution is velocity-driven (`v_pct` per phase) with Gaussian noise scaled by `volatility` level (0=Low → 3=Extreme). A fixed seed (`VOL_NOISE_SEED = 42`) ensures reproducibility. All bubbles are pre-generated at startup and cached in `self.curves`.\n\n### Layout System\n\nA `Layout` singleton (`L`) holds all derived geometry and is recalculated on every `VIDEORESIZE` event. Module-level globals (`CHART_W`, `PRICE_TOP`, etc.) are updated in place so all drawing code remains unmodified.\n\n### Phase State Management\n\nThe authoritative phase index is stored in `self._selected_phase` (never inferred from the float playhead, which would produce off-by-one errors at phase boundaries). It is updated:\n- On `_jump_phase(i)` — set explicitly\n- During playback — synced each frame via `phase_at_point()`\n- On `_select_bubble()` and `RESET` — reset to 0\n\n### File Relationships\n\n```\nkindleberger_minsky_sim.py\n  ├── driven by:  M0_KindlebergerMinsky.jsonld\n  ├── M2 layer:   M2_GenericConcepts.jsonld  (v15.9.0)\n  │     └── uses: Narration, Propagation, Duplication, Bifurcation, Amplification, …\n  └── M1 layer:   M1_Economics.jsonld\n        └── concepts: ExogenousShock, CreditExpansion, LeverageCycle,\n                      MarketSentiment, MinskyCrisis, SystemicRisk, FinancialContagion\n```\n\n---\n\n*Generated for TSCG framework — Echopraxium with the collaboration of Claude AI*\n"},{"id":"MtgColorWheel","label":"Magic Color Wheel System","domain":"","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/MtgColorWheel/static/M0_MtgColorWheel.html","hasReadme":true,"readme":"# MTG Color Wheel — TSCG Poclet\n\n**Author:** Echopraxium with the collaboration of Claude AI\n**Version:** 1.2.0 | **Poclet type:** Conceptual/Philosophical System\n**Domain:** Cultural Artifact (Gaming/Philosophy) | **Spectral Class:** Liminal\n\n---\n\n## Overview\n\nThe **Magic: The Gathering Color Wheel** is one of the most elegant philosophical frameworks in game design: five primary color identities arranged as a pentagon, generating ten bicolor **guilds** through adjacency and diagonal relationships, plus the **Artifact** pseudo-color as a colorless neutral substrate.\n\nCreated by Mark Rosewater and the design team at Wizards of the Coast (1993), the Color Pie has remained stable for 30+ years while continuously evolving its mechanical expression — a mark of genuine structural robustness.\n\n**TSCG metrics:**\n| Metric | Value |\n|---|---|\n| ASFID (Territory) | `(0.65, 0.80, 0.45, 0.85, 0.50)` — mean 0.65 |\n| REVOI (Map) | `(0.90, 0.85, 0.70, 0.75, 0.90)` — mean 0.82 |\n| Epistemic Gap δ₁ | **0.17** — Liminal [0.15, 0.30) |\n| GenericConcepts | 30 M2 instantiations |\n\n**Key finding:** N-ary polarity (N=5) validated as a TSCG paradigm extension, forcing generalization of the Polarity metaconcept beyond binary.\n\n---\n\n## 1. Primary Colors\n\nThe five colors are arranged on a regular pentagon with **C₅ rotational symmetry** (no privileged color). Each color occupies a philosophical attractor basin — a value equilibrium that characters, decks, and narratives gravitate toward.\n\n> **Pentagon order** (clockwise from top): White (W) → Blue (U) → Black (B) → Red (R) → Green (G)\n> Adjacent colors are **allies**; colors two steps apart are **enemies**.\n\n---\n\n### 1.1 White (W) — Order & Collective\n\n**Mana symbol:** `{W}` | **Visual:** Plains, sunlit gold/ivory\n**Position:** Top of pentagon (angle 90°)\n\n**Core values:** Structure · Peace · Community · Absolute Morality\n\nWhite believes that civilization is humanity's greatest achievement, and that collective wellbeing must override individual desire. Laws are the codified wisdom of the community; institutions are the vehicles of lasting peace.\n\n**Methods:** Laws, institutions, collective work, discipline\n**Excesses:** Oppressive conformism, dogmatism, sacrifice of the individual\n**Lacks:** Flexibility, individuality, spontaneity\n\n**Philosophy:** *\"The many are stronger than the one. Order brings peace, law brings justice.\"*\n\n**Mechanical identity:** Small creatures, life gain, protection, removal, mass effects\n**Symbolism:** Sun, plains, angels, soldiers, clerics\n\n**Allies:** Blue (rational order), Green (communal harmony)\n**Enemies:** Black (individualism), Red (chaos)\n\n**Real-world analogues:** Democratic constitutions, human rights frameworks, religious law, collectivist ethics (Kant, Rawls)\n\n---\n\n### 1.2 Blue (U) — Perfection & Knowledge\n\n**Mana symbol:** `{U}` | **Visual:** Islands, deep blue water\n**Position:** Upper-right of pentagon (angle 18°)\n\n**Core values:** Knowledge · Perfection · Progress · Intellect\n\nBlue believes that understanding precedes action. Everything can be improved through study and mastery. The future is built through thought, not instinct.\n\n**Methods:** Study, technology, magic, manipulation\n**Excesses:** Analytical coldness, unethical manipulation, paralyzing perfectionism\n**Lacks:** Intuition, tradition, acceptance of imperfection\n\n**Philosophy:** *\"Everything can be improved. Knowledge is power. Through understanding we transcend our limits.\"*\n\n**Mechanical identity:** Card draw, counterspells, flying, illusions, artifact affinity\n**Symbolism:** Islands, water, air, wizards, sphinxes, merfolk\n\n**Allies:** White (rational order), Black (strategic power)\n**Enemies:** Red (impulse over intellect), Green (nature over progress)\n\n**Real-world analogues:** Enlightenment rationalism, scientific method, techno-optimism, Plato's philosopher-kings\n\n---\n\n### 1.3 Black (B) — Ambition & Individual\n\n**Mana symbol:** `{B}` | **Visual:** Swamps, darkness\n**Position:** Lower-right of pentagon (angle 306°)\n\n**Core values:** Power · Personal Achievement · Pragmatism\n\nBlack believes that every entity has the right — even the obligation — to pursue its own interests without constraint. Death is not an end but a resource. Morality is a luxury of the weak.\n\n**Methods:** Power at any cost, resource exploitation (including death)\n**Excesses:** Pathological egoism, destructive cynicism, parasitism\n**Lacks:** Altruism, scruples, community sense\n\n**Philosophy:** *\"Every being has the right to do whatever it takes to survive and thrive. Death is a resource.\"*\n\n**Mechanical identity:** Creature destruction, discard, life payment, reanimation, sacrifice\n**Symbolism:** Swamps, death, demons, vampires, zombies, necromancy\n\n**Allies:** Blue (strategic intelligence), Red (individual supremacy)\n**Enemies:** White (collectivism), Green (acceptance vs. ambition)\n\n**Real-world analogues:** Machiavellian realism, Nietzschean will-to-power, social Darwinism, transactional ethics\n\n---\n\n### 1.4 Red (R) — Freedom & Passion\n\n**Mana symbol:** `{R}` | **Visual:** Mountains, fire\n**Position:** Lower-left of pentagon (angle 234°)\n\n**Core values:** Freedom · Emotion · Spontaneity · Action\n\nRed believes in living in the moment. Planning is an illusion; passion is truth. Freedom is worth any cost, and the present feeling is more real than any future plan.\n\n**Methods:** Intuition, passion, creative destruction, art\n**Excesses:** Self-destructive chaos, impulsivity, anarchy\n**Lacks:** Discipline, planning, restraint\n\n**Philosophy:** *\"Feel, don't think. Act now, worry later. Freedom is worth any price.\"*\n\n**Mechanical identity:** Direct damage, haste, temporary effects, chaos, artifact destruction\n**Symbolism:** Mountains, fire, lightning, goblins, dragons, warriors\n\n**Allies:** Black (individual supremacy), Green (instinct over intellect)\n**Enemies:** White (freedom vs. order), Blue (impulse vs. calculation)\n\n**Real-world analogues:** Romanticism, anarchism, expressionist art, existential authenticity, punk culture\n\n---\n\n### 1.5 Green (G) — Nature & Growth\n\n**Mana symbol:** `{G}` | **Visual:** Forests, organic life\n**Position:** Upper-left of pentagon (angle 162°)\n\n**Core values:** Nature · Tradition · Organic Growth · Destiny\n\nGreen believes that nature is perfect and humanity's greatest mistake is departing from it. Everything has its place in the natural order; growth through time rather than force is the only sustainable path.\n\n**Methods:** Adaptation, ecosystem reliance, acceptance\n**Excesses:** Fatalism, progress rejection, law of the jungle\n**Lacks:** Innovation, will to change destiny, individualism\n\n**Philosophy:** *\"Everything has its place in the natural order. Growth through time, not force. Accept what is.\"*\n\n**Mechanical identity:** Large creatures, mana acceleration, enchantments, creature buffs, anti-flying\n**Symbolism:** Forests, nature, elves, beasts, druids, life cycle\n\n**Allies:** Red (instinct over intellect), White (communal harmony)\n**Enemies:** Blue (tradition vs. progress), Black (acceptance vs. ambition)\n\n**Real-world analogues:** Taoism, deep ecology, traditional societies, conservationism, indigenous knowledge systems\n\n---\n\n## 2. Allied Guilds (Adjacent Pairs)\n\nAllied guilds form between adjacent colors on the pentagon. Their philosophical positions are **reinforcing** — each color addresses the other's lacks, creating a synthesis that neither could achieve alone.\n\n> **Guild names** originate from the ten Ravnica guilds introduced in the *Ravnica: City of Guilds* set (2005), each governing a distinct domain of the plane.\n\n---\n\n### 2.1 Azorius (W+U)\n\n**Colors:** White + Blue | **Type:** Allied (Adjacent)\n**Ravnica role:** The Senate — legislative body of Ravnica\n\n**Synthesis:** Law + Knowledge = Rational Governance\n\nAzorius believes that civilization requires both the enforcement of rules (W) and the wisdom to design them well (U). Laws must be crafted with intellectual rigor and enforced with institutional consistency.\n\n**Core themes:** Law, bureaucracy, order, control, jurisdiction, institution\n**Synergy:** Constitutional order — the best governance systems are both logically coherent and structurally robust\n**Excesses:** Stifling overregulation, control as an end in itself, rule without flexibility\n\n**Mechanical identity:** Control spells, detain, flying, enchantments, permission magic\n**Real-world analogues:** Constitutional democracies, international law, scientific regulatory bodies\n\n*\"Order must be understood to be obeyed. Understanding must be ordered to be applied.\"*\n\n---\n\n### 2.2 Dimir (U+B)\n\n**Colors:** Blue + Black | **Type:** Allied (Adjacent)\n**Ravnica role:** The Secret Guild — officially denies its own existence\n\n**Synthesis:** Knowledge + Ambition = Strategic Manipulation\n\nDimir believes that information is the ultimate form of power. By knowing what others do not know, and controlling what others believe, the Dimir operative achieves perfect control without ever being seen.\n\n**Core themes:** Secrecy, manipulation, espionage, information asymmetry, mind control\n**Synergy:** Intelligence superiority — the most effective power operates invisibly\n**Excesses:** Paranoia, total amorality, identity constructed entirely through deception\n\n**Mechanical identity:** Mill, discard, deception, transmute, surveil, cipher\n**Real-world analogues:** Intelligence agencies (CIA, MI6), corporate espionage, Machiavellian court politics\n\n*\"The best weapon is what your enemy does not know you know.\"*\n\n---\n\n### 2.3 Rakdos (B+R)\n\n**Colors:** Black + Red | **Type:** Allied (Adjacent)\n**Ravnica role:** The Cult — demonic circus; entertainment through mayhem\n\n**Synthesis:** Ambition + Passion = Hedonistic Chaos\n\nRakdos believes that existence is a performance — and the only authentic performance is one of unconstrained excess. If pleasure is good and restraint is evil, then maximum pleasure requires maximum freedom from consequence.\n\n**Core themes:** Chaos, performance, hedonism, violence, spectacle, excess\n**Synergy:** The liberation of desire — acting without moral constraint or fear of consequence\n**Excesses:** Total nihilism, self-destruction, performative cruelty as aesthetic\n\n**Mechanical identity:** Direct damage, sacrifice, haste, chaos, demons, carnival themes\n**Real-world analogues:** Extreme hedonism, nihilism as lifestyle, spectacle culture, transgressive art\n\n*\"Everything burns. Might as well enjoy the light.\"*\n\n---\n\n### 2.4 Gruul (R+G)\n\n**Colors:** Red + Green | **Type:** Allied (Adjacent)\n**Ravnica role:** The Clans — exiled warriors living in Ravnica's ruins\n\n**Synthesis:** Passion + Nature = Primal Rage\n\nGruul believes that civilization is the disease; wildness is the cure. The Gruul's rage is not chaos for its own sake but the authentic anger of beings who have had their natural existence stolen by urban expansion.\n\n**Core themes:** Wildness, rage, primitivism, tribal bonds, raw strength, clan loyalty\n**Synergy:** Natural power — ecological wisdom expressed through untamed physical force\n**Excesses:** Mindless destruction, anti-progress absolutism, pure animalism without wisdom\n\n**Mechanical identity:** Large creatures, trample, haste, bloodrush, anti-civilization mechanics\n**Real-world analogues:** Anarcho-primitivism, deep ecology militancy, tribal culture, romantic primitivism\n\n*\"The city took our forests. We take everything else.\"*\n\n---\n\n### 2.5 Selesnya (G+W)\n\n**Colors:** Green + White | **Type:** Allied (Adjacent)\n**Ravnica role:** The Conclave — nature-based spiritual community\n\n**Synthesis:** Nature + Community = Communal Harmony\n\nSelesnya believes that the greatest expression of nature is collective living: not the solitary creature in the wild, but the community rooted in shared purpose. Growth is not individual expansion but collective flourishing.\n\n**Core themes:** Community, nature-worship, conclave, unity, harmony, shared stewardship\n**Synergy:** Organic order — natural growth expressed through collective belonging\n**Excesses:** Cult-like conformity, suppression of individual voice, nature as ideological control\n\n**Mechanical identity:** Token generation, convoke, enchantments, life gain, populate\n**Real-world analogues:** Eco-villages, religious communities, cooperative communes, indigenous collective governance\n\n*\"Alone, a leaf. Together, a forest.\"*\n\n---\n\n## 3. Enemy Guilds (Diagonal Pairs)\n\nEnemy guilds form between colors two steps apart on the pentagon (diagonal connections). Their relationship is philosophically **oppositional** — yet through their tension a synthesis emerges that neither color would produce alone. Enemy guilds are often the most conceptually rich combinations.\n\n---\n\n### 3.1 Orzhov (W+B)\n\n**Colors:** White + Black | **Type:** Enemy (Diagonal)\n**Ravnica role:** The Syndicate — ghost-run banking and religious institution\n\n**Tension:** Collectivism (W) vs. Individualism (B)\n**Resolution:** Structure as instrument of power — using the tools of order to concentrate individual advantage\n\nThe Orzhov demonstrate how institutional law (W) can become a vehicle for personal enrichment (B). The church is a business; the congregation is a resource base. Rules exist to be obeyed by others.\n\n**Core themes:** Wealth, organized religion, debt, exploitation, tradition as power, class hierarchy\n**Synergy:** Institutional leverage — those who control the structure control the individuals within it\n**Excesses:** Absolute plutocracy, religion as pure racket, spiritual extortion\n\n**Mechanical identity:** Life drain, spirit tokens, haunt, extort, afterlife themes, debt mechanics\n**Real-world analogues:** Corrupt institutions, oligarchic governance, predatory lending, medieval church corruption\n\n*\"We offer salvation. The price is negotiable.\"*\n\n---\n\n### 3.2 Izzet (U+R)\n\n**Colors:** Blue + Red | **Type:** Enemy (Diagonal)\n**Ravnica role:** The League — eccentric mages led by dragon Niv-Mizzet\n\n**Tension:** Calculation (U) vs. Impulse (R)\n**Resolution:** Creative explosion — systematic intellect expressed through passionate experimentation\n\nThe Izzet resolve the U/R tension not by choosing between thought and passion, but by making each fuel the other. An Izzet experiment is planned with precision and executed with explosive enthusiasm.\n\n**Core themes:** Innovation, mad science, experiments, invention, creative chaos, overengineering\n**Synergy:** Applied brilliance — knowledge as rocket fuel for passionate creative destruction\n**Excesses:** Science without ethics, acceptable collateral damage, theory disconnected from human cost\n\n**Mechanical identity:** Instants/sorceries, overload, jump-start, cantrips, spell copying, storm\n**Real-world analogues:** Silicon Valley disruption, mad scientist archetype, creative-technical fields, R&D without ethics\n\n*\"It didn't explode the way I expected. Let me try again, louder.\"*\n\n---\n\n### 3.3 Golgari (B+G)\n\n**Colors:** Black + Green | **Type:** Enemy (Diagonal)\n**Ravnica role:** The Swarm — undead farmers managing Ravnica's underground\n\n**Tension:** Ambition (B) vs. Acceptance (G)\n**Resolution:** The cycle as resource — recognizing that decay (B) IS the engine of natural renewal (G)\n\nThe Golgari resolve the B/G tension by understanding that death and growth are not opposites but phases of the same cycle. The grave is not an ending — it is a medium.\n\n**Core themes:** Life-death cycle, decay, scavenging, necromancy, abundance from rot, compost\n**Synergy:** Regenerative metabolism — death as the engine of biological abundance\n**Excesses:** Nihilism as acceptance, entropic resignation, exploitation of the cycle\n\n**Mechanical identity:** Graveyard recursion, scavenge, dredge, overrun, undergrowth, death triggers\n**Real-world analogues:** Decomposition ecology, Buddhist impermanence, circular economy, mycorrhizal networks\n\n*\"We feed the living and we feed upon the dead. The cycle provides.\"*\n\n---\n\n### 3.4 Boros (R+W)\n\n**Colors:** Red + White | **Type:** Enemy (Diagonal)\n**Ravnica role:** The Legion — angelic military force policing Ravnica\n\n**Tension:** Freedom (R) vs. Order (W)\n**Resolution:** Righteous force — order enforced with passionate conviction\n\nThe Boros resolve the R/W tension by channeling passion into the service of law. A Boros soldier doesn't enforce rules from cold duty but from burning conviction that justice matters and must be protected.\n\n**Core themes:** Military, justice, angels, soldiers, zeal, crusade, righteous anger\n**Synergy:** Passionate justice — order expressed through emotional commitment rather than cold obligation\n**Excesses:** Righteous brutality, dogmatic enforcement, violence as first solution\n\n**Mechanical identity:** Aggressive creatures, battalion, mentor, haste, double strike, angels\n**Real-world analogues:** Military organizations, crusades, law enforcement, just war theory\n\n*\"Justice isn't just words on paper. It's fire. And fire cleanses.\"*\n\n---\n\n### 3.5 Simic (U+G)\n\n**Colors:** Blue + Green | **Type:** Enemy (Diagonal)\n**Ravnica role:** The Combine — biomancers redesigning life for an evolving world\n\n**Tension:** Progress (U) vs. Tradition (G)\n**Resolution:** Guided evolution — natural potential (G) refined through intellectual design (U)\n\nThe Simic resolve the U/G tension by transcending it: rather than choosing between nature and knowledge, they apply knowledge TO nature. Evolution doesn't have to be random — it can be directed.\n\n**Core themes:** Evolution, hybridization, bio-engineering, adaptation, synthesis, living design\n**Synergy:** Biomimetic intelligence — learning from nature's solutions then improving upon them\n**Excesses:** Playing god without ethics, nature as mere raw material, hubris of the designer\n\n**Mechanical identity:** +1/+1 counters, evolve, adapt, hybrid creatures, biomass mechanics\n**Real-world analogues:** Genetic engineering, CRISPR research, synthetic biology, biohacking\n\n*\"Nature has had four billion years of R&D. We're just optimizing the results.\"*\n\n---\n\n## 4. Artifact (Pseudo-Color)\n\n**Mana symbol:** `{C}` (colorless) | **Visual:** Ivory/pearl dodecahedron\n**Geometric representation:** Dodecahedron (12 pentagonal faces — echoing the Color Pie's 5-fold symmetry)\n\n### 4.1 Philosophical Status\n\nArtifacts are **philosophically agnostic**. A sword is neither White nor Black; only its use reveals a color identity. This makes the Artifact the universal language of the Color Pie — the only element that transcends the philosophical divisions of the five colors.\n\nIn TSCG terms, Artifacts model a **zero-philosophy substrate**: a pure Structure (S) component with minimal Attractor (A) presence. They are the Material layer beneath the Information layer of the Color Pie.\n\n### 4.2 Core Properties\n\n- **Colorless** — no philosophical commitment required\n- **Universal** — usable by all colors without restriction\n- **Mechanical** — function without inherent narrative\n- **Modular** — components that combine freely across color boundaries\n\n**Symbolism:** Gears, golems, constructs, clocks, weapons, vehicles — technology beyond nature and mind\n**Mechanical identity:** Equipment, vehicles, constructs, non-creature permanents; affinity and metalcraft mechanics\n\n### 4.3 Relationship with Each Color\n\n| Color | Relationship with Artifact |\n|---|---|\n| **White** | Institutional tools — weapons, law enforcement constructs |\n| **Blue** | Strongest affinity — artifact as extension of intellect and progress |\n| **Black** | Power tools — weapons, necromantic machinery, resource engines |\n| **Red** | Ambivalent — creates chaotically, destroys gleefully (artifact destruction) |\n| **Green** | Most hostile — artifacts represent unnatural imposition on organic order |\n\n### 4.4 TSCG Analysis\n\nThe Artifact demonstrates the boundary condition of the Color Pie system: what exists when philosophical content is stripped away entirely? The answer is **pure mechanism** — which, paradoxically, the system cannot function without (equipment, mana rocks, draw engines). Artifacts are the material infrastructure of the philosophical superstructure.\n\n---\n\n## 5. TSCG Analysis\n\n### 5.1 ASFID State (Territory / Eagle Eye)\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **A** (Attractor) | 0.65 | 5 primary + 10 guild attractor basins; philosophical value equilibria |\n| **S** (Structure) | 0.80 | Pentagon topology, 10 explicit guild edges, Artifact neutral node |\n| **F** (Flow) | 0.45 | Mana flow (gameplay); guild mechanics as channels; no thermodynamic flow |\n| **I** (Information) | 0.85 | Very high: encoded meaning per color/guild/artifact; philosophy density |\n| **D** (Dynamics) | 0.50 | 30-year evolution; color pie shifts; guild power dynamics across editions |\n\n**ASFID vector:** `(0.65, 0.80, 0.45, 0.85, 0.50)` — mean **0.65**\n\n### 5.2 REVOI State (Map / Sphinx Eye)\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **R** (Representability) | 0.90 | Colors/guilds/Artifact are immediately communicable across cultures |\n| **E** (Evolvability) | 0.85 | 30 years of controlled evolution; guilds added without disrupting core |\n| **V** (Verifiability) | 0.70 | Philosophical claims normative, not empirical; guild synergies design-validated |\n| **O** (Observability) | 0.75 | Guild mechanics directly observable in gameplay; philosophy inferred |\n| **I** (Interoperability) | 0.90 | Maps onto psychology, political theory, ethics, ecology across 10 guild pairs |\n\n**REVOI vector:** `(0.90, 0.85, 0.70, 0.75, 0.90)` — mean **0.82**\n\n### 5.3 Epistemic Gap\n\n**δ₁ = 0.17** — Spectral class: **Liminal** [0.15, 0.30)\n\nThe Color Wheel is **Map-dominant** (REVOI 0.82 > ASFID 0.65). This is appropriate: it is a generative philosophical framework whose representational and interoperability power far exceeds its empirical grounding. The guild additions (v1.2.0) deepen the Map without proportionally increasing Territory complexity.\n\n### 5.4 GenericConcepts Mobilized (30 total)\n\n**Core concepts:** Polarity (N-ary, N=5), Structure, Attractor, Identity, Boundary, Relation, Synergy, Complementarity, Opposition, Tension, Mediation, Code, Equilibrium, Emergence, Hierarchy (absence), Symmetry, Network, Cycle, Transformation, Threshold, Pattern, Archetype, Balance, Constraint, Gradient, Resonance, Feedback, Modulation, Evolution, Substrate\n\n**New candidates proposed:**\n- **Polarity-N** (`S⊗I⊗A`): N-ary polarity generalization (N=5 for MTG, validated across Wu Xing, Enneagram)\n- **Alliance** (`I⊗S`): structural compatibility bond distinct from Synergy\n- **Antagonism** (`I⊗D`): dynamic conflict with temporal evolution, distinct from static Opposition\n\n---\n\n## References\n\n- Rosewater, M. (2003). *Seeing the Forest and the Trees.* Wizards of the Coast design articles.\n- *Ravnica: City of Guilds* set design (2005) — introduction of 10 guild framework.\n- TSCG Framework v15.10.1 — M2 GenericConcepts, M3 GenesisSpace.\n- Echopraxium (2026). *TSCG: A Transdisciplinary Semantic Concept Graph.* HAL preprint v3.0.\n"},{"id":"NakamotoConsensus","label":"Nakamoto Consensus","domain":"","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/NakamotoConsensus/static/M0_NakamotoConsensus.html","hasReadme":true,"readme":"# Nakamoto Consensus — TSCG Poclet\n\n**Author:** Echopraxium with the collaboration of Claude AI  \n**Version:** 15.10.1  \n**Date:** 2026-03-23  \n**Ontology file:** `M0_Poclet_NakamotoConsensus.jsonld`  \n**Simulation:** `NakamotoConsensus_sim.html`\n\n---\n\n## Overview\n\nThe **Nakamoto Consensus** models Bitcoin's proof-of-work as a **Prigogine dissipative structure** maintained far from thermodynamic equilibrium, via a **Ginzburg-Landau 1D formalism**. It achieves exceptional TSCG coverage: ASFID 5/5, REVOI 5/5, SpectralClass **Coherent** (δ₁ = 0.030).\n\nThis poclet also motivated three **M3 architectural discoveries** (F ≥ 0 axiom relaxation, F as morphic dimension, F_potential / F_active distinction) and five new M2 candidates (Entropy, Stase, Coherence, Processor, Transducer) plus four Combos (Inertia, Potentialization, Absorbing State, Topological Defect).\n\n**Source paper:**  \nRanaora & Yii (2026) — *\"A Phenomenological Statistical-Physics Framework for Distributed Consensus\"*  \nInformation Physics Institute, Sydney  \nDOI: [10.5281/zenodo.19160047](https://zenodo.org/records/19160047)\n\n---\n\n## System Description\n\nThe Nakamoto Consensus is the distributed agreement mechanism underpinning Bitcoin. Miners compete to solve a cryptographic puzzle (Proof-of-Work). The network adopts the longest valid chain, creating a global attractor. Ranaora & Yii show this maps exactly onto a 1D Ginzburg-Landau field theory: hash power acts as effective temperature, chain coherence is the order parameter, and forks are topological defects (KT vortices).\n\n---\n\n## Master Equations\n\n| Name | Formula | Interpretation |\n|---|---|---|\n| Effective temperature | `k_B · T_eff(t) = P_net(t) · τ_L` | Hash power → thermodynamic temperature |\n| Critical block size | `V_B,crit ≈ C_eff · (τ_B/Γ_c − τ₀)` | Max stable block size before propagation delay dominates |\n| Probabilistic finality | `P_reorg(z) = (q/p)^z = exp(−z/ξ)` | Fork probability after z confirmations |\n| Correlation length | `ξ⁻¹ = ln(p/q)` | Fork persistence depth |\n| Nakamoto action | `S_PoW(t₁,t₂) = τ_B · ∫ P_net(t) dt` | Analogue of least-action principle |\n\n---\n\n## TSCG Analysis\n\n### ASFID State (Territory / Eagle Eye 🦅)\n\n| Dim | Score | Justification |\n|-----|-------|---------------|\n| **A** Attractor | 0.92 | Longest-chain rule = global consensus attractor; Ginzburg-Landau order parameter |\n| **S** Structure | 0.89 | Merkle-tree chain + P2P gossip topology; Table I structural homology |\n| **F** Flow | 0.95 | Hash computation as continuous F_active; F_potential in mining pools (F ≥ 0 discovery) |\n| **I** Information | 0.91 | Nonce entropy, block propagation, difficulty bits as information encoding |\n| **D** Dynamics | 0.93 | Real-time difficulty adjustment, fork race, irreversible PoW entropy production |\n\n**Mean ASFID:** 0.920\n\n### REVOI State (Map / Sphinx Eye 🦁)\n\n| Dim | Score | Justification |\n|-----|-------|---------------|\n| **R** Representability | 0.91 | Full Ginzburg-Landau 1D formalism; Table I isomorphism dictionary |\n| **E** Evolvability | 0.83 | Framework extendable to PoS, DAG (lower score: extensions require new formalisms) |\n| **V** Verifiability | 0.95 | 5 explicit falsifiable predictions (§VII.D of source paper) |\n| **O** Observability | 0.89 | All parameters observable on-chain (hash rate, block time, fork rate) |\n| **Im** Interoperability | 0.85 | Direct connection with Cryptocalc; bridges 4 transdisciplinary domains |\n\n**Mean REVOI:** 0.890\n\n### Epistemic Gap\n\n```\nδ₁ = |ASFID_vec − REVOI_vec| / √5 ≈ 0.030\nSpectralClass: Coherent  [0.00, 0.05)\n```\n\nThe near-zero gap confirms that the Ginzburg-Landau formalism provides a genuine Territory model (not just a metaphor), with high verifiability and observability.\n\n---\n\n## Components\n\n| Component | ASFID contribution | Description |\n|---|---|---|\n| Mining Pool (Honest) | F, D, A | Continuous hash computation → F_active; drives chain growth toward attractor |\n| Mining Pool (Attacker) | F, D | Competing hash computation; fork initiator when ≥ q fraction |\n| P2P Network | S, I | Block gossip topology; propagation delay τ_L |\n| Blockchain | S, A | Merkle chain structure + longest-chain attractor |\n| Difficulty Adjustment | D, I, A | Regulation loop every 2016 blocks; keeps τ_B ≈ 600 s |\n| Transaction | I, F | Information flux through mempool → block |\n| Fork | S, A, I | Topological defect — resolved by attractor (longest chain) |\n\n---\n\n## GenericConcepts Mobilized (14)\n\n### Atomic (10)\n\n| Concept | Tensor | Family | Role |\n|---|---|---|---|\n| Dissipation | `F⊗D` | Energetic | Hash computation as irreversible energy degradation |\n| Entropy | `F⊗I⊗D` | Energetic | PoW entropy; source of irreversibility (Feynman) |\n| Attractor | `A` | Dynamic | Longest-chain rule as global order parameter |\n| Process | `D⊗F` | Dynamic | Block mining as temporally unfolded hash search |\n| Cascade | `S⊗I⊗A⊗D⊗F` | Dynamic | Chain growth as amplifying 5D cascade |\n| Threshold | `D⊗I` | Dynamic | Difficulty adjustment mechanism |\n| Regulation | `A⊗I⊗D` | Dynamic | Difficulty regulation loop (τ_B target) |\n| Signal | `I⊗F` | Informational | Block propagation through P2P gossip |\n| Network | `S⊗I` | Structural | P2P topology with gossip protocol |\n| Coherence | `A⊗S⊗I⊗R⊗O` | Structural/Ontol. | Consensus as bicephalous coherence |\n\n### Combos (4) — new M2 candidates from this session\n\n| Concept | Formula | Tensor | Role |\n|---|---|---|---|\n| Inertia | `⊗⇒(Memory, Entropy)` | `S⊗F⊗I⊗D` | Accumulated PoW defines attack cost |\n| Potentialization | `⊗⇒(Activation, Process)` | `A⊗D⊗F` | F=0 → F_active transition (mining startup) |\n| Absorbing State | `⊗⇒(Stase, Entropy)` | `S⊗A⊗F⊗I⊗D` | Transaction finality (6-confirmation rule) |\n| Topological Defect | `⊗⇒(Incoherence, Invariant)` | `S⊗A⊗I⊗R⊗O` | Persistent fork as KT vortex |\n\n---\n\n## Key Insights\n\n1. **F ≥ 0 axiom** — This poclet forced the relaxation of the TSCG M3 axiom `F ≠ 0` to `F ≥ 0`: chain stasis (F=0) is a valid fundamental state (no new blocks), while active mining is F_active, and mining pool reserves are F_potential.\n\n2. **F as morphic dimension** — F is the sole ASFID dimension that structurally requires a source→target relation: `F ∈ Mor(Cat_M3) ∩ Ob(Cat_M3)`. All M2 concepts containing F are natural candidates for entity/morphism duality.\n\n3. **Causal chain** — The poclet reveals a coherent irreversibility chain: `F_active → [Dissipation] → Entropy → [Memory] → Inertia → [maximal] → Absorbing State`.\n\n4. **Topological defect** — A blockchain fork is a KT vortex: local Incoherence protected by a discrete topological invariant (chain index n ∈ ℤ), non-eliminable by continuous deformation.\n\n5. **Falsifiability** — 5 explicit falsifiable predictions in §VII.D of the source paper make this one of the highest-V poclets in the catalogue (V = 0.95).\n\n---\n\n## Transdisciplinary Isomorphisms (Table I)\n\n### Statistical Physics ↔ Nakamoto\n\n| Statistical Physics | Bitcoin / Nakamoto |\n|---|---|\n| Temperature k_B·T | k_B·T_eff = P_net · τ_L |\n| Order parameter φ | Chain coherence (consensus level) |\n| Phase transition | Fork resolution / consensus achievement |\n| Dissipative structure | Mining pool dynamics (Prigogine) |\n| Ginzburg-Landau field | Network hash-state field |\n| Thermal fluctuation | Mining variance / block time jitter |\n| Correlation length ξ | Fork persistence depth |\n| Vortex (KT transition) | Persistent chain fork |\n| Entropy S | PoW entropy S_PoW |\n| Least-action S[φ] | Nakamoto action S_PoW(t₁,t₂) |\n\n### Biology ↔ Nakamoto\n\n| Biology | Bitcoin / Nakamoto |\n|---|---|\n| Quorum sensing | 51% majority rule |\n| Immune memory | Accumulated PoW (Inertia) |\n| Absorbing state | Finalized transaction (6+ confirmations) |\n| Phenotypic stasis | Chain stasis — F=0 |\n| Dissipation | Continuous hash computation |\n\n---\n\n## References\n\n- Ranaora & Yii (2026) — *A Phenomenological Statistical-Physics Framework for Distributed Consensus: Phase Transitions and Thermodynamic Stability* — Information Physics Institute, Sydney — [https://zenodo.org/records/19160047](https://zenodo.org/records/19160047) — DOI: 10.5281/zenodo.19160047\n- Nakamoto, S. (2008) — *Bitcoin: A Peer-to-Peer Electronic Cash System*\n- Prigogine, I. (1978) — *From Being to Becoming* (dissipative structures)\n- Feynman, R. P. (1965) — *The Feynman Lectures on Physics*, Vol. I, Ch. 46 (irreversibility and entropy)\n- TSCG Framework v15.10.1 — [https://github.com/Echopraxium/tscg](https://github.com/Echopraxium/tscg)\n"},{"id":"PhaseTransition","label":"Phase Transition System","domain":"","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/PhaseTransition/static/M0_PhaseTransition.html","hasReadme":true,"readme":"# M0_PhaseTransition — TSCG Poclet README\r\n\r\n**Author:** Echopraxium with the collaboration of Claude AI  \r\n**Version:** 1.1.0  \r\n**Date:** 2026-02-26  \r\n**Domain:** Physical Chemistry / Thermodynamics  \r\n**Ontology file:** `M0_PhaseTransition.jsonld`  \r\n**Simulation:** `phase_transition_sim.py`\r\n\r\n---\r\n\r\n## 1. Overview\r\n\r\nThe **Phase Transition** poclet models the four fundamental states of matter — **Solid, Liquid, Gas** — and the transitions between them, driven by two control parameters: **Temperature (T)** and **Pressure (P)**.\r\n\r\nThis poclet is a canonical example of:\r\n- **Multi-attractor systems** (4 stable phase basins in Gibbs energy landscape)\r\n- **First-order phase transitions** (discrete jumps in density, entropy, latent heat)\r\n- **Second-order / continuous transitions** (liquid-gas supercritical region near critical point)\r\n- **The Ideal Gas Law** as a governing analytical model: **pV = nRT**\r\n\r\n---\r\n\r\n## 2. Governing Physics\r\n\r\n### 2.1 Ideal Gas Law\r\n\r\nFor the **gas phase**, the primary governing equation is:\r\n\r\n```\r\npV = nRT\r\n```\r\n\r\n| Symbol | Meaning | Unit |\r\n|--------|---------|------|\r\n| p | Pressure | Pa |\r\n| V | Volume | m³ |\r\n| n | Amount of substance | mol |\r\n| R | Universal gas constant = 8.314 | J·mol⁻¹·K⁻¹ |\r\n| T | Temperature | K |\r\n\r\nThe volume occupied by `n` moles at given `T` and `p`:\r\n\r\n```\r\nV = nRT / p\r\n```\r\n\r\nFor real gases, van der Waals equation corrects for molecular volume and interactions:\r\n\r\n```\r\n(p + a·n²/V²)(V − nb) = nRT\r\n```\r\n\r\n### 2.2 Clausius-Clapeyron Equation\r\n\r\nThe slope of each phase boundary in the P-T diagram:\r\n\r\n```\r\ndP/dT = L / (T · ΔV)\r\n```\r\n\r\nwhere `L` is the molar latent heat and `ΔV` is the molar volume change.\r\n\r\nFor the liquid-gas boundary (ideal gas approximation):\r\n\r\n```\r\nln(P) = −L_vap / (R·T) + const\r\n```\r\n\r\n### 2.3 Gibbs Phase Rule\r\n\r\n```\r\nF = C − P + 2\r\n```\r\n\r\n| Term | Meaning |\r\n|------|---------|\r\n| F | Degrees of freedom (number of independent variables) |\r\n| C | Number of chemical components |\r\n| P | Number of coexisting phases |\r\n\r\nFor a **single-component** system (C=1):\r\n- 1 phase: F = 2 (T and P both free)\r\n- 2 phases (coexistence curve): F = 1 (only one free variable)\r\n- 3 phases (triple point): F = 0 (invariant — unique T, P)\r\n\r\n### 2.4 Saha Equation (Gas → Plasma)\r\n\r\nIonization equilibrium in the plasma transition:\r\n\r\n```\r\nn_e · n_i / n_a = (2π·m_e·k_B·T)^(3/2) / h³ · (g_i/g_a) · exp(−χ/k_B·T)\r\n```\r\n\r\nwhere `χ` is the ionization energy, `n_e`, `n_i`, `n_a` are number densities of electrons, ions, and neutral atoms.\r\n\r\n---\r\n\r\n## 3. The Four Phases\r\n\r\n| Phase | Layer | Order | Entropy | Ideal Gas Law |\r\n|-------|-------|-------|---------|---------------|\r\n| **Solid** | Bottom (layer 0) | Crystalline (long-range) | Lowest | Not applicable |\r\n| **Liquid** | Layer 1 | Short-range only | Medium | Via vapor pressure (Clausius-Clapeyron) |\r\n| **Gas** | Layer 2 | None | High | **pV = nRT** (directly) |\r\n| **Plasma** | Top (layer 3) | None (ionized) | Highest | Saha equation |\r\n\r\n### Phase Color Codes\r\n- Solid: `#3A5F8A` (dark blue)\r\n- Liquid: `#2E86C1` (ocean blue)\r\n- Gas: `#85C1E9` (sky blue)\r\n- Plasma: `#A569BD` (purple)\r\n\r\n---\r\n\r\n## 4. Phase Transitions\r\n\r\n| Transition | Direction | Type | Latent Heat |\r\n|-----------|-----------|------|-------------|\r\n| Melting / Freezing | Solid ↔ Liquid | First-order | L_fus |\r\n| Vaporization / Condensation | Liquid ↔ Gas | First-order (below Tc) | L_vap |\r\n| Sublimation / Deposition | Solid ↔ Gas | First-order | L_sub = L_fus + L_vap |\r\n| Ionization / Recombination | Gas ↔ Plasma | Continuous (Saha) | χ (ionization energy) |\r\n\r\n### Special Points\r\n\r\n| Point | Definition | Water reference |\r\n|-------|-----------|-----------------|\r\n| **Triple Point** | S + L + G coexist; F = 0 | 273.16 K / 611.73 Pa |\r\n| **Critical Point** | L-G boundary vanishes; supercritical fluid above | 647.1 K / 217.7 atm |\r\n\r\n---\r\n\r\n## 5. Reference Substances\r\n\r\nSeven substances were selected to illustrate diverse phase transition behaviors:\r\n\r\n### 5.1 Water (H₂O)\r\n- **Melting:** 273.15 K (0°C) | **Boiling:** 373.15 K (100°C) at 1 atm\r\n- **Triple point:** 273.16 K / 611.73 Pa\r\n- **Critical point:** 647.1 K / 217.7 atm\r\n- ⚠️ **Anomaly:** Negative melting curve slope (ice less dense than liquid water); density maximum at 277 K\r\n\r\n### 5.2 Methanol (CH₃OH)\r\n- **Melting:** 175.6 K (−97.6°C) | **Boiling:** 337.8 K (64.7°C)\r\n- **Triple point:** 175.6 K / 0.187 Pa (very low — sublimes under even mild vacuum)\r\n- ✅ Useful antifreeze example; wide liquid range\r\n\r\n### 5.3 Gallium (Ga)\r\n- **Melting:** 302.9 K (29.8°C) — melts in hand! | **Boiling:** 2477 K (2204°C)\r\n- **Triple point:** 302.9146 K (ITS-90 fixed point)\r\n- ⚠️ **Anomaly:** Expands on solidification; widest liquid range of metals (2174 K)\r\n\r\n### 5.4 Sulfur (S)\r\n- **Melting:** 388.4 K (115.2°C) | **Boiling:** 717.8 K (444.7°C)\r\n- **Triple point:** 388.4 K / 21.3 kPa\r\n- ⚠️ **Anomaly:** Two stable allotropes (α-S rhombic / β-S monoclinic); viscosity maximum near 430 K (S₈ ring polymerization)\r\n\r\n### 5.5 Iodine (I₂)\r\n- **Melting:** 386.9 K (113.8°C) | **Boiling:** 457.6 K (184.5°C)\r\n- **Triple point:** 386.65 K / 11.7 kPa\r\n- ⚠️ **Anomaly:** Triple point pressure (11.7 kPa) > standard vapor pressure at RT → sublimes visibly at room temperature; produces **violet vapor**\r\n- Classic sublimation demonstration\r\n\r\n### 5.6 Camphor (C₁₀H₁₆O)\r\n- **Melting:** 452 K (179°C) | **Boiling:** 477 K (204°C)\r\n- **Triple point:** 451.5 K / 6.6 kPa\r\n- ⚠️ Very narrow liquid range (~25 K); sublimes at room temperature\r\n- ✅ Cryoscopy calibrant (k_f = 5.5 K·mol⁻¹·kg⁻¹); Beckmann thermometer calibration\r\n\r\n### 5.7 Dichloromethane (CH₂Cl₂)\r\n- **Melting:** 176 K (−97°C) | **Boiling:** 312.7 K (39.6°C)\r\n- **Triple point:** 176 K / 3.5 Pa\r\n- ✅ Low boiling point; high vapor pressure at room temperature (47 kPa at 20°C); dense liquid (1.325 g/mL)\r\n- Classic laboratory solvent for extraction and chromatography\r\n\r\n---\r\n\r\n## 6. TSCG ASFID Analysis\r\n\r\n| Dimension | Phase Transition Manifestation | Score |\r\n|-----------|-------------------------------|-------|\r\n| **A — Attractor** | 4 stable Gibbs energy basins in (T,P) space | 0.90 |\r\n| **S — Structure** | Crystalline → amorphous → disordered → ionized | 0.88 |\r\n| **F — Flow** | Latent heat flows; ideal gas compressible flow | 0.85 |\r\n| **I — Information** | Entropy as thermodynamic information; Boltzmann S = k_B ln(Ω) | 0.82 |\r\n| **D — Dynamics** | Nucleation/growth kinetics; Maxwell-Boltzmann distribution | 0.87 |\r\n| **ASFID Total** | | **0.86** |\r\n\r\n### Key Tensor Formula\r\n```\r\nPhase Stability = A ⊗ D  (Attractor stability as balance of order and thermal energy)\r\nPhase Transition = F ⊗ D  (Heat flow driving state change)\r\nStructural Order = S ⊗ I  (Encoded structural information)\r\n```\r\n\r\n---\r\n\r\n## 7. TSCG REVOI Analysis\r\n\r\n| Dimension | Phase Transition Manifestation | Score |\r\n|-----------|-------------------------------|-------|\r\n| **R — Representability** | P-T phase diagram: complete 2D encoding of all phase regions | 0.92 |\r\n| **E — Evolvability** | Extensible to binary systems, quantum phases, non-equilibrium | 0.78 |\r\n| **V — Verifiability** | DSC, X-ray diffraction, PVT apparatus; pV=nRT < 1% error | 0.95 |\r\n| **O — Observability** | Direct: color, opacity, density jump, latent heat plateau | 0.90 |\r\n| **I — Interoperability** | Universally applicable: chemistry, astrophysics, geology, biology | 0.85 |\r\n| **REVOI Total** | | **0.88** |\r\n\r\n**Epistemic Gap (ΔΘ):** 0.12 (very low — well-constrained system)\r\n\r\n---\r\n\r\n## 8. Mobilized Metaconcepts\r\n\r\nThe Phase Transition poclet activates the following M2 metaconcepts:\r\n\r\n| Metaconcept | Role in Phase Transition |\r\n|------------|--------------------------|\r\n| **m2:Attractor** | 4 Gibbs energy minima as stable attractors |\r\n| **m2:Threshold** | Melting/boiling/sublimation/ionization boundaries |\r\n| **m2:Bifurcation** | Phase boundaries as topological bifurcations |\r\n| **m2:Equilibrium** | Thermodynamic equilibrium within each phase region |\r\n| **m2:Emergence** | Macroscopic properties (viscosity, conductivity) from microscopic structure |\r\n| **m2:Flow** | Latent heat flows; particle flows during evaporation |\r\n| **m2:Dynamics** | Nucleation/growth kinetics; Maxwell-Boltzmann distribution |\r\n| **m2:Order** | Crystalline order parameter; symmetry breaking at transitions |\r\n| **m2:Boundary** | Coexistence curves defining phase region limits |\r\n| **m2:Hierarchy** | Energy hierarchy: ΔH_fus ≪ ΔH_vap ≪ ΔH_ion |\r\n| **m2:Constraint** | Gibbs phase rule constraining degrees of freedom |\r\n| **m2:Symmetry** | Symmetry breaking at phase transitions (crystal symmetry groups) |\r\n\r\n---\r\n\r\n## 9. Cross-Domain Interoperability\r\n\r\nThe phase transition model applies universally:\r\n\r\n| Domain | Phase Transition Application |\r\n|--------|------------------------------|\r\n| **Geophysics** | Mantle transitions: olivine → spinel → perovskite (pressure-driven) |\r\n| **Astrophysics** | Stellar plasma phases; neutron star matter; quark-gluon plasma |\r\n| **Materials Science** | Iron-carbon diagram (ferrite/austenite/cementite/martensite) |\r\n| **Atmospheric Science** | Cloud formation (water condensation/ice nucleation); precipitation |\r\n| **Cryogenics** | Helium superfluid lambda transition at 2.17 K |\r\n| **Biology** | Lipid bilayer phase transitions (gel → fluid); protein folding |\r\n\r\n---\r\n\r\n## 10. Simulation: `phase_transition_sim.py`\r\n\r\n### Layout (1280 × 760 px)\r\n\r\n```\r\n┌──────────────────┬────────────────────────────┬──────────────────────┐\r\n│    LEFT (300px)  │     CENTER (500px)          │    RIGHT (480px)     │\r\n│                  │                             │                      │\r\n│  Substance       │  ┌─────────────────────┐   │  ASFID Scores        │\r\n│  Selector        │  │  PLASMA  (layer 3)  │   │  REVOI Scores        │\r\n│                  │  │  GAS     (layer 2)  │   │  Epistemic Gap       │\r\n│  [SOLID] [LIQ]   │  │  LIQUID  (layer 1)  │   │                      │\r\n│  [GAS]  [PLSM]   │  │  SOLID   (layer 0)  │   │  Ideal Gas Law       │\r\n│                  │  └─────────────────────┘   │  pV = nRT calc       │\r\n│  T slider        │                             │                      │\r\n│  P slider        │  Phase Diagram (P-T plot)  │  Substance data      │\r\n│                  │                             │                      │\r\n└──────────────────┴────────────────────────────┴──────────────────────┘\r\n```\r\n\r\n### Controls\r\n\r\n| Control | Action |\r\n|---------|--------|\r\n| **Temperature slider** | Adjust T (K) in substance-appropriate range |\r\n| **Pressure slider** | Adjust P (atm) from 0.001 to 500 atm |\r\n| **[SOLID]** button | Jump T,P to solid region |\r\n| **[LIQUID]** button | Jump T,P to liquid region |\r\n| **[GAS]** button | Jump T,P to gas region |\r\n| **[PLASMA]** button | Jump T,P to plasma region |\r\n| **Substance selector** | Switch between 7 reference substances |\r\n| **ESC** | Quit |\r\n\r\n### Running the Simulation\r\n\r\n```bash\r\npip install pygame\r\npython phase_transition_sim.py\r\n```\r\n\r\n---\r\n\r\n## 11. File Structure\r\n\r\n```\r\ninstances/poclets/PhaseTransition/\r\n├── M0_PhaseTransition.jsonld       ← Ontology (this file)\r\n├── M0_PhaseTransition_README.md    ← This documentation\r\n└── phase_transition_sim.py         ← Pygame simulation\r\n```\r\n"},{"id":"NuclearReactorsTypology","label":"Nuclear Reactors Typology","domain":"","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/NuclearReactorsTypology/static/M0_NuclearReactorTypology.html","hasReadme":true,"readme":"# M0 Nuclear Reactor Typology - Complete Analysis\n\n**Version**: 1.0.0  \n**Date**: 2026-02-10  \n**Author**: Echopraxium with the collaboration of Claude AI  \n**Poclet Type**: Industrial Energy System - Multipolar Taxonomy  \n**Primary Domain**: Nuclear Engineering\n\n---\n\n## Table of Contents\n\n1. [Executive Summary](#executive-summary)\n2. [Poclet Overview](#poclet-overview)\n3. [ASFID Analysis](#asfid-analysis)\n4. [REVOI Analysis](#revoi-analysis)\n5. [Processor GenericConcept Validation](#processor-GenericConcept-validation)\n6. [The Nine Reactor Poles](#the-nine-reactor-poles)\n7. [M2 GenericConcept Validation](#m2-GenericConcept-validation)\n8. [M1 Core Concepts Discovery](#m1-core-concepts-discovery)\n9. [M1_EnergyGenerators Extension](#m1_energygenerators-extension)\n10. [Enneagram Structure Analysis](#enneagram-structure-analysis)\n11. [Trade-off Space](#trade-off-space)\n12. [Transdisciplinary Validation](#transdisciplinary-validation)\n13. [Significance and Contributions](#significance-and-contributions)\n14. [Future Work](#future-work)\n\n---\n\n## Executive Summary\n\nThe **Nuclear Reactor Typology** poclet is TSCG's first industrial energy system model, demonstrating:\n\n✅ **Processor GenericConcept** - First validation in complex engineering domain  \n✅ **N=9 Polarity** - Second validation after Yggdrasil (mythological → industrial)  \n✅ **Dual bicephalous architecture** - Territory (empirical fission dynamics) + Map (safety models, standards)  \n✅ **6 M1 Core Concepts** - Transdisciplinary patterns (CriticalityRegime, SelfSustainingReaction, etc.)  \n✅ **M1_EnergyGenerators** - New domain extension for all power generation technologies  \n✅ **Complete ASFID coverage** - All 5 dimensions present (A=0.95, S=0.90, F=0.90, I=0.85, D=0.90)  \n✅ **8 transdisciplinary domains** - Engineering, physics, economics, safety, politics, environment, control theory, materials  \n\n**Key Innovation**: Enneagram-inspired classification revealing philosophical design trade-offs (safety ↔ performance ↔ cost ↔ sustainability) embedded in technical choices.\n\n---\n\n## Poclet Overview\n\n### Definition\n\nA **nuclear reactor** is a **Processor** (M2 GenericConcept) that transforms nuclear fuel into thermal energy through controlled fission chain reactions, maintaining criticality (k_eff = 1) via regulation mechanisms.\n\n### Minimality Criterion\n\nThe poclet includes **exactly 9 reactor types** representing distinct philosophical approaches to nuclear energy:\n\n1. **PWR** - Le Précurseur rigoureux (proven, standardized)\n2. **BWR** - L'Économe efficace (simple, fewer components)\n3. **FNR** - L'Innovant performant (breeding, sustainability)\n4. **PHWR** - Le Lourd robuste (energy independence, natural U)\n5. **RBMK** - Le Graphité ancestral (historical, Chernobyl legacy)\n6. **HTR** - Le Sûr résilient (inherent safety, passive)\n7. **SMR** - Le Compact mobile (modular, flexible)\n8. **MSR** - Le Visionnaire radical (liquid fuel, waste burning)\n9. **AGR** - Le Fiable éprouvé (high efficiency, proven UK design)\n\n**Why N=9?** Each pole represents a **fundamental design philosophy**, not merely a technical variation. For example:\n- PWR vs FNR: Proven vs Innovative\n- BWR vs PHWR: Simplicity vs Independence\n- HTR vs RBMK: Passive safety vs Active control\n\n### Completeness Criterion\n\n**All 5 ASFID dimensions** are present in every reactor type:\n\n| Dimension | Nuclear Reactor Manifestation |\n|-----------|------------------------------|\n| **A** (Attractor) | Criticality k=1, power output setpoint, temperature equilibrium |\n| **S** (Structure) | Reactor vessel, fuel assemblies, moderator, coolant circuits, control rods |\n| **F** (Flow) | Neutron flux (10¹³-10¹⁴ n/cm²·s), thermal flux, coolant circulation |\n| **I** (Information) | Control signals, measurements (T, P, neutron flux, radiation) |\n| **D** (Dynamics) | Fission chain reaction, thermal transients, xenon oscillations |\n\n---\n\n## ASFID Analysis\n\n### A - Attractor (0.95)\n\n**Primary Attractor**: **Criticality** k_eff = 1.0\n\nThe self-sustaining chain reaction requires:\n- Exactly 1 neutron from each fission event triggers a new fission\n- k < 1: Subcritical (reactor shuts down)\n- k = 1: Critical (steady-state operation)\n- k > 1: Supercritical (power increase, potentially runaway)\n\n**Secondary Attractors**:\n- Power output setpoint (e.g., 1000 MWe)\n- Temperature equilibrium (primary coolant 325°C for PWR)\n- Pressure equilibrium (155 bar for PWR)\n\n**Homeostatic Mechanisms**:\n- Negative temperature coefficient (PWR, BWR, HTR)\n- Control rod insertion (all types)\n- Boron injection (PWR emergency shutdown)\n- Xenon poisoning (natural negative feedback after ~6-9 hours)\n\n**Score Justification**: 0.95 - Very strong attractor with multiple stable equilibria and robust homeostatic regulation.\n\n---\n\n### S - Structure (0.90)\n\n**Core Components** (all reactor types):\n\n1. **Fuel assemblies**\n   - Fissile material (U-235, Pu-239, Th-232)\n   - Cladding (zircaloy for PWR/BWR, stainless steel for AGR, TRISO for HTR)\n   - Geometry (rods, pebbles, or liquid salt)\n\n2. **Moderator** (thermal reactors only)\n   - Light water (PWR, BWR)\n   - Heavy water (PHWR)\n   - Graphite (RBMK, HTR, AGR)\n   - None (FNR - fast spectrum)\n\n3. **Coolant**\n   - Light water (PWR pressurized, BWR boiling)\n   - Heavy water (PHWR)\n   - Sodium (FNR)\n   - Helium (HTR)\n   - CO₂ (AGR)\n   - Molten fluoride salts (MSR)\n\n4. **Control rods**\n   - Neutron absorbers (Ag-In-Cd, B₄C)\n   - Movable or gravity-driven\n   - Redundant systems\n\n5. **Reactor vessel/core**\n   - Steel pressure vessel (PWR, BWR)\n   - Pressure tubes (PHWR)\n   - Concrete vessel (AGR, RBMK)\n   - Pebble bed (HTR)\n\n6. **Containment**\n   - Reinforced concrete (PWR, BWR - Gen II/III)\n   - None (RBMK - fatal design flaw)\n   - Underground (some SMR designs)\n\n**Structural Topology**:\n- **PWR/BWR**: Compact vertical cylinder\n- **PHWR**: Horizontal pressure tubes\n- **FNR**: Pool-type or loop-type\n- **HTR**: Pebble bed (random packing) or prismatic (hexagonal)\n- **MSR**: Graphite core with flowing salt\n\n**Score Justification**: 0.90 - Clear hierarchical structure, some complexity in fuel geometry and coolant circuit topology.\n\n---\n\n### F - Flow (0.90)\n\n**Three Primary Flows**:\n\n1. **Neutron Flux** (F_neutrons)\n   - Thermal: 10¹³-10¹⁴ n/(cm²·s) (PWR, BWR, PHWR, HTR, AGR)\n   - Fast: 10¹⁵ n/(cm²·s) (FNR)\n   - Spatial distribution (center-peaked, flux tilt)\n\n2. **Thermal Flow** (F_thermal)\n   - Heat generation: ~200 MeV per fission = 3.2×10⁻¹¹ J\n   - Power density: 50-100 kW/L (PWR core)\n   - Heat transfer: fuel → cladding → coolant\n\n3. **Coolant Flow** (F_coolant)\n   - PWR: 5-20 m³/s (forced circulation)\n   - BWR: Natural + forced circulation\n   - FNR: 10-30 m³/s liquid sodium\n   - HTR: 10-40 kg/s helium\n   - MSR: 1-10 m³/s molten salt\n\n**Flow Coupling**:\n```\nNeutron Flux → Fission Rate → Heat Generation → Coolant Temperature → Reactivity Feedback → Neutron Flux\n```\n\n**Critical Flow Phenomena**:\n- **DNB** (Departure from Nucleate Boiling) - PWR safety limit\n- **Dryout** - BWR safety limit\n- **Flow instabilities** - Natural circulation BWR\n- **Thermal stratification** - FNR sodium pools\n\n**Score Justification**: 0.90 - Multiple interacting flows with strong coupling, well-understood fluid dynamics.\n\n---\n\n### I - Information (0.85)\n\n**Measurement Systems**:\n\n1. **Neutron detectors**\n   - Ex-core (source range, intermediate, power range)\n   - In-core (flux mapping, tilt detection)\n   - Delayed neutron precursors (reactivity measurement)\n\n2. **Temperature sensors**\n   - Core outlet temperature (hundreds of RTDs)\n   - Fuel centerline temperature (inference)\n   - Coolant temperature distribution\n\n3. **Pressure sensors**\n   - Primary system pressure (PWR: 155 bar)\n   - Steam pressure (secondary side)\n   - Containment pressure\n\n4. **Radiation monitors**\n   - Fission product activity\n   - Activation products\n   - Area radiation monitors\n\n**Control Signals**:\n- Control rod position demand\n- Boron concentration setpoint (PWR)\n- Recirculation flow rate (BWR)\n- Turbine load demand\n- Safety injection actuation\n\n**Information Processing**:\n- Reactor protection system (RPS) - digital/analog\n- Core monitoring system (flux reconstruction)\n- Safety parameter display system (SPDS)\n- Predictive models (core physics, thermal-hydraulics)\n\n**Epistemic Challenges**:\n- Fuel burnup distribution (inference from models)\n- In-core flow distribution (limited instrumentation)\n- Fission product inventory (decay heat estimation)\n\n**Score Justification**: 0.85 - Rich information system, but some observability gaps (in-core conditions).\n\n---\n\n### D - Dynamics (0.90)\n\n**Timescales** (7 orders of magnitude):\n\n| Phenomenon | Timescale | Physical Process |\n|------------|-----------|------------------|\n| **Prompt neutrons** | 10⁻⁵ s | Instant fission neutrons |\n| **Delayed neutrons** | 0.1-80 s | Precursor decay (6 groups) |\n| **Thermal feedback** | 1-10 s | Fuel/coolant temperature change |\n| **Xenon transients** | 6-40 hours | ¹³⁵Xe buildup/decay |\n| **Samarium transients** | 10-50 hours | ¹⁴⁹Sm buildup |\n| **Fuel depletion** | months-years | Burnup, Pu buildup |\n| **Structural aging** | decades | Embrittlement, corrosion |\n\n**Key Dynamic Processes**:\n\n1. **Point Kinetics** (neutron population dynamics)\n   ```\n   dn/dt = [(ρ - β)/Λ]·n + Σᵢ λᵢ·Cᵢ\n   dCᵢ/dt = (βᵢ/Λ)·n - λᵢ·Cᵢ\n   ```\n   Where:\n   - ρ = reactivity\n   - β = delayed neutron fraction\n   - Λ = prompt neutron lifetime\n   - Cᵢ = delayed neutron precursor concentration\n\n2. **Reactivity Feedback**\n   ```\n   ρ_total = ρ_ext + α_D·(T_fuel - T₀) + α_M·(T_mod - T₀) + α_V·(void - void₀)\n   ```\n   - α_D = Doppler coefficient (negative)\n   - α_M = moderator temperature coefficient (negative for PWR)\n   - α_V = void coefficient (negative for PWR/BWR, positive for RBMK!)\n\n3. **Thermal-Hydraulic Coupling**\n   - Heat conduction: fuel → gap → cladding\n   - Convection: cladding → coolant\n   - Steam generation (BWR) or pressurizer dynamics (PWR)\n\n4. **Xenon Oscillations** (spatial power distribution)\n   - Axial xenon oscillations (suppressed by control)\n   - Radial xenon oscillations (rare, large cores)\n\n**Stability Analysis**:\n- **PWR**: Inherently stable (negative feedback)\n- **BWR**: Potential density wave oscillations\n- **RBMK**: Unstable (positive void coefficient) → Chernobyl\n- **HTR**: Walk-away safe (strong negative feedback)\n\n**Score Justification**: 0.90 - Rich dynamics across multiple timescales, well-modeled but some transients remain challenging.\n\n---\n\n## REVOI Analysis\n\n### R - Representability (0.95)\n\n**Symbolic Representations**:\n\n1. **Reactor Physics Models**\n   - Diffusion theory (2-group, multi-group)\n   - Transport theory (S_N, Monte Carlo)\n   - Point kinetics equations\n\n2. **Thermal-Hydraulic Models**\n   - Sub-channel analysis (COBRA, VIPRE)\n   - System codes (RELAP5, TRACE, CATHARE)\n   - CFD for detailed flow (STAR-CCM+, ANSYS Fluent)\n\n3. **Fuel Performance Models**\n   - FRAPCON (steady-state)\n   - FRAPTRAN (transients)\n   - Fuel burnup codes (CASMO, HELIOS)\n\n4. **Safety Analysis**\n   - LOCA (Loss of Coolant Accident)\n   - ATWS (Anticipated Transient Without Scram)\n   - Severe accident progression (MELCOR, MAAP)\n\n**Standard Notations**:\n- k_eff (effective multiplication factor)\n- DNBR (Departure from Nucleate Boiling Ratio)\n- LHGR (Linear Heat Generation Rate, kW/m)\n- Burnup (MWd/kgU)\n\n**Documentation**:\n- P&ID (Piping & Instrumentation Diagrams)\n- FSAR (Final Safety Analysis Report)\n- Technical Specifications (Tech Specs)\n- NRC regulatory guides\n\n**Score Justification**: 0.95 - Extremely well-formalized with validated codes, standardized terminology, rigorous safety analysis.\n\n---\n\n### E - Evolvability (0.85)\n\n**Generational Evolution**:\n\n| Generation | Period | Key Features | Examples |\n|------------|--------|--------------|----------|\n| **Gen I** | 1950s-1960s | Prototypes, experimental | Magnox, Shippingport |\n| **Gen II** | 1970s-1990s | Commercial, proven | PWR, BWR, PHWR, RBMK |\n| **Gen III** | 1990s-2010s | Enhanced safety | AP1000, EPR, ABWR |\n| **Gen III+** | 2010s-present | Passive safety | APR1400, VVER-1200 |\n| **Gen IV** | 2030s+ (target) | Sustainability, waste | FNR, MSR, HTR, SCWR |\n\n**Adaptation Mechanisms**:\n- **Fuel assembly design**: From square to hexagonal (efficiency)\n- **Burnable poisons**: Gd₂O₃, Er₂O₃ integrated in fuel\n- **Digital I&C**: Replacing analog systems\n- **Passive safety**: Natural circulation, gravity-driven ECCS\n\n**Fuel Cycle Flexibility**:\n- PWR: UO₂ → MOX (mixed oxide U+Pu)\n- PHWR: Natural U → Pu, Th\n- FNR: U-238 → Pu-239 (breeding)\n- MSR: Th-232 → U-233 (thorium cycle)\n\n**Score Justification**: 0.85 - Strong evolution demonstrated (Gen I→IV), but fundamental physics limits some adaptations.\n\n---\n\n### V - Verifiability (0.90)\n\n**Empirical Validation**:\n\n1. **Critical Experiments**\n   - Zero-power reactors (ZPR)\n   - Reactivity coefficient measurements\n   - Control rod worth measurements\n\n2. **Operational Data**\n   - 440+ commercial reactors worldwide\n   - >18,000 reactor-years of operation\n   - Detailed performance tracking\n\n3. **Post-Irradiation Examination (PIE)**\n   - Fuel burnup measurements\n   - Fission gas release\n   - Cladding corrosion\n\n4. **Safety Tests**\n   - LOFT (Loss of Fluid Test) - USA\n   - PHEBUS-FP (severe accident) - France\n   - QUENCH (zirconium oxidation) - Germany\n\n**Code Validation**:\n- Benchmark problems (OECD/NEA)\n- Experimental facility simulations\n- Plant transient recreations (e.g., TMI-2 analysis)\n\n**Regulatory Verification**:\n- Design Certification (NRC, IAEA)\n- Periodic Safety Review (PSR)\n- License Renewal (aging management)\n\n**Score Justification**: 0.90 - Extensive empirical validation, but some severe accident scenarios difficult to test at full scale.\n\n---\n\n### O - Observability (0.90)\n\n**Direct Observables**:\n- Ex-core neutron flux (10⁻¹⁰ to 10² A current)\n- Coolant temperatures (±0.1°C accuracy)\n- Pressures (±0.1 bar)\n- Vibration (fuel assembly motion)\n\n**Inferred Observables**:\n- In-core power distribution (flux map reconstruction)\n- Fuel centerline temperature (thermal model)\n- Fission product inventory (decay heat calculation)\n- Reactivity (inverse kinetics)\n\n**Hidden States** (low observability):\n- Fuel pellet cracking\n- Pellet-cladding interaction (PCI)\n- Internal crud deposits\n- Cladding hydriding\n\n**M
