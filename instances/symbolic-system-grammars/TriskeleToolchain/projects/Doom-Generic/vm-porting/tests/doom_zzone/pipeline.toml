name         = "doom_zzone"
type         = "c"
sources      = ["src/z_zone.c", "src/doom_zzone_test.c"]
include_dirs = ["include"]
entry        = "main"
libs         = []
sdl2         = false

[validation]
expected_exit = 255
tests = [
    "Test 1 (bit 0): Z_Malloc non-NULL  — real z_zone.c + I_ZoneBase stub",
    "Test 2 (bit 1): Z_Free + Z_CheckHeap — heap integrity after free",
    "Test 3 (bit 2): *user == p3         — double indirection write in Z_Malloc",
    "Test 4 (bit 3): p4 != p3            — two allocations have different addresses",
    "Test 5 (bit 4): Z_FreeTags PU_LEVEL — tagged free increases Z_FreeMemory",
    "Test 6 (bit 5): Z_FreeMemory after Z_Free — coalesce increases free space",
    "Test 7 (bit 6): Z_CheckHeap after 8 alloc/4 free cycles — no corruption",
    "Test 8 (bit 7): alloc-after-free reuses rover region",
]
