<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TriskeleVM — WASM Interactive</title>
  <style>
    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    h1 { color: #00d4ff; }
    .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
    #drop-zone {
      border: 2px dashed #00d4ff;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      background: rgba(0, 212, 255, 0.1);
    }
    #run-btn {
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      padding: 10px 24px;
      font-family: monospace;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    #run-btn:hover { background: #00b8d9; }
    #output {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 16px;
      min-height: 80px;
      white-space: pre-wrap;
      color: #00ff88;
    }
    /* stdin input row — hidden until the VM asks for input */
    #input-row {
      display: none;
      margin-top: 12px;
      gap: 8px;
      align-items: center;
    }
    #input-row.visible { display: flex; }
    #stdin-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #00d4ff;
      border-radius: 4px;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 1em;
      color: #00ff88;
      outline: none;
    }
    #stdin-submit {
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }
    #stdin-submit:hover { background: #00b8d9; }
    #status { color: #888; font-size: 0.85em; margin-top: 8px; }
    .error  { color: #ff6b6b !important; }
    .info   { color: #ffd700; }
  </style>
</head>
<body>

<h1>⚡ TriskeleVM — WASM Interactive</h1>
<p class="subtitle">Z-Machine spike — interactive stdin via Web Worker + SharedArrayBuffer</p>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <p>📂 Drop a <strong>.tvmx</strong> file here, or click to browse</p>
  <p style="color:#666;font-size:0.8em">Compile: clang → tsk-cc → tsk-link</p>
  <input type="file" id="file-input" accept=".tvmx" style="display:none">
</div>

<button id="run-btn" onclick="runInteractive()">▶ Run (interactive)</button>

<div id="output">Waiting for .tvmx file...</div>

<!-- stdin input row — shown by the hub when VM sends "needInput" -->
<div id="input-row">
  <input type="text" id="stdin-input" placeholder="Type input and press Enter…" autocomplete="off">
  <button id="stdin-submit" onclick="submitInput()">↵ Send</button>
</div>

<div id="status"></div>

<script type="module">
  import init, { create_stdin_sab } from './pkg/triskele_vm_wasm.js';

  // ── State ─────────────────────────────────────────────────────────────────
  let tvmxBytes = null;   // Uint8Array of the loaded .tvmx
  window.window.vmWorker = null;   // exposed for debug   // Web Worker running the VM
  window.stdinSab = null;   // SharedArrayBuffer for stdin
  window.sabI32   = null;   // Int32Array view over stdinSab (for Atomics)
  window.sabU8    = null;   // Uint8Array view over data region

  // SAB layout (must match Rust constants in lib.rs)
  const SAB_IDX_FLAG = 1;
  const SAB_IDX_LEN  = 2;
  const SAB_DATA_BYTE_OFFSET = 12;
  const SAB_DATA_SIZE        = 4096;
  const FLAG_VM_WAITING = 0;
  const FLAG_LINE_READY = 1;
  const FLAG_EOF        = 2;

  // ── Init WASM ─────────────────────────────────────────────────────────────
  async function initWasm() {
    try {
      await init();
      setStatus('WASM loaded ✓ — drop a .tvmx to run interactively', 'info');
    } catch(e) {
      setStatus('Failed to load WASM: ' + e, 'error');
    }
  }

  // ── Run interactive ───────────────────────────────────────────────────────
  window.runInteractive = async function() {
    if (!tvmxBytes) { setStatus('No file loaded', 'error'); return; }
    if (window.vmWorker)   { setStatus('VM already running', 'error'); return; }

    // Clear output, hide input row.
    setOutput('');
    hideInputRow();
    setStatus('Starting VM worker…', 'info');

    // 1. Create the stdin SAB on the main thread (requires COOP/COEP context).
    window.stdinSab = create_stdin_sab();
    window.sabI32 = new Int32Array(window.stdinSab);
    window.sabU8  = new Uint8Array(window.stdinSab, SAB_DATA_BYTE_OFFSET, SAB_DATA_SIZE);

    // 2. Spawn the VM worker.
    window.vmWorker = new Worker('./worker.js', { type: 'module' });

    // Single onmessage handler — avoids listener ordering issues.
    // Handles both the 'ready' handshake and all runtime hub messages.
    let workerReady = false;
    window.vmWorker.onmessage = function(event) {
        const msg = event.data;

        // Phase 1: wait for 'ready' before sending 'start'.
        if (!workerReady) {
            if (msg.type === 'ready') {
                workerReady = true;
                window.vmWorker.postMessage({ type: 'start', tvmxBytes, sab: window.stdinSab });
                setStatus('VM running…', 'info');
            } else if (msg.type === 'error') {
                setStatus('Worker init error: ' + msg.message, 'error');
                window.vmWorker = null;
            }
            return;
        }

        // Phase 2: hub routing — VM is running.
        switch (msg.type) {
            case 'output':
                appendOutput(msg.text);
                break;
            case 'needInput':
                showInputRow();
                break;
            case 'halted':
                appendOutput('\n[Exit: ' + msg.exitCode + ']');
                hideInputRow();
                setStatus('Done (exit ' + msg.exitCode + ')', '');
                window.vmWorker = null;
                break;
            default:
                console.warn('[hub] unknown message type:', msg.type);
        }
    };

    window.vmWorker.onerror = (e) => {
        setStatus('Worker error: ' + e.message, 'error');
        hideInputRow();
        window.vmWorker = null;
    };
  };

  // ── Submit a line of stdin ────────────────────────────────────────────────
  window.submitInput = function() {
    const input = document.getElementById('stdin-input');
    const line  = input.value;
    input.value = '';
    hideInputRow();

    // Echo the line to the output terminal.
    appendOutput(line + '\n');

    // Write the line into the SAB data region (UTF-8).
    const encoded = new TextEncoder().encode(line);
    const n = Math.min(encoded.length, SAB_DATA_SIZE);
    window.sabU8.set(encoded.subarray(0, n));

    // Write length into SAB[IDX_LEN].
    Atomics.store(window.sabI32, SAB_IDX_LEN, n);

    // Set flag to 1 (line ready) and wake the worker.
    Atomics.store(window.sabI32, SAB_IDX_FLAG, FLAG_LINE_READY);
    Atomics.notify(window.sabI32, SAB_IDX_FLAG, 1);
  };

  // ── Enter key submits ─────────────────────────────────────────────────────
  document.getElementById('stdin-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitInput();
  });

  // ── UI helpers ────────────────────────────────────────────────────────────
  function setStatus(msg, cls) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls || '';
  }
  function setOutput(text) {
    document.getElementById('output').textContent = text;
  }
  function appendOutput(text) {
    const el = document.getElementById('output');
    el.textContent += text;
    el.scrollTop = el.scrollHeight;
  }
  function showInputRow() {
    const row = document.getElementById('input-row');
    row.classList.add('visible');
    document.getElementById('stdin-input').focus();
  }
  function hideInputRow() {
    document.getElementById('input-row').classList.remove('visible');
  }

  // ── File loading (unchanged from patch-1) ────────────────────────────────
  function handleFile(file) {
    if (!file.name.endsWith('.tvmx')) {
      setStatus('Please select a .tvmx file', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      tvmxBytes = new Uint8Array(e.target.result);
      setStatus(`Loaded: ${file.name} (${tvmxBytes.length} bytes)`, 'info');
      setOutput(`Ready to run: ${file.name}\nClick ▶ Run (interactive)`);
      document.getElementById('run-btn').style.display = 'inline-block';
    };
    reader.readAsArrayBuffer(file);
  }

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  initWasm();
</script>

</body>
</html>
