<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preferences — TscgOntologyEditor</title>
  <link id="theme-stylesheet" rel="stylesheet" href="../renderer/themes/night.css">
  <link rel="stylesheet" href="preferences.css">
</head>
<body>

  <div id="pref-container">
    <!-- Left nav — populated dynamically from schema sections -->
    <nav id="pref-nav"></nav>

    <!-- Right content — populated dynamically per selected section -->
    <main id="pref-content"></main>
  </div>

  <footer id="pref-footer">
    <button id="btn-pref-cancel" class="pref-btn">Cancel</button>
    <button id="btn-pref-apply"  class="pref-btn pref-btn-primary">Apply</button>
    <button id="btn-pref-ok"     class="pref-btn pref-btn-primary">OK</button>
  </footer>

  <script src="preferences.js"></script>
</body>
</html>
