<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline' file:;
                 style-src  'self' 'unsafe-inline';
                 img-src    'self' data: blob:;
                 connect-src 'none';">
  <title>TSCG &mdash; Poclet Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <header id="header">
    <span class="logo">TSCG</span>
    <span class="title">Poclet Explorer</span>
  </header>

  <!-- LEFT: File tree -->
  <div id="tree-panel">
    <div id="tree-header">
      Poclets
      <span id="tree-count">0 poclets</span>
    </div>
    <div id="tree-list"></div>
  </div>

  <!-- SPLITTER -->
  <div id="splitter"></div>

  <!-- RIGHT: README -->
  <div id="readme-panel">
    <div id="readme-header">
      <span id="readme-poclet-name" style="color:var(--muted)">Select a poclet</span>
    </div>
    <div id="readme-body">
      <div class="readme-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <div class="ph-title">Select a poclet</div>
        <div class="ph-sub">Click a poclet in the left panel to read its README</div>
        <div class="ph-sub" style="margin-top:6px;font-size:10px;color:var(--border2)">
          &#8593;&#8595; Arrow keys to navigate &nbsp;&middot;&nbsp; Enter to launch
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer id="footer">
    <div id="launch-buttons">
      <button class="btn-run" disabled>&#9654; Run Poclet</button>
    </div>
    <span id="footer-info"></span>
    <span id="footer-path"></span>
  </footer>

</div>
<script src="renderer.js"></script>
</body>
</html>
