<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TSCG Markdown Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap');

  :root {
    --bg:      #0f1117; --bg2: #161b27; --bg3: #1e2535;
    --border:  #2d3552; --accent: #7c6af0; --accent2: #4ecdc4;
    --text:    #e8eaf0; --text2: #9ba4bc; --code-bg: #0d1117;
    --link:    #7c6af0; --warn: #f6b93b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px; line-height: 1.75;
    padding: 0;
  }

  /* ── Toolbar ── */
  #toolbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 10px 40px; display: flex; align-items: center; gap: 14px;
  }
  #toolbar .title {
    font-size: 13px; font-weight: 700; color: var(--accent);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #toolbar .badge {
    font-size: 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 2px 10px; color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Layout ── */
  .layout { display: flex; min-height: calc(100vh - 49px); }

  /* ── Sidebar ── */
  nav#sidebar {
    width: 240px; min-width: 240px;
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 20px 0 40px; overflow-y: auto;
    position: sticky; top: 49px; height: calc(100vh - 49px);
    font-size: 12px;
  }
  nav#sidebar .nav-section {
    padding: 14px 16px 4px; font-size: 10px; font-weight: 700;
    color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;
  }
  nav#sidebar a {
    display: block; padding: 5px 16px;
    color: var(--text2); text-decoration: none;
    border-left: 2px solid transparent; transition: all .12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  nav#sidebar a.h3 { padding-left: 28px; font-size: 11px; }
  nav#sidebar a:hover { color: var(--text); background: var(--bg3); }
  nav#sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg3); }

  /* ── Content ── */
  #content {
    flex: 1; max-width: 860px;
    padding: 40px 56px 80px;
    overflow-x: hidden;
  }

  /* ── Markdown styles ── */
  h1 { font-size: 2rem; color: var(--text); border-bottom: 2px solid var(--accent);
       padding-bottom: 10px; margin: 32px 0 18px; }
  h2 { font-size: 1.4rem; color: var(--accent); margin: 36px 0 14px;
       padding-left: 12px; border-left: 3px solid var(--accent); }
  h3 { font-size: 1.1rem; color: var(--accent2); margin: 24px 0 10px; }
  h4 { font-size: .95rem; color: var(--warn); margin: 18px 0 8px; }
  h5, h6 { font-size: .9rem; color: var(--text2); margin: 14px 0 6px; }

  p  { margin-bottom: 14px; }
  ul, ol { margin: 0 0 14px 24px; }
  li { margin-bottom: 4px; }
  li > ul, li > ol { margin-top: 4px; margin-bottom: 4px; }

  a  { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  strong { color: var(--accent2); font-weight: 600; }
  em     { color: var(--warn); font-style: italic; }

  code {
    font-family: 'IBM Plex Mono', monospace; font-size: .82em;
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; color: var(--accent2);
  }
  pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 22px; overflow-x: auto;
    margin: 14px 0; font-family: 'IBM Plex Mono', monospace;
    font-size: .82rem; line-height: 1.6; color: #c9d1d9;
  }
  pre code {
    background: none; border: none; padding: 0;
    color: inherit; font-size: inherit;
  }

  blockquote {
    border-left: 3px solid var(--accent); margin: 14px 0;
    padding: 10px 18px; background: var(--bg2); border-radius: 0 8px 8px 0;
    color: var(--text2); font-style: italic;
  }

  table {
    width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .88rem;
  }
  th {
    text-align: left; padding: 10px 14px; background: var(--bg3);
    color: var(--accent); font-size: .78rem; font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: var(--bg2); }

  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  img { max-width: 100%; border-radius: 8px; margin: 12px 0; }

  /* ── Error/loading states ── */
  #error {
    display: none; text-align: center; padding: 80px 40px;
    color: var(--text2); font-family: 'IBM Plex Mono', monospace;
  }
  #error .code { font-size: 3rem; color: var(--accent); margin-bottom: 12px; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="title" id="toolbar-title">Loading…</div>
  <div class="badge">.md</div>
</div>

<div class="layout">
<nav id="sidebar"><div id="nav-links"></div></nav>
<div id="error">
  <div class="code">404</div>
  <div id="error-msg">File not found.</div>
</div>

<div id="content"></div>
</div><!-- /.layout -->

<script>
// ── Simple Markdown → HTML converter (no external deps) ──────────────
function mdToHtml (md) {
  // Escape HTML in code blocks first (save and restore)
  const codeBlocks = []
  md = md.replace(/```([^\n]*)\n([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push(`<pre><code class="language-${lang}">${esc(code.trimEnd())}</code></pre>`)
    return `\x00CODE${codeBlocks.length - 1}\x00`
  })
  const inlineCodes = []
  md = md.replace(/`([^`]+)`/g, (_, code) => {
    inlineCodes.push(`<code>${esc(code)}</code>`)
    return `\x00INLINE${inlineCodes.length - 1}\x00`
  })

  const lines   = md.split('\n')
  const out     = []
  let inList    = null   // 'ul' | 'ol' | null
  let inTable   = false
  let inBq      = false

  const closeList  = () => { if (inList)  { out.push(`</${inList}>`) ; inList  = null } }
  const closeTable = () => { if (inTable) { out.push('</tbody></table>') ; inTable = false } }
  const closeBq    = () => { if (inBq)    { out.push('</blockquote>')  ; inBq    = false } }

  for (let i = 0; i < lines.length; i++) {
    const raw  = lines[i]
    const line = raw.trim()

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) {
      closeList(); closeTable(); closeBq()
      out.push('<hr>'); continue
    }

    // Headings
    const hm = line.match(/^(#{1,6})\s+(.+)/)
    if (hm) {
      closeList(); closeTable(); closeBq()
      const level = hm[1].length
      const id    = hm[2].toLowerCase().replace(/[^a-z0-9]+/g, '-')
      out.push(`<h${level} id="${id}">${inline(hm[2])}</h${level}>`); continue
    }

    // Blockquote
    if (line.startsWith('>')) {
      closeList(); closeTable()
      if (!inBq) { out.push('<blockquote>'); inBq = true }
      out.push(`<p>${inline(line.slice(1).trim())}</p>`); continue
    } else { closeBq() }

    // Table row
    if (line.startsWith('|')) {
      const cells = line.replace(/^\||\|$/g, '').split('|').map(c => c.trim())
      if (!inTable) {
        closeList()
        // peek next line for separator
        const nextLine = (lines[i + 1] || '').trim()
        if (/^\|?[\s\-:|]+\|/.test(nextLine)) {
          out.push('<table><thead><tr>')
          cells.forEach(c => out.push(`<th>${inline(c)}</th>`))
          out.push('</tr></thead><tbody>')
          inTable = true; i++  // skip separator
        } else {
          out.push(`<p>${inline(line)}</p>`)
        }
      } else {
        out.push('<tr>')
        cells.forEach(c => out.push(`<td>${inline(c)}</td>`))
        out.push('</tr>')
      }
      continue
    } else { closeTable() }

    // Unordered list
    const ulm = raw.match(/^(\s*)([-*+])\s+(.+)/)
    if (ulm) {
      if (inList === 'ol') { out.push('</ol>'); inList = null }
      if (!inList) { out.push('<ul>'); inList = 'ul' }
      out.push(`<li>${inline(ulm[3])}</li>`); continue
    }

    // Ordered list
    const olm = raw.match(/^(\s*)\d+\.\s+(.+)/)
    if (olm) {
      if (inList === 'ul') { out.push('</ul>'); inList = null }
      if (!inList) { out.push('<ol>'); inList = 'ol' }
      out.push(`<li>${inline(olm[2])}</li>`); continue
    }

    // Empty line
    if (!line) {
      closeList(); continue
    }

    // Paragraph (default)
    closeList()
    out.push(`<p>${inline(line)}</p>`)
  }

  closeList(); closeTable(); closeBq()

  let html = out.join('\n')

  // Restore code blocks
  html = html.replace(/\x00CODE(\d+)\x00/g, (_, n) => codeBlocks[+n])
  html = html.replace(/\x00INLINE(\d+)\x00/g, (_, n) => inlineCodes[+n])
  return html
}

function esc (s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function inline (s) {
  return s
    // Images before links
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    // Bold+italic
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/__(.+?)__/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    // Strikethrough
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
}

// ── Sidebar from headings ────────────────────────────────────────────
function buildSidebar () {
  const nav   = document.getElementById('nav-links')
  const heads = document.getElementById('content').querySelectorAll('h1,h2,h3')
  let   section = null

  heads.forEach(h => {
    const level = +h.tagName[1]
    const text  = h.textContent.trim()
    const id    = h.id || text.toLowerCase().replace(/[^a-z0-9]+/g,'-')
    h.id = id

    if (level === 1) {
      const s = document.createElement('div')
      s.className = 'nav-section'
      s.textContent = text
      nav.appendChild(s)
      section = s
    } else {
      const a = document.createElement('a')
      a.href = '#' + id
      a.textContent = text
      if (level === 3) a.classList.add('h3')
      a.addEventListener('click', e => {
        e.preventDefault()
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' })
      })
      nav.appendChild(a)
    }
  })

  // Highlight active section on scroll
  const allLinks = nav.querySelectorAll('a')
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        allLinks.forEach(l => l.classList.remove('active'))
        const active = nav.querySelector(`a[href="#${e.target.id}"]`)
        if (active) active.classList.add('active')
      }
    })
  }, { threshold: 0.4 })
  heads.forEach(h => { if (+h.tagName[1] > 1) observer.observe(h) })
}

// ── File loading via IPC ──────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search)
const filePath = params.get('file') || ''
const fileName = filePath.split(/[/\\]/).pop()

document.getElementById('toolbar-title').textContent = fileName || 'Markdown Viewer'
document.title = fileName || 'TSCG Markdown Viewer'

if (!filePath) {
  document.getElementById('error').style.display = 'block'
  document.getElementById('error-msg').textContent = 'No file specified.'
} else if (window.tscgAPI?.readTextFile) {
  window.tscgAPI.readTextFile(filePath)
    .then(md => {
      if (md === null) {
        document.getElementById('error').style.display = 'block'
        document.getElementById('error-msg').textContent = `File not found:\n${filePath}`
      } else {
        document.getElementById('content').innerHTML = mdToHtml(md)
        buildSidebar()
      }
    })
    .catch(err => {
      document.getElementById('error').style.display = 'block'
      document.getElementById('error-msg').textContent = err.message
    })
} else {
  document.getElementById('error').style.display = 'block'
  document.getElementById('error-msg').textContent = 'Bridge API not available.'
}
</script>
</body>
</html>
