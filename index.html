 Physical Principle | Observer | Epistemic Gap |\n|---|---|---|---|\n| RGB | Light emission | Display engineer | ~0.30 |\n| HSL | Perceptual transform | Designer / Artist | ~0.37 |\n| CMY | Pigment absorption | Painter / Theorist | ~0.28 (ideal) |\n| CMYK | Ink printing | Prepress technician | ~0.27 |\n\n*\"No single 'correct' Map — each optimized for a specific observer and use case.\"*\n\n---\n\n## Comparison Matrix\n\n### Physical Principle\n\n| Model | Type | Mechanism |\n|---|---|---|\n| RGB | **Additive** | Light superposition (sum → white) |\n| HSL | **Additive** | Perceptual transform of RGB |\n| CMY | **Subtractive** | Spectral absorption (product → black) |\n| CMYK | **Subtractive** | Spectral absorption + opaque black |\n\n### Application Domain\n\n| Screen / Displays | Printing |\n|---|---|\n| RGB, HSL | CMY, CMYK |\n\n---\n\n## Shared GenericConcepts (common to all 4 variants)\n\n| GenericConcept | Formula | Role |\n|---|---|---|\n| `m2:Component` / `m2:Channel` | `S⊗I` / `S⊗I⊗F` | Color channels as functional units |\n| `m2:Fusion` | `S⊗F⊗D` | Channels merge into perceived color |\n| `m2:Signal` | `I⊗F` | Intensity/absorption carried by channels |\n| `m2:Synergy` | `A⊗S⊗I` | Emergent color from channel combination |\n| `m2:Space` | `S⊗I` | Color space geometry |\n| `m2:Representation` | `I⊗S` | Model as encoding of color |\n| `m2:Code` | `I⊗S⊗D` | Numerical encoding (e.g., `#FF0000`) |\n| `m2:Transformation` | `D⊗I⊗S` | Conversions between color spaces |\n\n---\n\n## Transformation Network\n\n| From | To | Type | Reversible |\n|---|---|---|---|\n| RGB | HSL | Bijective (lossless) | ✅ Yes |\n| RGB | CMY | Approximate | ≈ (gamut differences) |\n| CMY | CMYK | Augmentation (add K) | ✅ Yes |\n| RGB | CMYK | Complex (multi-step) | ≈ |\n\n---\n\n## Transdisciplinary Value\n\nThe Color Synthesis federation provides exceptional pedagogical value for TSCG because:\n\n1. **Map-Territory plurality** — Same phenomenon, multiple valid models\n2. **Observer-relativity** — Each model optimized for a different observer\n3. **Physical principle duality** — Additive (light) vs Subtractive (matter)\n4. **Model evolution** — CMY → CMYK demonstrates falsification and refinement\n5. **Visual intuition** — Colors are universally understood across cultures\n\n### Connections to Other Poclets\n\n| Poclet | Similarity | Difference |\n|---|---|---|\n| Fire Triangle | 3-component synergistic systems | Fire = emergent process; Color = emergent perception |\n| RAAS System | Homeostatic regulation with multiple channels | RAAS = biological; Color = physical/perceptual |\n\n---\n\n## Future Extensions\n\n| Model | Type | Components |\n|---|---|---|\n| CIELAB (L\\*a\\*b\\*) | Perceptually uniform | L\\*, a\\*, b\\* |\n| HSV / HSB | Alternative perceptual | Hue, Saturation, Value |\n| CIE XYZ | Device-independent | X, Y, Z |\n\n---\n\n## TSCG Validation\n\n- ✅ Demonstrates Map-Territory distinction with multiple Maps  \n- ✅ 4 federated instances (2 additive + 2 subtractive)  \n- ✅ Shared GenericConcept identification across all variants  \n- ✅ Transformation network between models documented  \n- ✅ Observer-relativity principle illustrated\n\n---\n\n## Changelog\n\n| Version | Date | Change |\n|---|---|---|\n| 1.1.0 | 2026-02-25 | Corrected `dcterms:creator` (was 'TSCG Project - Michel Favre'); added `m2:changelog`; bumped version |\n| 1.0.1 | 2026-01-20 | Added `transformationNetwork` with conversion formulas; added `futureExtensions` |\n| 1.0.0 | 2026-01-17 | Initial creation |\n\n---\n\n## References\n\n- Poynton, C. (2003). *Digital Video and HD: Algorithms and Interfaces*\n- Fairchild, M. D. (2013). *Color Appearance Models* (3rd ed.)\n- Adobe (2000). *PostScript Language Reference* (3rd ed.)\n- CIE (Commission Internationale de l'Éclairage) standards\n"},{"id":"CounterPoint","label":"Counterpoint","domain":"Music","version":"1.0.0","gap":0.016,"asfid":[0.87,0.9,0.85,0.93,0.88],"revoi":[0.95,0.88,0.92,0.78,0.82],"htmlRelPath":"instances/poclets/CounterPoint/static/M0_CounterPoint.html","hasReadme":true,"readme":"# M0_Counterpoint — TSCG Poclet\n\n**File:** `instances/poclets/Music/M0_Counterpoint.jsonld`\n**Version:** 1.0.0 · **Date:** 2026-03-20\n**Author:** Echopraxium with the collaboration of Claude AI\n**Domain:** Music — Polyphonic Composition, Counterpoint, Fugue Architecture\n**References:** J.S. Bach BWV 578, BWV 565 · Johann Joseph Fux, *Gradus ad Parnassum* (1725) · Miles Davis / Herbie Hancock modal jazz quintet (1964–68)\n\n---\n\n## 1. System Overview\n\n**Counterpoint** is a compositional system in which N independent melodic voices coexist simultaneously, each pursuing its own melodic trajectory while respecting a shared set of normative constraints — the **Counterpoint Rules**. The system produces **harmonic coherence as an emergent property** of local rule compliance: no single voice \"knows\" the global harmony; it arises from pairwise interactions governed by the rule set.\n\nCounterpoint is TSCG's first poclet in the **aesthetic domain**. Its significance for the framework is twofold: it validates ASFID applicability beyond natural sciences, and it presents a candidate **m3:Enigma** pattern.\n\n### TSCG Synergy Formula\n\n```\nContrapuntalCoherence = Music ⊙ (m2:Autonomy ⊗ m2:Constraint ⊗ m2:Emergence)\nCompiled tensor:        A ⊗ S ⊗ F ⊗ I ⊗ D\n```\n\n### Enigma Pattern (m3:Enigma Candidate)\n\n```\nVoice Autonomy ⊗ CounterpointRule → Harmonic Coherence\n```\n\nWithout the Rules: autonomous voices produce chaos. Without autonomy: the Rules produce mere melody. The **CounterpointRule** is not a restriction of autonomy — it is the *enabling condition* of multi-voice coexistence. This ternary mediator structure recurs identically across music, ecology, distributed systems, and urban planning.\n\n---\n\n## 2. Architecture — 4 Poles\n\n| Pole | Name | Voice Density | Tension Level |\n|------|------|--------------|---------------|\n| `Pole_Exposition`  | **Exposition**        | Progressive 1→N     | Low               |\n| `Pole_Development` | **Development**       | Full N, variable    | Medium            |\n| `Pole_Stretto`     | **Stretto**           | Full N, max overlap | High              |\n| `Pole_Resolution`  | **Resolution (Coda)** | Full N, converging  | Decreasing → zero |\n\n**Pole 1 — Exposition:** System initialization. All N voices enter successively, each presenting the Subject or its tonal Answer. The polyphonic texture builds incrementally from silence to full N-voice density.\n\n**Pole 2 — Development:** System exploration. Episodes modulate through related keys using motivic fragments from Subject and Countersubject. Middle entries re-present the Subject in new keys.\n\n**Pole 3 — Stretto:** Structural climax. Subject entries overlap — a new voice enters before the previous voice has completed. Polyphonic density reaches its maximum. Not all subjects permit stretto — its presence is evidence of compositional mastery.\n\n**Pole 4 — Resolution (Coda):** System closure. Tonic key reestablished decisively. Final Subject entry over pedal point. Authentic cadence (V⁷ → I) releases all accumulated harmonic tension. In Baroque practice, minor-mode fugues often end on a Picardy third (tonic major).\n\n---\n\n## 3. TSCG Bicephalous Analysis\n\n### 3.1 Eagle Eye (ASFID — Territory Space)\n\n| Dimension | Score | Interpretation |\n|-----------|-------|----------------|\n| **A** Attractor | **0.87** | Tonic key = global attractor. All harmonic motion departs from and returns to it. Consonant intervals are local attractors within voice pairs. |\n| **S** Structure | **0.90** | Multi-layered: N simultaneous voices (vertical) × 4-pole formal lifecycle (horizontal) × Subject/Answer/Countersubject motivic hierarchy. |\n| **F** Flow | **0.85** | Each voice maintains its own melodic flow trajectory. Sequential episode patterns create directional momentum. Stretto accelerates flow to maximum density. |\n| **I** Information | **0.93** | The Fugue Subject is the system's primary information unit — announced once, then propagated and transformed. The entire fugue is a single information token unfolding through time. |\n| **D** Dynamics | **0.88** | Tension/resolution cycle is the fundamental dynamic engine. Energy curve: Exposition(0.4) → Development(0.6) → Stretto(0.95) → Resolution(0.1). |\n\n**ASFID mean = 0.886**\n\n### 3.2 Sphinx Eye (REVOI — Map Space)\n\n| Dimension | Score | Interpretation |\n|-----------|-------|----------------|\n| **R** Representability | **0.95** | Musical notation is one of humanity's oldest and most precise symbolic systems. A fugue score is a complete, lossless representation of the system. |\n| **E** Evolvability | **0.88** | 600+ years of continuous evolution: strict species counterpoint (Fux) → Baroque tonal fugue (Bach) → Romantic chromatic → atonal (Schoenberg) → jazz modal (Davis, Hancock). ASFID tensor invariant across all evolutions. |\n| **V** Verifiability | **0.92** | Species counterpoint rules fully explicit and mechanically verifiable. Parallel fifths, parallel octaves, unresolved dissonances are algorithmically detectable. |\n| **O** Observability | **0.78** | Directly audible + score-transparent + visually observable in simulation. Main limit: untrained listeners cannot consciously isolate individual voices (perceptual fusion). The Piano Roll simulation directly compensates this limit. |\n| **I** Interoperability | **0.82** | Bridges harmony theory, formal analysis, orchestration, jazz improvisation, algorithmic composition, and cognitive science (auditory scene analysis). |\n\n**REVOI mean = 0.870**\n\n### 3.3 Epistemic Gap\n\n```\nδ₁ = |ASFID_mean − REVOI_mean| = |0.886 − 0.870| = 0.016\nSpectralClass: Coherent [0, 0.05)\n```\n\nExceptionally low gap — one of the most mature and formalized domains in TSCG. The only notable residual gap is on the O (Observability) axis: ASFID I = 0.93 (information richly encoded) vs REVOI O = 0.78 (perceptual accessibility limited for untrained listeners). The Piano Roll simulation directly addresses this gap.\n\n---\n\n## 4. GenericConcepts Mobilised\n\n### Primary\n\n| GenericConcept | Formula | Role in Counterpoint |\n|----------------|---------|---------------------|\n| `m2:Propagation` | I ⊗ F     | Subject propagated and transformed across voices through time |\n| `m2:Autonomy`    | A ⊗ I     | Each voice = independent melodic agent |\n| `m2:Constraint`  | S ⊗ D     | CounterpointRule: constitutive (enabling), not restrictive |\n| `m2:Emergence`   | S ⊗ I ⊗ D | Harmonic coherence from pairwise rule compliance — no central coordinator |\n| `m2:Imitation`   | I ⊗ S     | Voice B imitates Voice A's Subject — core structural mechanism |\n\n### Secondary\n\n| GenericConcept   | Formula | Role |\n|------------------|---------|------|\n| `m2:Attractor`   | A ⊗ D   | Tonic key = global attractor; consonances = local attractors |\n| `m2:Compression` | D ⊗ F   | Stretto = temporal compression driving climactic intensification |\n| `m2:Cycle`       | D ⊗ F   | Tension → Dissonance → Resolution recurring dynamic engine |\n| `m2:Layer`       | S       | N simultaneous voice layers |\n| `m2:Sequence`    | F ⊗ I   | Sequential episode patterns (descending-fifth chains) |\n| `m2:Pattern`     | S ⊗ I   | Subject = recurring recognizable pattern |\n| `m2:Threshold`   | A ⊗ D   | Consonance/dissonance boundary; resolution trigger |\n\n**Total M2 GenericConcepts mobilised: 12**\n\n---\n\n## 5. KnowledgeFieldConceptCombo — ConstrainedPolyphony\n\n```\nConstrainedPolyphony = Music ⊙ (m2:Autonomy ⊗ m2:Constraint ⊗ m2:Emergence)\nQualification operator:  ⊙ (disciplinary, not tensor product)\nCompiled tensor formula: A ⊗ S ⊗ F ⊗ I ⊗ D\nDominant dimensions:     I (propagation), S (multi-voice), D (tension cycles)\n```\n\n**Semantics:** A polyphonic system whose emergent harmonic coherence is *constituted* by the normative constraint set — not despite the constraints, but through them.\n\n**Cross-domain validation (Enigma pattern):**\n- Music: Voice Autonomy ⊗ CounterpointRule → Harmonic Coherence\n- Ecology: Species Autonomy ⊗ Niche Rule → Ecosystem Stability\n- Distributed Systems: Process Autonomy ⊗ Consensus Protocol → System Consistency\n- Urban Planning: Individual Freedom ⊗ Zoning Law → Functional City\n\n---\n\n## 6. Cross-Stylistic Validation\n\n### Canon — Frère Jacques (folk round)\nThe simplest possible counterpoint: one melody, 4 voices, pure time offset (2-measure delay). All ASFID dimensions present despite maximal simplicity. Zero prior musical knowledge required.\n\n### BWV 578 — 'Little' Fugue in G minor (J.S. Bach) ← **Simulation Primary Reference**\n4 voices, G minor, clear and pedagogically transparent structure. All 4 structural poles cleanly identifiable. Bach's most accessible complete fugue.\n\n### BWV 565 — Toccata and Fugue in D minor (J.S. Bach)\nThe most iconic fugue in the repertoire. The D minor Subject (falling diminished seventh + stepwise run) is the most recognizable in fugal history. The counterpoint system at full expressive power.\n\n### Jazz Modal — Miles Davis / Herbie Hancock Quintet (1964–68)\nCounterpoint liberated from written score. Each performer improvises independently while sharing the harmonic grid. The ASFID structure is identical to the Baroque fugue; only the medium of the Rules changes: written notation → internalized stylistic vocabulary.\n\n---\n\n## 7. TSCG Framework Contributions\n\n| Layer | Contribution | Type |\n|-------|-------------|------|\n| **M2** | `m2:Autonomy`, `m2:Constraint`, `m2:Emergence` (aesthetic domain validation) | GenericConcept (reuse + extended) |\n| **M2** | `m2:Propagation`, `m2:Imitation`, `m2:Compression` (musical validation added) | GenericConcept (extended) |\n| **M1_Music** | 18 new domain-specific concepts (Polyphony, Voice, Fugue, Subject, Canon, etc.) | New M1 extension |\n| **M0** | `M0_Counterpoint.jsonld` — 4-pole poclet, first aesthetic domain model | Poclet (new) |\n| **m3:Enigma** | Candidate pattern: Autonomy ⊗ Rule → Coherence, cross-domain | Enigma candidate |\n\n---\n\n## 8. Simulation — Interactive Piano Roll\n\n**Technology:** Standalone HTML + Tone.js (triangle8 oscillator, organ-like timbre)\n**Primary reference:** BWV 578 (Fugue in G minor, 4 voices)\n\nThe simulation displays a **Piano Roll** view with 4 colored voice tracks, real-time animated playhead, ASFID dimension highlighting per structural event, and a 4-example left explorer panel. Voice data is loaded from separate JSON files (`voices/` subfolder) — adding a new example requires only a new JSON file and one line in the manifest.\n\n### Tab Order (TSCG convention)\n```\nDescription | Concepts | Synergy | Scores\n```\n\n### Repository Location\n\n```\ninstances/\n  poclets/\n    Music/\n      M0_Counterpoint.jsonld          ← Ontology\n      M0_Counterpoint_README.md       ← This file\n      M0_Counterpoint.html            ← Standalone simulation\n      voices/\n          frere-jacques.json          ← Canon, 4 voices, C major\n          bwv578.json                 ← Fugue in G minor (primary)\n          bwv565.json                 ← Toccata & Fugue in D minor\n          jazz-modal.json             ← Miles Davis quintet\n```\n\n---\n\n## 9. References\n\n- Bach J.S. (1703–1750) — BWV 578 *Fugue in G minor*; BWV 565 *Toccata and Fugue in D minor*; BWV 1080 *The Art of Fugue*\n- Fux J.J. (1725) — *Gradus ad Parnassum* (foundational species counterpoint treatise)\n- Kennan K. (1999) — *Counterpoint*, 4th ed., Prentice Hall\n- Miles Davis (1965–68) — *E.S.P.*, *Miles Smiles*, *Nefertiti* (modal jazz contrapuntal ensemble)\n- Bregman A.S. (1990) — *Auditory Scene Analysis* (perceptual basis of voice streaming)\n\n---\n\n*Generated by TSCG Framework v15.10.1 — Echopraxium with the collaboration of Claude AI — 2026-03-20*\n"},{"id":"ExposureTriangle","label":"Exposure Triangle","domain":"Photography / Optics / Image Formation","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/ExposureTriangle/static/M0_ExposureTriangle.html","hasReadme":true,"readme":"# M0_ExposureTriangle — TSCG Poclet README\r\n\r\n**Poclet:** `M0_ExposureTriangle`  \r\n**Domain:** Photography / Optics / Image Formation  \r\n**Version:** 1.2.0 · **Date:** 2026-02-24  \r\n**Author:** Echopraxium with the collaboration of Claude AI  \r\n**Ontology URI:** `https://raw.githubusercontent.com/Echopraxium/tscg/main/instances/poclets/ExposureTriangle/M0_ExposureTriangle.jsonld`  \r\n**Status:** ACTIVE — Canonical pedagogical model\r\n\r\n---\r\n\r\n## Table of Contents\r\n\r\n1. [Overview](#1-overview)\r\n2. [System Description](#2-system-description)\r\n3. [ASFID Analysis (Eagle Eye — Territory)](#3-asfid-analysis-eagle-eye--territory)\r\n4. [REVOI Analysis (Sphinx Eye — Map)](#4-revoi-analysis-sphinx-eye--map)\r\n5. [Epistemic Gap](#5-epistemic-gap)\r\n6. [GenericConcepts Mobilized (22)](#6-GenericConcepts-mobilized-22)\r\n7. [M2 GenericConcepts Discovered from this Poclet](#7-m2-GenericConcepts-discovered-from-this-poclet)\r\n8. [Map–Territory Comparison](#8-mapterritory-comparison)\r\n9. [Analogy to the Fire Triangle](#9-analogy-to-the-fire-triangle)\r\n10. [Validation](#10-validation)\r\n11. [Future Extensions](#11-future-extensions)\r\n12. [Simulation (exposure-triangle_sim.py)](#12-simulation-exposure-triangle_simpy)\r\n13. [Changelog](#13-changelog)\r\n\r\n---\r\n\r\n## 1. Overview\r\n\r\nThe **Exposure Triangle** is the canonical pedagogical model of photography. It represents the three interdependent parameters that govern the amount of light reaching the camera sensor:\r\n\r\n| Parameter | Physical Role | Primary Effect |\r\n|-----------|--------------|----------------|\r\n| **ISO** | Sensor gain (signal amplification) | Brightness ↑, Noise ↑ |\r\n| **Aperture** (f-number) | Lens opening area (light flux control) | Brightness ↑/↓, Depth of Field ↔ |\r\n| **Shutter Speed** | Exposure duration (temporal integration) | Brightness ↑, Motion Blur ↔ |\r\n\r\n**Core physical law:**\r\n\r\n```\r\nExposure ∝ ISO × Aperture_Area × Time\r\n```\r\n\r\nIn logarithmic stop space:\r\n```\r\nlog₂(ISO) + log₂(1/f²) + log₂(T) = log₂(Scene_Luminance) + K\r\n```\r\n\r\nEvery stop (+1 or −1) represents a doubling or halving of light. This makes compensatory adjustments symmetric: `+1 stop ISO` exactly compensates `−1 stop Aperture` or `−1 stop Shutter`.\r\n\r\n**Pedagogical role:** The Exposure Triangle is the universal teaching model for photographic exposure — equivalent to the Fire Triangle for combustion, the OSI model for networking, or the Iron Triangle for project management. A simple Map that simplifies a complex Territory with remarkable practical effectiveness.\r\n\r\n---\r\n\r\n## 2. System Description\r\n\r\n### 2.1 Components\r\n\r\n#### ISO Sensitivity (Sensor Gain)\r\n- **Physical correlate:** Analog = film grain/silver halide concentration; Digital = voltage amplification of photosensor output\r\n- **Range:** ISO 100–204800 (professional cameras)\r\n- **Log scale:** Each ISO doubling = +1 stop\r\n- **ASFID tensor:** `S ⊗ I` (Structure of sensor architecture × Information amplification)\r\n- **Trade-off:** Higher ISO → brighter image **but** more grain/noise (SNR degrades)\r\n\r\n#### Aperture (f-number / f-stop)\r\n- **Physical correlate:** Iris diaphragm; light area ∝ 1/N² where N = f-number\r\n- **Range:** f/1.4 to f/22 (lens dependent)\r\n- **Full stop scale:** f/1.4, f/2, f/2.8, f/4, f/5.6, f/8, f/11, f/16, f/22, f/32\r\n- **ASFID tensor:** `S ⊗ F` (Structure of iris geometry × Flow of photons entering)\r\n- **Trade-off:** Wide aperture (f/1.4) → more light, shallow DoF; Narrow aperture (f/16) → less light, deep DoF\r\n\r\n#### Shutter Speed (Exposure Time)\r\n- **Physical correlate:** Mechanical curtain or electronic shutter duration\r\n- **Range:** 30s to 1/8000s (+ Bulb mode)\r\n- **Hand-holding rule:** T ≥ 1/focal_length (e.g. 50mm lens → 1/50s minimum)\r\n- **ASFID tensor:** `F ⊗ D` (Temporal flux accumulation × Temporal dynamics of scene)\r\n- **Trade-off:** Fast shutter → freezes motion; Slow shutter → motion blur, more light\r\n\r\n### 2.2 The Reciprocity Law\r\n\r\nAny combination satisfying the exposure equation yields the **same total exposure** (same histogram brightness), but with **different image qualities**:\r\n\r\n```\r\nISO 400 + f/4 + 1/250s  →  Same EV as:\r\nISO 800 + f/5.6 + 1/250s  (same exposure, shallower DoF)\r\nISO 400 + f/4 + 1/500s  (same exposure, frozen motion ↑)\r\n```\r\n\r\nThis is the fundamental **Trade-off** (m2:Trade-off): infinite equivalent exposures on the Pareto frontier, each sacrificing one quality dimension to gain another.\r\n\r\n---\r\n\r\n## 3. ASFID Analysis (Eagle Eye — Territory)\r\n\r\nTerritory state vector: `|Ω_exposure⟩ = 0.80|A⟩ + 0.85|S⟩ + 0.95|F⟩ + 0.75|I⟩ + 0.60|D⟩`\r\n\r\n| Dimension | Score | Justification |\r\n|-----------|-------|---------------|\r\n| **A** Attractor | 0.80 | System converges toward correct exposure (metering system acts as set-point) |\r\n| **S** Structure | 0.85 | Three-parameter coupling ISO × Aperture × Time with well-defined logarithmic interdependence |\r\n| **F** Flow | 0.95 | Massive photon flux (10¹⁵–10¹⁸ photons per typical exposure) — dominant physical phenomenon |\r\n| **I** Information | 0.75 | Spatial + spectral + temporal information encoded in captured photons |\r\n| **D** Dynamics | 0.60 | Exposure spans milliseconds to seconds — present but not fast-changing dynamics |\r\n\r\n**ASFID completeness:** All 5 dimensions present ✅\r\n\r\n---\r\n\r\n## 4. REVOI Analysis (Sphinx Eye — Map)\r\n\r\nMap state vector: `|M_triangle⟩_REVOI = 0.95|R⟩ + 0.85|E⟩ + 0.95|V⟩ + 0.95|O⟩ + 0.90|I⟩`\r\n\r\n**REVOI_mean = 0.92 → Exceptional Map quality**\r\n\r\n| Dimension | Score | Justification |\r\n|-----------|-------|---------------|\r\n| **R** Representability | 0.95 | Perfectly representable: triangular diagram, stop arithmetic (±1, ±2, ±3 stops), log₂ formula. `spaceCoverage ≈ 0.65` (covers 3 parameters + trade-offs; omits scene luminance, metering, optical physics) |\r\n| **E** Evolvability | 0.85 | Evolved from film to digital (ISO now variable per shot). Extends gracefully to computational photography (HDR, AI metering) without becoming obsolete |\r\n| **V** Verifiability | 0.95 | Predictions testable instantly: change any parameter → immediate visual feedback (histogram, chimping). Reproduced by millions of photographers daily |\r\n| **O** Observability | 0.95 | Ubiquitous in every photography textbook, tutorial, camera manual. Photographers internalize it as muscle memory through practice |\r\n| **I** Interoperability | 0.90 | Lingua franca of photography. Works across film/digital, all camera brands. Formalized in EXIF standard (ISO 12234) |\r\n\r\n### REVOI Map Analysis State (also encoded in ASFID for comparison)\r\n\r\nMap ASFID state: `|M_triangle⟩ = 0.85|A⟩ + 0.95|S⟩ + 0.70|F⟩ + 0.85|I⟩ + 0.50|D⟩`\r\n\r\n| Dimension | Score | Justification |\r\n|-----------|-------|---------------|\r\n| **A** | 0.85 | Strong pedagogical attractor — teaches correct exposure with high clarity |\r\n| **S** | 0.95 | Perfect triangular geometry (3 vertices, 3 edges — minimal and complete) |\r\n| **F** | 0.70 | Moderate — conceptual flow only (no actual photon flux in the diagram) |\r\n| **I** | 0.85 | High — encodes 3 parameters + trade-off relationships |\r\n| **D** | 0.50 | Low — static diagram (does not model the temporal adjustment process) |\r\n\r\n> **Sphinx Eye insight:** Why does the Exposure Triangle work so well as a teaching tool?\r\n> 1. Reduces complex optics physics to 3 intuitive parameters  \r\n> 2. Immediate visual feedback reinforces learning in every practice session  \r\n> 3. Trade-offs are universal human experience (no free lunch) — the model resonates cognitively  \r\n> — *Korzybski principle: the Map simplifies the Territory, but captures the essential structure for practical decision-making.*\r\n\r\n---\r\n\r\n## 5. Epistemic Gap\r\n\r\n```\r\nΔΘ = ‖|Ω_exposure⟩ − |M_triangle⟩‖ ≈ 0.32\r\n```\r\n\r\nDeviation vector: `(−0.05, −0.10, +0.25, +0.10, +0.10)`\r\n\r\n| Dimension | Gap | Interpretation |\r\n|-----------|-----|----------------|\r\n| **F (Flow)** | +0.25 | Largest divergence: Territory has massive photon flux (10¹⁸ photons); Map is abstract diagram with no actual flow representation |\r\n| **S (Structure)** | −0.10 | Territory has complex sensor/lens/optics physics; Map reduces to simple triangle |\r\n| **I, D** | +0.10 each | Information and dynamics richer in Territory than the static diagram captures |\r\n\r\n**Assessment:** Moderate gap (ΔΘ ≈ 0.32) — the Triangle is a good pedagogical Map but simplifies the Territory significantly. This is by design, not a defect: the Triangle's strength lies in its deliberate simplification.\r\n\r\n**Known limitations of the Map:**\r\n- Omits scene luminance (the 4th implicit parameter)\r\n- Ignores metering system complexity (TTL, spot, matrix metering algorithms)\r\n- Simplifies optical physics (diffraction limit at f/16+, lens aberrations)\r\n- Doesn't model reciprocity failure (film limitation at extreme exposures)\r\n- Static — doesn't represent the dynamic feedback adjustment process\r\n\r\n---\r\n\r\n## 6. GenericConcepts Mobilized (22)\r\n\r\n**Coverage: 22 of 71 M2 GenericConcepts (31%)**  \r\n`m3:semanticSignature`: `light_balance_attractor + parameter_trade-off_map + photon_flow_amplification`\r\n\r\n| # | GenericConcept | Formula | Role in Exposure Triangle |\r\n|---|-------------|---------|---------------------------|\r\n| 1 | `m2:Balance` | `A ⊗ S ⊗ F` | Equilibrium: ISO × Aperture × Shutter → correct exposure via compensatory stops |\r\n| 2 | `m2:Trade-off` | `R ⊗ V ⊗ E` (REVOI) / `A ⊗ I` (fallback) | Cannot simultaneously maximize DoF, freeze motion, minimize noise — Pareto frontier |\r\n| 3 | `m2:Amplification` | `Ft ⊗ D ⊗ It` | ISO = sensor signal amplification (+1 stop = ×2 gain); ND filter = attenuation |\r\n| 4 | `m2:FeedbackLoop` | `Process ⊗ Alignment ⊗ Homeostasis` | Camera metering = negative feedback loop (scene → meter → compare EV → adjust) |\r\n| 5 | `m2:Polarity` | `S ⊗ I ⊗ A` | Stops scale: bipolar axis centered on correct exposure (over-/under-exposed as opposing poles) |\r\n| 6 | `m2:Behavior` | `S ⊗ D ⊗ F` | Photographer's structured exposure evaluation routine (observe → meter → assess → adjust → capture → review) |\r\n| 7 | `m2:Component` | `S ⊗ I` | ISO, Aperture, Shutter as elementary constitutive parts |\r\n| 8 | `m2:Synergy` | `A ⊗ S ⊗ I` | Multiplicative (not additive) interaction: E ∝ ISO × Area × Time |\r\n| 9 | `m2:Constraint` | `S ⊗ I` | Physical limits: ISO [100–25600], Aperture [f/1.4–f/22], Shutter [1/8000–30s] |\r\n| 10 | `m2:Threshold` | `A ⊗ I` | Critical transitions: 1/focal_length rule, ISO >1600 (visible noise), f/16 (diffraction) |\r\n| 11 | `m2:Regulation` | `A ⊗ S ⊗ F` | Auto-exposure modes (AE, Av, Tv) — camera adjusts parameters to maintain target EV |\r\n| 12 | `m2:Signal` | `I ⊗ F` | Light as information carrier: photon flux encodes scene luminance, color, spatial info |\r\n| 13 | `m2:Code` | `I ⊗ S ⊗ D` | EXIF metadata: ISO/Aperture/Shutter encoded in image file per ISO 12234 standard |\r\n| 14 | `m2:Representation` | `I ⊗ S` | Triangle diagram as Map; `spaceCoverage ≈ 0.65` |\r\n| 15 | `m2:Space` | `S ⊗ I` | 3D exposure parameter space (ISO, Aperture, Shutter) — all possible settings |\r\n| 16 | `m2:Invariant` | `S ⊗ A` | EV = log₂(ISO × A² / T) invariant across all equivalent settings for same scene luminance |\r\n| 17 | `m2:Transformation` | `D ⊗ I ⊗ S` | Equivalent exposure conversions: ISO 400 + f/4 + 1/250 ↔ ISO 800 + f/5.6 + 1/250 |\r\n| 18 | `m2:Process` | `D ⊗ F` | Exposure as temporal process: photon accumulation from shutter open to close |\r\n| 19 | `m2:Event` | `D ⊗ I` | Shutter actuation as discrete capture event |\r\n| 20 | `m2:Memory` | `∫(D − F)dτ` | Photographer's learned exposure intuition (muscle memory from thousands of shots) |\r\n| 21 | `m2:Adaptation` | `I ⊗ F ⊗ D` | ISO ramp across lighting conditions: ISO 100 (noon) → ISO 6400 (dusk) |\r\n| 22 | `m2:Language` | `I ⊗ S ⊗ F` | Photography jargon: 'stop down to f/8', '+2 EV compensation', 'push 2 stops' |\r\n\r\n### By Category\r\n\r\n| Category | GenericConcepts |\r\n|----------|-------------|\r\n| **Structural** | Component, Space, Representation |\r\n| **Informational** | Signal, Code, Language |\r\n| **Regulatory** | Balance, Trade-off, Regulation, Constraint, Threshold, Polarity |\r\n| **Dynamic** | Process, Event, Transformation, Adaptation, Amplification, FeedbackLoop, Behavior |\r\n| **Adaptive** | Memory |\r\n| **Relational** | Synergy, Invariant |\r\n\r\n---\r\n\r\n## 7. M2 GenericConcepts Discovered from this Poclet\r\n\r\nThe Exposure Triangle poclet served as the **discovery context** for two M2 GenericConcepts that were subsequently validated across 8+ disciplines and promoted to established M2 status:\r\n\r\n### m2:Balance  `A ⊗ S ⊗ F`\r\n\r\n> *State of equilibrium between multiple interacting factors where variations compensate to maintain system stability.*\r\n\r\n**Discovered via:** The compensatory stops arithmetic — `+1 ISO stop` exactly cancels `−1 Aperture stop`. This is not Homeostasis (dynamic active regulation) nor Regulation (mechanism) — it is a **static equilibrium state** achieved through mutual parameter compensation.\r\n\r\n**Validated in 8 domains:** Photography, Chemistry (chemical equilibrium), Thermodynamics (energy balance), Economics (trade balance), Ecology (predator-prey), Audio engineering (frequency balance), Nutrition (macronutrient balance), Accounting (balance sheet).\r\n\r\n### m2:Trade-off  `R ⊗ V ⊗ E` (REVOI) / `A ⊗ I` (ASFID fallback)\r\n\r\n> *Deliberate exchange where improving one desirable property necessarily degrades another due to inherent constraints.*\r\n\r\n**Discovered via:** The photographer's dilemma — no exposure setting simultaneously maximizes depth of field, freezes motion, AND minimizes noise. The Triangle makes the Pareto frontier explicit.\r\n\r\n**Validated in 8 domains:** Photography (DoF/Grain/Motion), Machine Learning (Bias-Variance), Engineering (Speed-Accuracy), Economics (Inflation-Unemployment), Project Management (Cost-Quality-Time), Computer Science (Time-Space complexity), Biology (r-K selection), Reinforcement Learning (Exploration-Exploitation).\r\n\r\n> **Architectural note:** `m2:Trade-off` has `m2:perspective: \"map\"` — it is a Map-space GenericConcept (the photographer's decision model), not a Territory-space observable. This is why its primary formula uses REVOI dimensions (`R ⊗ V ⊗ E`) with ASFID as fallback (`A ⊗ I`).\r\n\r\n---\r\n\r\n## 8. Map–Territory Comparison\r\n\r\n| Aspect | Territory (Physical Reality) | Map (Exposure Triangle) |\r\n|--------|------------------------------|------------------------|\r\n| **Phenomenon** | Photon accumulation on sensor (quantum events) | Abstract diagram (3 vertices, 3 edges) |\r\n| **Parameters** | ISO, Aperture, Shutter + Scene Luminance + Metering | Only ISO, Aperture, Shutter |\r\n| **Flow** | 10¹⁵–10¹⁸ photons per exposure | Conceptual arrows between vertices |\r\n| **Physics** | Diffraction, aberrations, reciprocity failure, ADC noise | Simplified linear model |\r\n| **Dynamics** | Milliseconds (shutter) to hours (astrophotography) | Static, timeless diagram |\r\n| **REVOI quality** | — | R=0.95, E=0.85, V=0.95, O=0.95, I=0.90 → Mean 0.92 |\r\n| **Epistemic gap** | — | ΔΘ ≈ 0.32 (moderate, pedagogically acceptable) |\r\n\r\n---\r\n\r\n## 9. Analogy to the Fire Triangle\r\n\r\nThe Exposure Triangle is structurally analogous to the **Fire Triangle** (Fuel ⊗ O₂ ⊗ Heat → Fire):\r\n\r\n| Dimension | Fire Triangle | Exposure Triangle |\r\n|-----------|--------------|-------------------|\r\n| **Structure** | 3-component synergistic system | 3-component synergistic system |\r\n| **Removal test** | Remove ANY component → fire stops | Set any parameter to extreme → no usable image (ISO≈0, f/∞, T≈0) |\r\n| **Dominant principle** | Synergy (emergent chemical reaction) | Balance (equilibrium of light parameters) |\r\n| **Pedagogy** | Universal for fire safety training | Universal for photography education |\r\n| **Map limitation** | Omits chain reaction → led to Fire Tetrahedron | Omits scene luminance → could extend to Exposure Square |\r\n| **TSCG layer** | `M0_FireTriangle` | `M0_ExposureTriangle` |\r\n\r\nBoth are **Canonical Pedagogical Triangle** poclets — the TSCG type `m3:TscgOntologyType` for this class of reducible, 3-component teaching models.\r\n\r\n---\r\n\r\n## 10. Validation\r\n\r\n| Criterion | Status |\r\n|-----------|--------|\r\n| ASFID completeness (all 5 dimensions present) | ✅ |\r\n| Minimality (exactly 3 components, irreducible) | ✅ |\r\n| Emergence (correct exposure emerges from parameter balance) | ✅ |\r\n| Balance & Trade-off validated in M2 (v15.1.0, 8 domains each) | ✅ |\r\n| GenericConcept coverage (22 of 71 M2 = 31%) | ✅ |\r\n| New GenericConcepts v1.1.0 (Amplification, FeedbackLoop, Polarity, Behavior) | ✅ |\r\n| spaceCoverage ValueSpace on m2:Representation (RSC ≈ 0.65) | ✅ |\r\n| REVOI analysis complete (Mean = 0.92) | ✅ |\r\n| JSON-LD encoding valid | ✅ |\r\n\r\n---\r\n\r\n## 11. Future Extensions\r\n\r\n### Exposure Square (4th parameter)\r\nAdd **Scene Luminance** (EV of the scene) as 4th explicit parameter, making the implicit assumption of the Triangle explicit. The Square would have lower epistemic gap (ΔΘ < 0.20) at the cost of pedagogical simplicity.\r\n\r\n### Computational Photography Layer\r\nModern cameras and AI are reducing Trade-off severity without eliminating it:\r\n\r\n| Technology | Trade-off addressed | Method |\r\n|-----------|-------------------|--------|\r\n| HDR | Dynamic range vs single exposure | Multi-exposure merge |\r\n| Focus stacking | DoF vs sharpness | Multi-focus merge |\r\n| AI noise reduction | ISO noise vs resolution | Neural denoising |\r\n| IBIS / OIS | Shutter speed vs shake | Optical/sensor stabilization |\r\n| Computational exposure | All three | Real-time AI parameter optimization |\r\n\r\nThese extend the Triangle's Map but do not obsolete it — the physical law `E ∝ ISO × A × T` remains invariant.\r\n\r\n### Ansel Adams Zone System\r\nExtension of the Triangle to a 10-zone tonal mapping system (Zone 0 = pure black, Zone X = pure white). Adds explicit tonal placement awareness to the exposure decision — a more complete Map (spaceCoverage ≈ 0.80 vs. Triangle's ≈ 0.65).\r\n\r\n---\r\n\r\n## 12. Simulation (exposure-triangle_sim.py)\r\n\r\nThe poclet is accompanied by an interactive Pygame simulation that applies **live photo effects** to a sample image (`photo_sample.jpg`) driven by the three exposure parameter sliders.\r\n\r\n### Sample Image\r\n\r\n`photo_sample.jpg` — Autumn maple leaves on wet cobblestones. Used as reference scene because it contains:\r\n- Fine-grain texture (cobblestone joints) that clearly shows **ISO noise** artifacts\r\n- Both bright (yellow leaves) and dark (wet stone) tonal zones that reveal **over/under-exposure** clipping\r\n- Natural colour richness that highlights **white-balance neutrality** at the baseline exposure\r\n\r\n**Baseline exposure** (EV offset = 0): `ISO 400 · f/5.6 · 1/250s`\r\n\r\n### Visual Effects per Parameter\r\n\r\n| Parameter | Effect on Image | Physical Justification |\r\n|-----------|----------------|------------------------|\r\n| **ISO** | Grain/noise overlay — amplitude grows from 0 (ISO 100) to ±55 px (ISO 6400) | Signal amplification raises both signal and read noise proportionally |\r\n| **Aperture** | Edge vignette (DoF indicator) — active below f/4, maximum at f/1.4 | Shallow depth-of-field renders out-of-focus areas at image periphery |\r\n| **Shutter Speed** | Horizontal motion blur — onset at 1/50 s, kernel up to 40 px at 2 s | Hand-held camera shake during long exposures |\r\n| **All three** | Brightness shift (EV offset) | E ∝ ISO × Aperture_Area × Time — any surplus/deficit shifts tonal range |\r\n\r\n### TSCG Connections\r\n\r\n- **I (Information) / ASFID**: The photograph *is* the encoded territory information — each pixel encodes scene luminance, colour, texture. The simulation makes the **Signature** GenericConcept (I⊗F) visible: the image changes signature depending on capture parameters.\r\n- **V (Verifiability) / REVOI**: Changing any slider immediately verifies the Triangle's prediction. The EV bar and trade-off panel make the Pareto frontier tangible.\r\n- **A (Attractor)**: The baseline settings form the stable attractor state — the image \"wants\" to look correctly exposed; any deviation is penalised by a visible artefact.\r\n\r\n### Requirements & Usage\r\n\r\n```bash\r\npip install pygame numpy\r\npython exposure-triangle_sim.py\r\n# Optional: explicit poclet path\r\npython exposure-triangle_sim.py path/to/M0_ExposureTriangle.jsonld\r\n```\r\n\r\nPlace `photo_sample.jpg` in the **same folder** as `exposure-triangle_sim.py`.\r\n\r\n---\r\n\r\n## 13. Changelog\r\n\r\n| Version | Date | Description |\r\n|---------|------|-------------|\r\n| **1.2.0** | 2026-02-24 | Added `m0:sampleImage` property (`photo_sample.jpg`). Documents baseline exposure (ISO 400 / f/5.6 / 1/250s) and simulation effects (ISO→noise, Aperture→vignette, Shutter→motion blur). Added `exposure-triangle_sim.py` Pygame simulation with live photo effects driven by poclet ASFID/REVOI data. |\r\n| **1.1.0** | 2026-02-21 | Synchronized with M2 v15.4.0 and M3 v3.5.0. Author corrected. ORIVE → REVOI throughout. Tensor formula spacing normalized. Balance and Trade-off no longer labeled '(NEW)'. Added 4 GenericConcepts: `Amplification`, `FeedbackLoop`, `Polarity`, `Behavior`. Added `spaceCoverage` ValueSpace (RSC ≈ 0.65) on Representation. Added `m3:semanticSignature`. Total: 18 → 22 GenericConcepts. |\r\n| **1.0.0** | 2026-01-20 | Initial creation. 18 GenericConcepts (34%). First identification of `m2:Balance` and `m2:Trade-off` as new M2 GenericConcepts from photography domain analysis. |\r\n\r\n---\r\n\r\n## References\r\n\r\n- Adams, A. (1981). *The Negative* (The Ansel Adams Photography Series)\r\n- Freeman, M. (2007). *The Photographer's Eye: Composition and Design*\r\n- Peterson, B. (2016). *Understanding Exposure* (4th ed.)\r\n- Langford, M. (2010). *Langford's Basic Photography* (9th ed.)\r\n- ISO 12232:2019 — Photography — Digital still cameras — Determination of exposure index\r\n\r\n---\r\n\r\n*See also: `M0_FireTriangle` (structural analogy — both are 3-component canonical pedagogical models)*\r\n"},{"id":"FireTriangle","label":"Fire Triangle","domain":"Chemistry/Physics","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/FireTriangle/static/M0_FireTriangle.html","hasReadme":true,"readme":"# Fire Triangle Poclet - README\r\n\r\n**Author**: Echopraxium with the collaboration of Claude AI  \r\n**Created**: 2026-01-17  \r\n**Domain**: Chemistry  \r\n**Type**: Composite Poclet  \r\n**Status**: ✅ Validated - Canonical Example\r\n\r\n---\r\n\r\n## Overview\r\n\r\nThe **Fire Triangle** is the canonical poclet for TSCG framework validation. It represents the minimal yet complete system for combustion, demonstrating that fire requires exactly three components simultaneously: **Fuel**, **Oxygen (Oxidizer)**, and **Heat**. Removing any one component immediately stops the fire.\r\n\r\nThis poclet serves as:\r\n1. **Framework Validation**: Proof-of-concept for TSCG's ASFID/REVOI analysis\r\n2. **GenericConcept Discovery**: Helped identify Balance, Synergy, and Component GenericConcepts\r\n3. **Pedagogical Tool**: Entry point for teaching systems theory and fire science\r\n\r\n---\r\n\r\n## System Description\r\n\r\n### The Three Components\r\n\r\n#### 1. Fuel (Combustible)\r\n- **Role**: Energy source\r\n- **Function**: Provides chemical potential energy\r\n- **Examples**: Wood, gasoline, natural gas, paper, coal\r\n- **State**: Solid, liquid, or gas\r\n- **Chemical Nature**: Typically hydrocarbons or organic matter\r\n- **ASFID Contribution**:\r\n  - **S** (Structure): Material structure of fuel\r\n  - **F** (Flow): Fuel consumption flow\r\n  - **I** (Information): Chemical composition information\r\n\r\n#### 2. Oxygen (Oxidizer)\r\n- **Role**: Electron acceptor\r\n- **Function**: Enables oxidation reaction\r\n- **Primary Example**: O₂ (atmospheric oxygen)\r\n- **Alternative Oxidizers**: Cl₂, F₂, ClO₄⁻, NO₃⁻\r\n- **Concentration**: Typically >16% in air for sustained combustion\r\n- **ASFID Contribution**:\r\n  - **F** (Flow): O₂ flow from environment\r\n  - **D** (Dynamics): Reaction dynamics (oxidation rate)\r\n\r\n#### 3. Heat (Activation Energy)\r\n- **Role**: Activation threshold\r\n- **Function**: Initiates and sustains reaction above ignition temperature\r\n- **Sources**: Match, spark, friction, hot surface, lightning\r\n- **Threshold**: T_ignition (fuel-dependent)\r\n- **Sustainment**: Once ignited, combustion generates its own heat (positive feedback)\r\n- **ASFID Contribution**:\r\n  - **A** (Attractor): Thermal attractor (equilibrium temperature)\r\n  - **D** (Dynamics): Thermal dynamics (heating/cooling)\r\n\r\n---\r\n\r\n### Flame Color by Temperature\r\n\r\nThe visible color of a flame directly encodes its temperature — a **spectral Signature** (GenericConcept **I⊗F**) linking the Heat dimension to observable Information.\r\n\r\n| Temperature Range | Color | Typical Context |\r\n|-------------------|-------|-----------------|\r\n| 525 – 700 °C | 🔴 Dark Red | First glow; near lower limit of human vision |\r\n| 700 – 900 °C | 🔴 Red | Campfire base, cherry-red zone |\r\n| 900 – 1 100 °C | 🟠 Orange | Standard hydrocarbon flame, wood fire crown |\r\n| 1 100 – 1 400 °C | 🟡 Yellow | Candle tip, high-intensity torch |\r\n| > 1 400 °C | ⚪ White | Acetylene torch, thermite — near-blackbody |\r\n\r\n**Physical basis**: Planck blackbody radiation combined with spectral line emission from excited combustion intermediates (OH\\*, CH\\*, C₂\\*).\r\n\r\n**TSCG link**: Flame color is an *observable* (Eagle Eye / ASFID-I) that encodes temperature information, illustrating the **Signature** GenericConcept (I⊗F) — the system broadcasts its thermal state as a structured optical signal.\r\n\r\n> *Note*: Perceived color depends on the observer model (human photopic vision, camera CCD, spectrometer). The table above uses standard human vision as reference observer.\r\n\r\n### Synergy Principle\r\n\r\n**Formula**: `Fuel ⊕ O₂ ⊕ Heat → Fire (emergent)`\r\n\r\n- **Description**: All three components required **simultaneously**\r\n- **Emergent Property**: Flame (self-sustaining exothermic reaction)\r\n- **Non-Linearity**: 1 + 1 + 1 ≠ 3, but = **Fire** (qualitative emergence)\r\n- **Critical Requirement**: Eliminating ANY component stops combustion immediately\r\n\r\n---\r\n\r\n## ASFID Analysis (Territory Space - Eagle Eye)\r\n\r\n### Territory: Fire as Observed Phenomenon\r\n\r\n**Observer**: Human with standard scientific instrumentation\r\n\r\n**ASFID State Vector**: `|Ω_fire⟩ = 0.85|A⟩ + 0.70|S⟩ + 0.90|F⟩ + 0.65|I⟩ + 0.75|D⟩`\r\n\r\n| Dimension | Score | Interpretation |\r\n|-----------|-------|----------------|\r\n| **A** (Attractor) | 0.85 | Strong thermal attractors; system drawn to equilibrium temperature |\r\n| **S** (Structure) | 0.70 | Moderate structural organization (flame geometry, fuel arrangement) |\r\n| **F** (Flow) | 0.90 | Very high flow intensity (heat, gases, air convection) |\r\n| **I** (Information) | 0.65 | Moderate information content (chemical signatures, spectral data) |\r\n| **D** (Dynamics) | 0.75 | Substantial dynamic behavior (rapid state changes, feedback loops) |\r\n\r\n**Norm**: 1.734\r\n\r\n**Observable Phenomena**:\r\n- Flame (visible light emission)\r\n- Heat (IR radiation, temperature gradient)\r\n- Sound (crackling, roaring)\r\n- Gases (CO₂, H₂O, smoke)\r\n- Fuel consumption (visible disappearance)\r\n\r\n---\r\n\r\n## REVOI Analysis (Map Space - Sphinx Eye)\r\n\r\n### Map: Fire Triangle as Theoretical Model\r\n\r\n**Observer**: Western scientist (modern perspective)\r\n\r\n**REVOI State Vector**: `|M_triangle⟩_REVOI = 0.80|O⟩ + 0.90|R⟩ + 0.90|I⟩ + 0.95|V⟩ + 0.70|E⟩`\r\n\r\n| Dimension | Score | Interpretation |\r\n|-----------|-------|----------------|\r\n| **O** (Observability) | 0.80 | Fire Triangle is highly observable as a model - can be drawn, visualized, taught. The triangle shape is immediately perceptible. |\r\n| **R** (Representability) | 0.90 | Excellently representable - simple geometric diagram with 3 labeled vertices. Minimal symbolism (triangle + 3 words). |\r\n| **I** (Interoperability) | 0.90 | Highly shareable - Fire Triangle is international standard in fire safety. Same model used globally by firefighters, chemists, educators. |\r\n| **V** (Verifiability) | 0.95 | Extremely verifiable - Popper gold standard. Falsifiable prediction: \"Remove ANY component → fire stops.\" Testable experimentally. |\r\n| **E** (Evolvability) | 0.70 | Moderately evolvable - Model extended to Fire Tetrahedron (+Chain Reaction). Triangle remains dominant in pedagogy. |\r\n\r\n**REVOI Mean**: **0.85** → Very high-quality Map\r\n\r\n**Overall Assessment**: Excellent Map - High REVOI across all dimensions. Fire Triangle is paradigmatic example of effective scientific model: observable, representable, shareable, testable, and evolvable.\r\n\r\n### Comparison: Territory vs Map\r\n\r\n| Aspect | Territory (ASFID) | Map (REVOI) |\r\n|--------|-------------------|-------------|\r\n| **What is measured** | Physical fire phenomenon | Fire Triangle model |\r\n| **Perspective** | Eagle Eye | Sphinx Eye |\r\n| **State Vector** | ASFID: (0.85, 0.70, 0.90, 0.65, 0.75) | REVOI: (0.90, 0.70, 0.95, 0.80, 0.90) · Map ASFID: (0.75, 0.90, 0.60, 0.80, 0.50) |\r\n| **Norm** | 1.734 | (calculated from REVOI) |\r\n| **Function** | Measure observable reality | Evaluate conceptual model quality |\r\n\r\n---\r\n\r\n## Epistemic Gap Analysis\r\n\r\n**Formula**: `ΔΘ = ‖|Ω_fire⟩ - |M_triangle⟩‖`\r\n\r\n**Delta Vector (Territory - Map)**: `(+0.10, -0.20, +0.30, -0.15, +0.25)`\r\n\r\n**Gap Norm**: **0.474**\r\n\r\n**Interpretation**: **Moderate gap** (0 < ΔΘ < 0.5)\r\n\r\n**Assessment**: Model is reasonably good - captures essence but simplifies reality\r\n\r\n### Major Divergences\r\n\r\n| Dimension | Divergence | Reason |\r\n|-----------|------------|--------|\r\n| **S** (Structure) | -0.20 | Triangle = perfect geometry; Real fire = irregular, fluctuating |\r\n| **F** (Flow) | +0.30 | Real fire = massive flows (gases, heat); Model = conceptual flows |\r\n| **D** (Dynamics) | +0.25 | Real fire = rapid, chaotic dynamics; Model = static representation |\r\n\r\n---\r\n\r\n## M2 GenericConcepts Mobilized\r\n\r\n**Total**: 22 GenericConcepts out of 58 (38%)\r\n\r\n### By Category\r\n\r\n- **Structural**: Component, Composition, Topology, Modularity, Hierarchy, Invariant, Symmetry\r\n- **Dynamic**: Process, Bifurcation, Gradient\r\n- **Regulatory**: Constraint, Threshold, Trigger, Feedback\r\n- **Energetic**: Dissipation\r\n- **Informational**: Code, Language, Representation, Signature\r\n- **Ontological**: System\r\n- **Teleonomic**: Autopoiesis\r\n- **Relational**: Synergy\r\n\r\n### Critical GenericConcepts\r\n\r\n| GenericConcept | Role | Formula |\r\n|-------------|------|---------|\r\n| **Component** | Identifies Fuel, O₂, Heat as elementary parts | S⊗I |\r\n| **Synergy** | Explains emergence (1+1+1 = Fire, not 3) | A⊗S⊗I |\r\n| **Composition** | Bottom-up assembly of components into system | S⊗I⊗A |\r\n| **Trigger** | Heat initiates process when threshold crossed | D⊗I |\r\n| **Process** | Combustion as dynamic transformation | D⊗F |\r\n\r\n---\r\n\r\n## Fire Extinguishment Strategies\r\n\r\n**Principle**: Remove any component of the triangle\r\n\r\n### Methods\r\n\r\n#### 1. Target: Fuel\r\n- **Action**: Fuel removal or dilution\r\n- **Examples**: Clear vegetation, close gas valve, shovel away burning material\r\n- **Mechanism**: Eliminate energy source\r\n\r\n#### 2. Target: Oxidizer\r\n- **Action**: O₂ exclusion (smothering)\r\n- **Examples**: Fire blanket, CO₂ extinguisher, foam, sand\r\n- **Mechanism**: Prevent oxidation reaction\r\n\r\n#### 3. Target: Heat\r\n- **Action**: Cooling below ignition temperature\r\n- **Examples**: Water spray, dry chemical powder, heat-absorbing agents\r\n- **Mechanism**: Break thermal feedback loop\r\n\r\n---\r\n\r\n## Alternative Observer Perspectives\r\n\r\n### 1. Ant Perspective\r\n- **ASFID State**: (A:0.90, S:0.30, F:0.85, I:0.40, D:0.70)\r\n- **Differences**: Higher A (danger), lower S (scale), lower I (complexity)\r\n- **Interpretation**: Heat gradient danger, chemical threat\r\n\r\n### 2. IR Sensor Perspective\r\n- **ASFID State**: (A:0.60, S:0.40, F:0.95, I:0.90, D:0.50)\r\n- **Differences**: Very high F (radiative flux), high I (spectral info), lower D (static)\r\n- **Interpretation**: Thermal radiation spectrum analysis\r\n\r\n### 3. Firefighter Perspective\r\n- **Basis**: REVOI (Sphinx Eye) — Map perspective\r\n- **REVOI State**: (R:0.80, E:0.75, V:0.85, O:0.85, I:0.60)\r\n- **State Vector**: |M_firefighter⟩_REVOI = 0.80|R⟩ + 0.75|E⟩ + 0.85|V⟩ + 0.85|O⟩ + 0.60|I⟩\r\n- **Differences**: High O/V (threat visible and testable), lower I (action-focused, not a universal standard)\r\n- **Interpretation**: Operational threat model (Map quality, not Territory measurement)\r\n\r\n---\r\n\r\n## Model Evolution\r\n\r\n### Fire Triangle (Classic)\r\n- **Components**: Fuel, Oxygen, Heat\r\n- **Era**: Early 20th century - present\r\n- **Usage**: Standard teaching tool in fire science and safety training\r\n\r\n### Fire Tetrahedron (Extended)\r\n- **Additional Component**: Chemical Chain Reaction\r\n- **Rationale**: Some fires (e.g., metal fires) sustain through radical propagation\r\n- **Example**: Magnesium can burn in CO₂ (no O₂ needed)\r\n- **Status**: More complete but less pedagogically accessible\r\n\r\n### Fire Square (Suppression-Oriented)\r\n- **Additional Component**: Uninhibited Chemical Reaction\r\n- **Usage**: Includes suppression mechanisms (chemical inhibition)\r\n- **Context**: Advanced fire suppression systems\r\n\r\n---\r\n\r\n## Transdisciplinary Analogies\r\n\r\n### Principle: 3-Component Synergistic Systems\r\n\r\n| Domain | Poclet | Components | Synergy |\r\n|--------|--------|------------|---------|\r\n| **Optics** | RGB Color Model | Red, Green, Blue | Full color spectrum |\r\n| **Biology** | Krebs Cycle (simplified) | Acetyl-CoA, Oxaloacetate, Enzymes | Cyclic ATP production |\r\n| **Economics** | Supply-Demand Equilibrium | Supply, Demand, Price | Market equilibrium |\r\n\r\n---\r\n\r\n## Validation Results\r\n\r\n| Criterion | Status | Assessment |\r\n|-----------|--------|------------|\r\n| **ASFID Completeness** | ✅ | All 5 dimensions present (A, S, F, I, D) |\r\n| **GenericConcept Coverage** | ✅ | 22/58 GenericConcepts mobilized (38%) |\r\n| **Minimality** | ✅ | Exactly 3 components (irreducible) |\r\n| **Emergence** | ✅ | Fire is emergent property (> sum of parts) |\r\n| **Pedagogical Value** | ✅ | Universally taught, easily understood |\r\n| **Empirical Validity** | ✅ | Matches real combustion phenomenon |\r\n| **Framework Fit** | ✅ | Perfect M3→M2→M1→M0 instantiation |\r\n\r\n**Overall Score**: **REVOI = 0.85** (Excellent)  \r\n**Epistemic Gap**: **ΔΘ = 0.474** (Moderate - acceptable)\r\n\r\n---\r\n\r\n## The Sphinx Riddle\r\n\r\n> **Question**: What has three legs but cannot walk, three sides but is not a shape, and dies when you remove any one of its parts?\r\n\r\n> **Answer**: Fire Triangle - A model that represents a process, not a geometric object. Remove Fuel, O₂, or Heat → fire stops (system collapses).\r\n\r\n*Following the Sphinx tradition of revealing truth through enigma.*\r\n\r\n---\r\n\r\n## Combustion Process\r\n\r\n**Type**: Exothermic oxidation reaction (ΔH < 0)\r\n\r\n**Mechanism**:\r\n```\r\nFuel vaporization → Mixing with O₂ → Oxidation → Heat + Light + Products\r\n```\r\n\r\n**Products**:\r\n- CO₂ (Carbon dioxide)\r\n- H₂O (Water vapor)\r\n- Heat (thermal energy)\r\n- Light (electromagnetic radiation)\r\n- Ash/Smoke (incomplete combustion)\r\n\r\n**Energy Balance**: Exothermic (releases more energy than absorbed)\r\n\r\n**Self-Sustaining**: Yes - positive feedback loop (combustion generates heat → maintains temperature > T_ignition)\r\n\r\n---\r\n\r\n## Constraints and Conditions\r\n\r\n| Type | Parameter | Condition |\r\n|------|-----------|-----------|\r\n| **Concentration** | Fuel | Above Lower Explosive Limit (LEL) |\r\n| **Concentration** | O₂ | > 16% (typical for air) |\r\n| **Temperature** | Heat | > T_ignition (fuel-specific) |\r\n| **Mixing** | Fuel-Oxidizer ratio | Proper stoichiometry for complete combustion |\r\n\r\n---\r\n\r\n## Historical Context\r\n\r\n- **Origin**: Fire Triangle model developed in early 20th century\r\n- **Evolution**: Later extended to Fire Tetrahedron (+ chemical chain reaction)\r\n- **Pedagogy**: Standard teaching tool in fire science, safety training, emergency response\r\n- **Limitations**: Oversimplifies complex combustion chemistry (but pedagogically effective)\r\n- **Standards**: Referenced in NFPA (National Fire Protection Association), OSHA fire safety training, ISO standards\r\n\r\n---\r\n\r\n## TSCG Framework Integration\r\n\r\n### Ontological Layers\r\n\r\n```\r\nM3 (Architecture)\r\n  ├─ Eagle Eye (ASFID) → Measures Territory (physical fire)\r\n  └─ Sphinx Eye (REVOI) → Evaluates Map (Triangle model)\r\n      ↓\r\nM2 (GenericConcepts)\r\n  ├─ Synergy, Component, Composition, Trigger, Process\r\n  └─ 22 total GenericConcepts mobilized\r\n      ↓\r\nM1 (Domain Concepts)\r\n  └─ Chemistry Extension: Combustion, Chemical Species\r\n      ↓\r\nM0 (Poclet Instance)\r\n  └─ Fire Triangle: Fuel ⊕ O₂ ⊕ Heat → Fire\r\n```\r\n\r\n### Triple Role in TSCG Development\r\n\r\n1. **Framework Validation** (Proof-of-Concept)\r\n   - Demonstrates ASFID completeness\r\n   - Validates REVOI scoring methodology\r\n   - Confirms bicephalous Territory-Map distinction\r\n\r\n2. **GenericConcept Discovery** (M2 Population)\r\n   - Helped identify **Balance** GenericConcept\r\n   - Reinforced **Synergy** pattern\r\n   - Revealed **Component** as fundamental\r\n\r\n3. **Domain Concept Identification** (M1 Bootstrapping)\r\n   - Contributed to M1_Chemistry extension\r\n   - Identified Combustion as domain pattern\r\n   - Established chemical process modeling patterns\r\n\r\n---\r\n\r\n## Usage Guidelines\r\n\r\n### For TSCG Framework Development\r\n- Use as reference example when validating new poclets\r\n- Compare ASFID/REVOI scores to Fire Triangle benchmarks\r\n- Test new GenericConcepts against Fire Triangle structure\r\n\r\n### For Teaching Systems Theory\r\n- Introduce ASFID dimensions through visible fire phenomena\r\n- Demonstrate emergence through synergy principle\r\n- Explain Territory vs Map using physical fire vs Triangle model\r\n\r\n### For Fire Safety Applications\r\n- Apply extinguishment strategies based on component removal\r\n- Understand fire behavior through systems perspective\r\n- Recognize limitations of simplified model in complex scenarios\r\n\r\n---\r\n\r\n## References\r\n\r\n- Fire science textbooks (standard reference)\r\n- NFPA (National Fire Protection Association) materials\r\n- OSHA fire safety training standards\r\n- ISO combustion standards\r\n- TSCG Framework Documentation (M2_GenericConcepts.jsonld, M3_EagleEye.jsonld, M3_SphinxEye.jsonld)\r\n\r\n---\r\n\r\n## See Also\r\n\r\n- **M1_Chemistry.jsonld**: Domain-specific combustion concepts\r\n- **M2_GenericConcepts.jsonld**: Synergy, Component, Composition GenericConcepts\r\n- **M0_ExposureTriangle.jsonld**: Another 3-component compensatory triangle\r\n- **poclet_terminology.md**: Definition and methodology of poclets\r\n\r\n---\r\n\r\n**File**: `M0_FireTriangle.jsonld`  \r\n**URI**: `https://raw.githubusercontent.com/Echopraxium/tscg/main/ontology/poclets/FireTriangle/M0_FireTriangle.jsonld`  \r\n**Version**: 1.1  \r\n**Last Updated**: 2026-02-24\r\n"},{"id":"FourStrokeEngine","label":"Four-Stroke Engine","domain":"Thermodynamics","version":"1.2.0","gap":0.132,"asfid":[0.85,0.9,0.95,0.8,0.85],"revoi":[0.9,0.85,0.9,0.9,0.85],"htmlRelPath":"instances/poclets/FourStrokeEngine/static/M0_FourStrokeEngine.html","hasReadme":true,"readme":"# Four-Stroke Engine Poclet\n\n## Overview\n\nThe **Four-Stroke Engine** is a minimal yet complete system representation of the thermodynamic cycle that powers most internal combustion engines. This poclet demonstrates how a cyclic process can convert chemical energy (fuel) into mechanical work through four sequential phases: **Intake**, **Compression**, **Power**, and **Exhaust**.\n\nAs a TSCG poclet, the Four-Stroke Engine serves three critical functions:\n1. **Framework Validation**: Demonstrates TSCG's applicability to thermodynamic systems\n2. **M2 GenericConcept Discovery**: Reveals fundamental patterns like Workflow, FeedbackLoop, and Transformation\n3. **M1 Domain Bootstrapping**: Identifies thermodynamics-specific concepts (Otto Cycle, Compression Ratio, Valve Timing, Thermal Efficiency)\n\n## System Components\n\nThe Four-Stroke Engine consists of **4 sequential strokes** (minimal configuration for a complete thermodynamic cycle):\n\n### 1. Intake Stroke\n- **Piston**: Moves downward (Top Dead Center → Bottom Dead Center)\n- **Intake Valve**: Open\n- **Exhaust Valve**: Closed\n- **Action**: Air-fuel mixture drawn into cylinder\n- **Volume**: Increases from V_min to V_max\n\n### 2. Compression Stroke\n- **Piston**: Moves upward (BDC → TDC)\n- **Both Valves**: Closed\n- **Action**: Air-fuel mixture compressed\n- **Pressure & Temperature**: Increase\n- **Compression Ratio**: r = V_max / V_min (typically 8:1 to 12:1)\n\n### 3. Power Stroke (Combustion)\n- **Piston**: Moves downward (TDC → BDC)\n- **Both Valves**: Closed\n- **Trigger**: Spark plug ignites compressed mixture\n- **Action**: Rapid combustion → pressure spike → piston pushed down\n- **Work Output**: Mechanical energy transferred to crankshaft\n\n### 4. Exhaust Stroke\n- **Piston**: Moves upward (BDC → TDC)\n- **Intake Valve**: Closed\n- **Exhaust Valve**: Open\n- **Action**: Combustion products expelled from cylinder\n- **Cycle Reset**: Returns to initial state for next cycle\n\n## ASFID Analysis (Eagle Eye — Territory)\n\n| Dimension | Score | Description |\n|-----------|-------|-------------|\n| **A**ttractor | 0.85 | Steady-state rotation (target RPM), conversion of heat → mechanical work |\n| **S**tructure | 0.90 | Piston-cylinder assembly, valves, connecting rod, crankshaft; cyclic topology |\n| **F**low | 0.95 | Air-fuel intake, exhaust gas output, energy flow (chemical → heat → work) |\n| **I**nformation | 0.80 | Valve timing, ignition timing, compression ratio, P-V-T state variables |\n| **D**ynamics | 0.85 | 4-stroke sequence, 2 crankshaft revolutions per cycle, combustion bifurcation |\n\n**Territory ASFID Vector**: `(0.85, 0.90, 0.95, 0.80, 0.85)`\n`‖ASFID‖ = 1.969`\n\n## REVOI Analysis (Sphinx Eye — Map)\n\n> **Note v1.1.0**: The Map perspective acronym is **REVOI** (canonical TSCG notation), not ORIVE.  \n> Dimension definitions: **R**epresentability · **E**volvability · **V**erifiability · **O**bservability · **I**nteroperability\n\n| Dimension | Score | Description |\n|-----------|-------|-------------|\n| **R**epresentability | 0.90 | Highly encodable via P-V diagrams, T-s diagrams, thermodynamic equations, animations |\n| **E**volvability | 0.85 | Base model readily extended to VVT, GDI, turbocharging, hybrid powertrains |\n| **V**erifiability | 0.90 | Validated by 150+ years of engineering practice; matches First & Second Law predictions |\n| **O**bservability | 0.90 | Measurable via RPM, cylinder pressure, temperature, airflow sensors |\n| **I**nteroperability | 0.85 | Modular design (1-cyl, 4-cyl, V6, V8), fuel flexibility (gasoline, E85, methanol) |\n\n**Map REVOI Vector**: `(0.90, 0.85, 0.90, 0.90, 0.85)`\n`‖REVOI‖ = 1.969`\n\n## Epistemic Gap (ΔΘ)\n\n```\nΔΘ = ‖ASFID − REVOI‖\n   = ‖(0.85−0.90, 0.90−0.85, 0.95−0.90, 0.80−0.90, 0.85−0.85)‖\n   = ‖(−0.05, +0.05, +0.05, −0.10, 0.00)‖\n   = √(0.0025 + 0.0025 + 0.0025 + 0.01 + 0)\n   = √0.0175\n   ≈ 0.132\n```\n\n**Interpretation**: Excellent alignment between physical system (Territory) and theoretical model (Map).  \nThe small gap (0.132) confirms the Otto cycle as a high-fidelity representation of real engine behavior.\n\n> Previous v1.0.x value of ΔΘ = 0.16 was computed against the (now deprecated) ORIVE vector with different dimension semantics.\n\n## Minimality Validation\n\n**Why 4 strokes is minimal**:\n- **3 strokes**: Insufficient to separate intake and exhaust phases → incomplete cycle\n- **2 strokes**: Exists but less efficient (fuel loss during exhaust overlap)\n- **4 strokes**: Optimal balance between completeness and simplicity\n\n**Irreducibility Test**: Removing any stroke destroys the cycle's functionality:\n- No Intake → No fuel/air\n- No Compression → No pressure for efficient combustion\n- No Power → No work output\n- No Exhaust → Cylinder fills with combustion products\n\n## M2 GenericConcepts Mobilized\n\nThis poclet activates **20 GenericConcepts** (27% of M2_GenericConcepts.jsonld v15.10.1 — 20/75):\n\n> **Note v1.2.0**: Aligned to M2 v15.10.1. Deprecated concepts replaced: `Cycle` → `FeedbackLoop` + `Process`, `Sequence` → `Workflow`, `Flow` → `Channel`, `Synchronization` → `Alignment`. `Efficiency` relocated to M1_Thermodynamics (domain-specific).\n\n### Structural GenericConcepts\n- **Component** (S⊗I): 4 strokes as elementary parts\n- **Composition** (S⊗I⊗A): Piston + connecting rod + crankshaft assembly\n- **Symmetry** (S): Cylindrical geometry\n- **Modularity** (S⊗I): Multi-cylinder engines (4-cyl = 4 × single-cyl)\n\n### Dynamic GenericConcepts\n- **Process** (D⊗F): Each stroke is a sub-process\n- **Step** (S⊗I⊗D): Each stroke as elementary unit in the Workflow\n- **Workflow** (S⊗D⊗F): Strict ordered sequencing of the 4 strokes *(replaces deprecated `Sequence`)*\n- **FeedbackLoop** (Process⊗Alignment⊗Homeostasis): Periodic return to initial state — defines cyclicity *(replaces deprecated `Cycle`)*\n- **Bifurcation** (∂D/∂F): Rapid combustion transition at power stroke onset\n- **Transformation** (D⊗S⊗I): Chemical energy → Heat → Mechanical work\n\n### Regulatory GenericConcepts\n- **Constraint** (S⊗I): Fixed cylinder volume, compression ratio\n- **Threshold** (A⊗I): Ignition point (spark timing)\n- **Trigger** (D⊗I): Spark ignites combustion\n- **Alignment** (I⊗A⊗S): Multi-cylinder timing coordination *(replaces deprecated `Synchronization`)*\n\n### Energetic GenericConcepts\n- **Channel** (S⊗I⊗F): Air-fuel intake path + exhaust gas conduit *(replaces deprecated `Flow`)*\n- **Dissipation** (F⊗D): Heat loss through cylinder walls (cooling system)\n- **Gradient** (⊗₂F): Pressure gradient drives piston on power stroke\n\n### Teleonomic GenericConcepts\n- **Trade-off** (A⊗I⊗F): Higher compression → higher efficiency BUT higher knock risk\n- **Balance** (A⊗S⊗F): Valve timing, ignition timing, piston-crankshaft synchronization\n- **Emergence** (I⊗S⊗D): Continuous crankshaft rotation emerges from 4 discrete strokes\n\n> `Efficiency` removed from this list — domain-specific metric relocated to **M1_Thermodynamics** as `ThermalEfficiency` (η = 1 − 1/r^(γ−1)).\n\n## Transdisciplinary Validation\n\nThe \"4-phase cycle\" pattern appears across multiple domains:\n\n| Domain | Example | 4 Phases |\n|--------|---------|----------|\n| **Cardiology** | Cardiac cycle | Atrial diastole, Atrial systole, Ventricular diastole, Ventricular systole |\n| **Economics** | Business cycle | Expansion, Peak, Contraction, Trough |\n| **Chemistry** | Ion pump | 4 conformational states in Na⁺/K⁺-ATPase |\n| **Climatology** | Seasonal cycle | Spring, Summer, Fall, Winter |\n\nThis cross-domain recurrence validates **Workflow** + **FeedbackLoop** as the universal M2 pattern capturing both ordered sequencing and cyclic return — the two inseparable faces of any 4-phase cycle.\n\n## M1 Domain Contributions\n\nThis poclet identifies **8 thermodynamics-specific concepts** for `M1_extensions/thermodynamics/M1_Thermodynamics.jsonld`:\n\n1. **Stroke**: A phase in an engine cycle (Intake, Compression, Power, Exhaust)\n2. **Compression Ratio**: r = V_max / V_min (key performance parameter)\n3. **Otto Cycle**: Idealized thermodynamic cycle (basis for gasoline engines)\n4. **Valve Timing**: Precise synchronization of intake/exhaust valve opening/closing\n5. **Ignition Timing**: Spark timing for combustion initiation\n6. **Bore & Stroke**: Cylinder diameter and piston travel distance\n7. **Displacement**: Total cylinder volume (engine size metric)\n8. **Thermal Efficiency**: η = 1 − (1/r^(γ−1)) — domain-specific metric relocated from M2 (was `m2:Efficiency`, removed in v15)\n\n## Pedagogical Value\n\nThe Four-Stroke Engine is ideal for teaching:\n- **Systems Thinking**: How sequential processes create emergent behavior (rotation)\n- **Energy Conversion**: Chemical → Thermal → Mechanical transformation chain\n- **Cyclicity**: Periodic systems and state-space return\n- **Trade-offs**: Compression ratio vs. knock resistance\n- **Modularity**: Single-cylinder principles scale to multi-cylinder engines\n\n## Historical Context\n\n- **1876**: Nicolaus Otto patents the four-stroke engine\n- **1886**: Karl Benz builds first automobile with four-stroke engine\n- **1920s–present**: Becomes dominant design for gasoline engines\n- **Modern Era**: Electronic fuel injection, variable valve timing enhance efficiency\n\n## Engineering Significance\n\n**Why 4-stroke dominates over 2-stroke**:\n- ✅ Better fuel efficiency (no fresh charge loss)\n- ✅ Lower emissions (complete exhaust scavenging)\n- ✅ Quieter operation\n- ✅ Longer engine life (better lubrication)\n- ❌ More complex (requires valve train)\n- ❌ Lower power-to-weight ratio\n\n## Thermodynamic Efficiency\n\n**Ideal Otto Cycle Efficiency**:\n```\nη = 1 − (1 / r^(γ−1))\n```\nWhere:\n- η = thermal efficiency\n- r = compression ratio\n- γ = heat capacity ratio (≈1.4 for air)\n\n**Example**: r = 10:1 → η ≈ 60% (ideal)  \n**Reality**: Real engines achieve 25–30% due to friction, heat loss, incomplete combustion\n\n## Bicephalous Perspective\n\n### Eagle Eye (Territory — ASFID)\n- **Observable**: Piston motion, pressure waves, temperature profiles\n- **Measurable**: RPM, torque, power output, fuel consumption\n- **Physical**: Real metal components, combustion reactions, heat transfer\n\n### Sphinx Eye (Map — REVOI)\n- **Theoretical**: Idealized Otto cycle (reversible, adiabatic, constant volume)\n- **Pedagogical**: Simplified P-V diagram for education\n- **Epistemic Gap**: ΔΘ = 0.132 (small gap) → high-fidelity model\n\n**Synthesis**: The Four-Stroke model is an excellent map of the territory — it accurately predicts real engine behavior while remaining simple enough for educational and engineering purposes.\n\n## Conclusion\n\nThe **Four-Stroke Engine** is a validated TSCG poclet demonstrating:\n- ✅ **Minimality**: 4 strokes is the irreducible minimum\n- ✅ **Completeness**: All 5 ASFID dimensions present\n- ✅ **High Map Quality**: REVOI = (0.90, 0.85, 0.90, 0.90, 0.85)\n- ✅ **Small Epistemic Gap**: δ = 0.132 — SpectralClass `OnCriticalLine` (excellent Territory-Map alignment)\n- ✅ **Transdisciplinary**: 4-phase cycle pattern appears across domains\n- ✅ **Pedagogical**: Universally taught in engineering education\n- ✅ **Framework Validation**: Confirms TSCG applicability to thermodynamic systems\n- ✅ **M1 CoreConcepts reuse**: `m1core:Oscillator` (crankshaft), `m1core:Processor` (engine as transformer)\n\n**POCLET STATUS**: ✅ VALIDATED\n\n---\n\n## Changelog\n\n| Version | Date | Summary |\n|---------|------|---------|\n| **1.2.0** | 2026-03-18 | M2 v15.10.1 alignment: Cycle→FeedbackLoop+Process, Sequence→Workflow, Flow→Channel, Synchronization→Alignment; Efficiency→M1_Thermodynamics; `@base` added to jsonld; GenericConceptCoverage 38%→27% (20/75); 8th M1 concept ThermalEfficiency added |\n| 1.1.0 | 2026-02-24 | BREAKING: ORIVE → REVOI; R=Representability, E=Evolvability, V=Verifiability; ΔΘ recalculated to 0.132; poclet-loader fields added |\n| 1.0.1 | 2026-01-28 | Added transdisciplinary validation and M1 contributions |\n\n---\n\n## References\n\n- Otto, N. A. (1876). *Four-Stroke Internal Combustion Engine* (Patent)\n- Heywood, J. B. (1988). *Internal Combustion Engine Fundamentals*. McGraw-Hill.\n- Taylor, C. F. (1985). *The Internal Combustion Engine in Theory and Practice*. MIT Press.\n- SAE International. *Engine Technology Standards* (J1349, J1995).\n\n## Related Poclets\n\n- **Fire Triangle**: Similar 3-component synergistic system\n- **Carnot Cycle**: Idealized thermodynamic cycle (benchmark for efficiency)\n- **Krebs Cycle**: Biological metabolic cycle with sequential phases\n- **Predator-Prey**: Cyclical dynamics with phase coupling\n\n---\n\n**Document Version**: 1.2.0  \n**Date**: March 2026  \n**Framework**: TSCG (Transdisciplinary System Construction Game)  \n**Authors**: Echopraxium with the collaboration of Claude AI  \n**Ontology**: M0_FourStrokeEngine.jsonld  \n"},{"id":"Vco","label":"Voltage Controlled Oscillator","domain":"","version":"","gap":null,"asfid":null,"revoi":null,"htmlRelPath":"instances/poclets/Vco/static/M0_VCO.html","hasReadme":true,"readme":"# M0_VCO — Voltage Controlled Oscillator\n\n**TSCG Poclet · Electronics / Modular Synthesis · v1.0.0**  \n*Author: Echopraxium with the collaboration of Claude AI*\n\n---\n\n## Overview\n\nA **VCO (Voltage Controlled Oscillator)** is the fundamental pitch-generation component of a modular synthesizer. It produces a periodic audio-frequency waveform whose frequency is controlled by an input voltage following the **V/Oct standard** (1 volt per octave).\n\nThis poclet is the **first M0 instantiation of `m2:Oscillator`** (introduced in M2 v15.8.0), validating the GenericConceptCombo in the Electronics / Music Technology domain.\n\n---\n\n## TSCG Positioning\n\n| Layer | Concept | Role |\n|---|---|---|\n| **M3** | ASFID (Eagle Eye) | Territory: S, A, F, I, D |\n| **M2** | `m2:Oscillator` | Primary — `⊗⇒(Component, Process, Trajectory\\|Circular)` |\n| **M2** | `m2:Amplification` | V/Oct exponential CV→frequency mapping |\n| **M2** | `m2:Transformation` | CV domain → audio frequency domain |\n| **M2** | `m2:Mode` | Waveform selector (N=4: Sine, Square, Triangle, Sawtooth) |\n| **M2** | `m2:Signal` | Audio output waveform |\n| **M0** | `m0:VCO` | This poclet |\n\n### Why `m2:Oscillator` and not just `m2:Process`?\n\nThe VCO is a **system component** — a bounded, identifiable, patchable module, not just an abstract process. Subclassing `m2:Component` adds **S** (Structure) and unlocks full ASFID 5D coverage: `S ⊗ A ⊗ I ⊗ D ⊗ F`.\n\n---\n\n## ASFID Analysis\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **A** | 0.90 | Target frequency `f = f₀ × 2^(CV)` — circular attractor |\n| **S** | 0.75 | Integrator core, V/Oct converter, waveform shaper, buffers |\n| **F** | 0.85 | Audio output ±5V, CV input, FM input |\n| **I** | 0.80 | Phase φ(t), waveform shape, pitch CV |\n| **D** | 0.90 | V/Oct law: `f(CV) = f₀ × 2^(CV/1V)` |\n| **Total** | **0.84** | Epistemic gap: **0.16** |\n\n---\n\n## REVOI Analysis\n\n| Dim | Score | Interpretation |\n|---|---|---|\n| **R** | 0.90 | Closed-form formula, analytic Fourier waveforms |\n| **E** | 0.85 | FM, hard sync, PWM, wavetable extend cleanly |\n| **V** | 0.95 | Frequency counter, oscilloscope, FFT |\n| **O** | 0.95 | All state variables directly measurable |\n| **I** | 0.95 | V/Oct universal Eurorack standard |\n| **Total** | **0.92** | Map-strong: highest REVOI in Combo family |\n\n---\n\n## The V/Oct Law\n\n```\nf(CV) = f₀ × 2^(CV / 1V)\n\nCV =  0V  →  440 Hz  (A4)\nCV = +1V  →  880 Hz  (A5,  +1 octave)\nCV = +2V  → 1760 Hz  (A6,  +2 octaves)\nCV = -1V  →  220 Hz  (A3,  -1 octave)\nCV = 1/12 V ≈ 83 mV  →  A#4  (+1 semitone)\n```\n\n---\n\n## Waveform Modes (`m2:Mode`, N=4)\n\n| Mode | Harmonics | Timbre |\n|---|---|---|\n| **Sine** | Fundamental only | Pure, flute-like |\n| **Square** | Odd (1/n) | Hollow, woodwind |\n| **Triangle** | Odd (1/n²) | Soft, mellow |\n| **Sawtooth** | All (1/n) | Bright, string/brass |\n\n---\n\n## Interfaces\n\n### Inputs\n| Jack | Signal | ASFID | Description |\n|---|---|---|---|\n| `PITCH` | CV V/Oct | A + D | Primary frequency control |\n| `FM` | ±5V | D + F | Frequency modulation |\n| `SYNC` | Gate | I + D | Hard sync — resets phase |\n\n### Outputs\n| Jack | Level | Description |\n|---|---|---|\n| `SIN` | ±5V | Sine |\n| `SQR` | ±5V | Square |\n| `TRI` | ±5V | Triangle |\n| `SAW` | ±5V | Sawtooth |\n\n---\n\n## Transdisciplinary Analogies\n\n| Domain | Analogue | CV equivalent |\n|---|---|---|\n| Biology | Cardiac pacemaker (SA node) | Autonomic nervous system tone |\n| Mechanics | Driven variable-length pendulum | Effective gravity control |\n| Economics | Business cycle oscillator | Interest rate policy |\n| Chemistry | Belousov-Zhabotinsky reaction | Reagent input rate |\n\n---\n\n## Files\n\n| File | Description |\n|---|---|\n| `M0_VCO.jsonld` | Ontology (this poclet) |\n| `M0_VCO_README.md` | This document |\n| `vco_sim.py` | Interactive Pygame simulation |\n| `VCO_SIM_README.md` | Simulation user guide |\n\n---\n\n*TSCG v15.8.0 · 2026-02-27*\n"}];
const BASE_URL = "https://echopraxium.github.io/tscg";
// Generated: 2026-03-23

const ASFID_COLORS = ['var(--col-A)','var(--col-S)','var(--col-F)','var(--col-I)','var(--col-D)'];
const REVOI_COLORS = ['var(--col-R)','var(--col-E)','var(--col-V)','var(--col-O)','var(--col-Im)'];

let selectedId = null;

window.addEventListener('DOMContentLoaded', () => {
  renderTree();
  initTreeListeners();
  initSplitter();
  initKeyboard();
  if (POCLETS.length) selectPoclet(POCLETS[0].id);
});

function renderTree() {
  const list = document.getElementById('tree-list');
  const n    = POCLETS.length;
  document.getElementById('tree-count').textContent = n;
  document.getElementById('hdr-count').textContent  =
    n + ' simulation' + (n !== 1 ? 's' : '');
  if (!n) {
    list.innerHTML =
      '<div style="padding:16px 12px;font-size:11px;color:var(--muted)">No static simulations found.</div>';
    return;
  }
  list.innerHTML = POCLETS.map(p =>
    '<div class="tree-item" data-id="' + esc(p.id) + '"' +
    (p.domain ? ' title="' + esc(p.domain) + '"' : '') +
    ' style="cursor:pointer">' +
    '<span class="tree-icon">&#9654;</span>' +
    '<span class="tree-label">' + esc(p.label) + '</span>' +
    '</div>'
  ).join('');
  list.querySelectorAll('.tree-item').forEach(el =>
    el.addEventListener('click', () => selectPoclet(el.dataset.id)));
}

function selectPoclet(id) {
  selectedId = id;
  const p    = POCLETS.find(x => x.id === id);
  document.querySelectorAll('.tree-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));
  const nameEl   = document.getElementById('readme-poclet-name');
  const domainEl = document.getElementById('readme-domain');
  nameEl.textContent   = p ? p.label   : 'Select a poclet';
  nameEl.style.color   = p ? 'var(--text)' : 'var(--muted)';
  domainEl.textContent = p && p.domain ? p.domain : '';
  renderScoresStrip(p);
  const btn = document.getElementById('launch-btn');
  if (p) { btn.href = BASE_URL ? BASE_URL + '/' + p.htmlRelPath : p.htmlRelPath; btn.classList.remove('hidden'); }
  else   { btn.classList.add('hidden'); }
  document.getElementById('footer-info').textContent =
    p ? p.label + (p.version ? '  v' + p.version : '') : '';
  document.getElementById('footer-path').textContent =
    p ? (BASE_URL ? BASE_URL + '/' + p.htmlRelPath : p.htmlRelPath) : '';
  if (!p)           { showPlaceholder('No poclet selected'); return; }
  if (!p.hasReadme) { showPlaceholder(p.label + '\n\nNo README found.'); return; }
  document.getElementById('readme-body').innerHTML =
    '<div class="readme-md">' + parseMarkdown(p.readme) + '</div>';
  document.getElementById('readme-body').scrollTop = 0;
}

function renderScoresStrip(p) {
  const strip = document.getElementById('scores-strip');
  if (!p || (!p.asfid && !p.revoi && p.gap == null)) {
    strip.className = ''; strip.innerHTML = ''; return;
  }
  strip.className = 'visible';
  let html = '';
  if (p.asfid) {
    html += '<div class="score-group"><span class="score-group-label eagle">ASFID</span>';
    ['A','S','F','I','D'].forEach((d, i) => {
      const pct = Math.round(p.asfid[i] * 100);
      html += '<div class="score-mini">' +
        '<span class="score-mini-ltr" style="color:' + ASFID_COLORS[i] + '">' + d + '</span>' +
        '<div class="score-mini-bg"><div class="score-mini-fill" style="width:' + pct +
        '%;background:' + ASFID_COLORS[i] + '"></div></div></div>';
    });
    html += '</div>';
  }
  if (p.asfid && (p.revoi || p.gap != null)) html += '<div class="score-sep"></div>';
  if (p.revoi) {
    html += '<div class="score-group"><span class="score-group-label sphinx">REVOI</span>';
    ['R','E','V','O','I'].forEach((d, i) => {
      const pct = Math.round(p.revoi[i] * 100);
      html += '<div class="score-mini">' +
        '<span class="score-mini-ltr" style="color:' + REVOI_COLORS[i] + '">' + d + '</span>' +
        '<div class="score-mini-bg"><div class="score-mini-fill" style="width:' + pct +
        '%;background:' + REVOI_COLORS[i] + '"></div></div></div>';
    });
    html += '</div>';
  }
  if (p.revoi && p.gap != null) html += '<div class="score-sep"></div>';
  if (p.gap != null) {
    html += '<div class="gap-mini"><span class="gap-mini-lbl">&delta;</span>' +
      '<span class="gap-mini-val">' + p.gap.toFixed(3) + '</span></div>';
  }
  strip.innerHTML = html;
}

function showPlaceholder(msg) {
  const lines = msg.split('\n');
  document.getElementById('readme-body').innerHTML =

    '<svg width="48" height="48" viewBox="0 0 24 24" fill="none"' +
